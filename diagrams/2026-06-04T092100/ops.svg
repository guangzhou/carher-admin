<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="820" viewBox="0 0 1500 820"><style>.title{font-family:'Noto Sans SC',sans-serif;font-size:30px;font-weight:800;fill:#162033}.sub{font-family:'Noto Sans SC',sans-serif;font-size:15px;fill:#64748b}.lane{font-family:'Noto Sans SC',sans-serif;font-size:16px;font-weight:800;fill:#334155}.h{font-family:'Noto Sans SC',sans-serif;font-size:17px;font-weight:800;fill:#172033}.t{font-family:'Noto Sans SC',sans-serif;font-size:13px;fill:#64748b}.tiny{font-family:'Noto Sans SC',sans-serif;font-size:12px;fill:#64748b}.main{stroke:#16a34a;stroke-width:5;fill:none;stroke-linecap:round;stroke-linejoin:round}.fb{stroke:#f97316;stroke-width:3;fill:none;stroke-dasharray:9 7;stroke-linecap:round;stroke-linejoin:round}.p1{stroke:#dc2626;stroke-width:3;fill:none;stroke-dasharray:7 7;stroke-linecap:round;stroke-linejoin:round}</style><defs><marker id="g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#16a34a"/></marker><marker id="o" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#f97316"/></marker><marker id="r" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#dc2626"/></marker></defs><rect width="1500" height="820" fill="#f8fafc"/><text class="title" x="52" y="62">值班处理流程：先判断用户是否受影响</text><text class="sub" x="54" y="94">用两条清晰路径区分“观察处理”和“P1 救火”，避免所有告警都升级成事故</text>
<rect x="60" y="145" width="1380" height="200" rx="24" fill="#e0f2fe" stroke="#dbe3ee" stroke-width="1.5"/><text class="lane" x="84" y="179">分流：先看用户请求是否成功</text><rect x="60" y="395" width="820" height="250" rx="24" fill="#f0fdf4" stroke="#dbe3ee" stroke-width="1.5"/><text class="lane" x="84" y="429">主值班路径：fallback 已兜住，用户未受影响</text><rect x="935" y="395" width="230" height="250" rx="24" fill="#fff1f2" stroke="#dbe3ee" stroke-width="1.5"/><text class="lane" x="959" y="429">P1 路径：用户已受影响</text><rect x="1215" y="395" width="225" height="250" rx="24" fill="#fff7ed" stroke="#dbe3ee" stroke-width="1.5"/><text class="lane" x="1239" y="429">恢复与复盘</text>
<rect x="105" y="225" width="190" height="82" rx="18" fill="#e0f2fe" stroke="#0284c7" stroke-width="2.5"/><text class="h" x="125" y="256">收到告警</text><text class="t" x="125" y="282">模型异常 / fallback 突增</text><rect x="370" y="225" width="210" height="82" rx="18" fill="#e0f2fe" stroke="#0284c7" stroke-width="2.5"/><text class="h" x="390" y="256">用户请求成功？</text><text class="t" x="390" y="282">成功：观察处理</text><text class="t" x="390" y="301">失败：进入 P1</text><rect x="650" y="225" width="190" height="82" rx="18" fill="#fff" stroke="#16a34a" stroke-width="2.5"/><text class="h" x="670" y="256">确认影响面</text><text class="t" x="670" y="282">模型 / 供应商 / 实例</text><rect x="1100" y="225" width="190" height="82" rx="18" fill="#ecfdf5" stroke="#059669" stroke-width="2.5"/><text class="h" x="1120" y="256">恢复目标</text><text class="t" x="1120" y="282">主路由健康</text>
<rect x="100" y="475" width="190" height="82" rx="18" fill="#fff" stroke="#16a34a" stroke-width="2.5"/><text class="h" x="120" y="506">查日志</text><text class="t" x="120" y="532">SpendLogs / Router logs</text><rect x="330" y="475" width="170" height="82" rx="18" fill="#fff7ed" stroke="#f97316" stroke-width="2.5"/><text class="h" x="350" y="506">billing/auth?</text><text class="t" x="350" y="532">补费 / 换 key</text><rect x="545" y="475" width="190" height="82" rx="18" fill="#fff" stroke="#16a34a" stroke-width="2.5"/><text class="h" x="565" y="506">供应商异常?</text><text class="t" x="565" y="532">5xx / timeout / 429</text><rect x="770" y="475" width="70" height="82" rx="18" fill="#fff" stroke="#16a34a" stroke-width="2.5"/><text class="h" x="790" y="506">观察</text><text class="t" x="790" y="532">保持兜底</text>
<rect x="960" y="475" width="170" height="82" rx="18" fill="#fff1f2" stroke="#dc2626" stroke-width="2.5"/><text class="h" x="980" y="506">进入 P1</text><text class="t" x="980" y="532">临时切直连</text><rect x="1235" y="460" width="170" height="82" rx="18" fill="#fff7ed" stroke="#f97316" stroke-width="2.5"/><text class="h" x="1255" y="491">恢复探测</text><text class="t" x="1255" y="517">primary 健康检查</text><rect x="1235" y="560" width="170" height="60" rx="18" fill="#ecfdf5" stroke="#059669" stroke-width="2.5"/><text class="h" x="1255" y="591">复盘沉淀</text><text class="t" x="1255" y="617">根因 / 自动化缺口</text>
<polyline points="295,266 370,266" class="main" marker-end="url(#g)"/><polyline points="580,266 650,266" class="main" marker-end="url(#g)"/><polyline points="840,266 1100,266" class="main" marker-end="url(#g)"/>
<polyline points="475,307 475,370 195,370 195,475" class="main" marker-end="url(#g)"/><polyline points="290,516 330,516" class="fb" marker-end="url(#o)"/><polyline points="500,516 545,516" class="fb" marker-end="url(#o)"/><polyline points="735,516 770,516" class="main" marker-end="url(#g)"/><polyline points="840,516 1235,516" class="fb" marker-end="url(#o)"/><polyline points="1320,542 1320,560" class="fb" marker-end="url(#o)"/>
<polyline points="475,307 475,360 1045,360 1045,475" class="p1" marker-end="url(#r)"/><polyline points="1130,516 1235,516" class="p1" marker-end="url(#r)"/>
<text class="tiny" x="86" y="700">绿色：用户未受影响的主值班路径  ·  橙色：需要处理但未升级 P1  ·  红色：用户已受影响</text></svg>