    """
    LiteLLM pre-call hook — force ``stream=True`` upstream for non-streaming
    external Claude Code requests, so ``streaming_bridge`` can keep the
    Cloudflare connection alive with whitespace heartbeats during the long
    upstream wait, and finally collapse the upstream SSE back into a single
    Anthropic Message JSON object for the client.

    Why this exists
    ---------------

    Cloudflare Tunnel applies a ~100 s "Proxy Read Timeout" between the CF
    edge and the in-cluster origin. Streaming requests are protected by
    ``streaming_bridge`` which injects an SSE comment frame
    (``: keepalive\\n\\n``) every 25 s during silence — that resets CF's
    idle timer and Cloudflare never 524s.

    Non-streaming requests get no such protection. Wangsu / Anthropic
    buffer the entire response server-side and only send bytes once the
    full Message has been generated. For Opus 4.7 / Sonnet 4.6 long
    generations that's 100–700 s of complete silence on the wire → CF 524.

    Empirically observed for ``claude-code-*`` keys (24 h):

        anthropic_messages with chatcmpl-* request_id, dur > 100 s : 43
        acompletion        with chatcmpl-* request_id, dur > 100 s :  2

    These are all client-side requests that did NOT set ``stream=true``
    (typically Cursor IDE Background Agent tasks).

    How the fix works
    -----------------

    We split the problem in two layers:

    1.  **This hook (pre-call)** — for matching keys / call types, if the
        client did *not* request streaming, we flip ``data["stream"] = True``
        so LiteLLM's upstream HTTP call will be a streaming SSE request.
        We also stamp ``litellm_metadata["_force_stream_collapse"] = True``
        so ``streaming_bridge`` can detect this is a "collapsed" request.

    2.  **streaming_bridge (post-call iterator)** — when the flag is set,
        bridge buffers all upstream SSE bytes, yields a single space
        (``b" "``) every 25 s during silence (JSON parsers ignore leading
        whitespace, so this keeps Cloudflare happy without breaking the
        eventual JSON the client will parse), and at end-of-stream yields
        one final chunk: the reassembled Anthropic Message as a JSON
        object. Net effect for the client is identical to a normal
        non-streaming response, except we never go silent for > 25 s.

    The HTTP ``Content-Type`` on the response stays ``text/event-stream``
    (LiteLLM's anthropic_messages route hardcodes that). This is fine
    because the Anthropic Python SDK and all other Claude Code clients
    fall back to ``response.json()`` when ``stream=False`` was set on
    the client side, regardless of the response Content-Type — see
    ``anthropic._response.APIResponse._parse``: when content type is not
    JSON it tries ``response.json()`` first, and only raises if the body
    is genuinely unparseable.

    Gating
    ------

    Two predicates must both match before we flip ``stream``:

    *   ``user_api_key_dict.key_alias`` matches ``FORCE_STREAM_KEY_ALIASES``
        (exact, comma-separated) or ``FORCE_STREAM_KEY_PREFIXES`` (prefix,
        comma-separated). Default is the bundled
        ``claude-code-liuguoxian-50gj`` canary entry.
    *   ``call_type`` is ``anthropic_messages``. We deliberately do not
        cover ``acompletion`` in the canary because the chat-completions
        streaming format is different and reassembling it back into a
        non-streaming OpenAI ``ChatCompletion`` would need a separate code
        path. acompletion accounts for only 2/45 of observed 524s; we
        will add it once the anthropic_messages canary passes.

    Plus a third precondition: the client must NOT have set ``stream=True``
    already. Legitimate streaming requests are passed through unchanged
    and are already protected by the existing SSE-comment heartbeat.

    Source of truth
    ---------------

    This file lives at ``k8s/litellm-callbacks/force_stream.py`` and is
    mounted into the LiteLLM proxy pod via ``ConfigMap litellm-callbacks``.
    The same content is embedded inline in ``k8s/litellm-proxy.yaml``;
    keep the two in sync when editing.

    Registered in LiteLLM via ``litellm_settings.callbacks``:

        litellm_settings:
          callbacks: [..., "force_stream.force_stream", ...]

    Order matters: ``force_stream.force_stream`` MUST run before
    ``streaming_bridge.streaming_bridge`` so the flag is in place by the
    time the iterator hook fires.
    """
    from __future__ import annotations

    import logging as _stdlib_logging
    import os
    from typing import Any, Optional, Set, Tuple

    from litellm.integrations.custom_logger import CustomLogger


    _log = _stdlib_logging.getLogger("force_stream")


    _DEFAULT_CANARY_KEY_ALIASES: frozenset = frozenset({"claude-code-liuguoxian-50gj"})
    _DEFAULT_CANARY_KEY_PREFIXES: Tuple[str, ...] = ()

    # Only anthropic_messages in the initial canary. acompletion will be
    # added in a follow-up once we have a chat-completions reassembler.
    _TARGET_CALL_TYPES: frozenset = frozenset({"anthropic_messages"})


    def _load_canary_aliases() -> Set[str]:
        raw = os.environ.get("FORCE_STREAM_KEY_ALIASES")
        if raw is None:
            # Only use bundled default if neither alias nor prefix env is set.
            if os.environ.get("FORCE_STREAM_KEY_PREFIXES") is None:
                return set(_DEFAULT_CANARY_KEY_ALIASES)
            return set()
        return {item.strip() for item in raw.split(",") if item.strip()}


    def _load_canary_prefixes() -> Tuple[str, ...]:
        raw = os.environ.get("FORCE_STREAM_KEY_PREFIXES")
        if raw is None:
            return _DEFAULT_CANARY_KEY_PREFIXES
        return tuple(item.strip() for item in raw.split(",") if item.strip())


    class ForceStream(CustomLogger):
        """Pre-call hook: flip ``stream=True`` upstream and mark the request
        so ``streaming_bridge`` knows to collapse the SSE back to JSON."""

        def __init__(self) -> None:
            super().__init__()
            self._aliases: Set[str] = _load_canary_aliases()
            self._prefixes: Tuple[str, ...] = _load_canary_prefixes()

        def _alias_matches(self, key_alias: Optional[str]) -> bool:
            if not isinstance(key_alias, str):
                return False
            if key_alias in self._aliases:
                return True
            if self._prefixes and key_alias.startswith(self._prefixes):
                return True
            return False

        async def async_pre_call_hook(
            self,
            user_api_key_dict: Any,
            cache: Any,
            data: dict,
            call_type: str,
        ) -> Any:
            """LiteLLM contract: return modified data, or raise to block."""
            try:
                if call_type not in _TARGET_CALL_TYPES:
                    return data
                if not isinstance(data, dict):
                    return data
                key_alias = getattr(user_api_key_dict, "key_alias", None)
                if not self._alias_matches(key_alias):
                    return data
                # Pass legitimate streaming requests through untouched.
                if data.get("stream") is True:
                    return data

                data["stream"] = True
                md = data.setdefault("litellm_metadata", {})
                if isinstance(md, dict):
                    md["_force_stream_collapse"] = True

                try:
                    _log.info(
                        "force_stream: collapsing %s for key_alias=%s",
                        call_type,
                        key_alias,
                    )
                except Exception:
                    pass
            except Exception as exc:
                try:
                    _log.warning("force_stream: pre_call_hook error: %r", exc)
                except Exception:
                    pass
            return data


    force_stream = ForceStream()

  null_byte_sanitize.py: |
    # placeholder — populated by scripts/sync-litellm-callbacks.py write

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm-proxy
  namespace: carher
  labels:
    app: litellm-proxy
spec:
  replicas: 2
  # Zero-disruption rolling updates: always keep all existing replicas
  # Ready while surging up one new pod, so the Service never drops below
  # the desired replica count. Combined with the container's preStop +
  # terminationGracePeriodSeconds, in-flight streaming requests on a pod
  # being rotated get up to 60s to drain while new traffic is steered to
  # the other Ready pod.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: litellm-proxy
  template:
    metadata:
      labels:
        app: litellm-proxy
    spec:
      # Give in-flight streaming requests time to complete when a pod is
      # being rotated out during a rolling update. Default is 30s which
      # can cut off streaming chat completions mid-response.
      #
      # Bumped 60 -> 600 (2026-04-25): Opus 4.6/4.7 thinking-mode requests
      # routinely run 2-10 min wall-time. With 60s + 15s preStop, the
      # effective drain window was only ~45s, so any rolling update
      # initiated while a long stream was in flight would SIGKILL the
      # connection mid-response and surface to the client as
      # "socket connection closed unexpectedly" (a tunnel-side TCP RST).
      # Confirmed regression on tenggeer's claude-code-* request during
      # the force_stream canary expansion rollout.
      #
      # 600s covers >99.5% of observed long requests (worst observed:
      # 570s for Opus 4-6 with in=93k tokens). Even pathological cases
      # eventually hit upstream's own 600s cap, so a longer grace period
      # buys nothing extra.
      terminationGracePeriodSeconds: 600
      imagePullSecrets:
        - name: acr-vpc-secret
      initContainers:
        - name: prisma-migrate
          image: ghcr.io/berriai/litellm@sha256:d90ae7e09aee669c53e4b6b267c123f0e830ed3f067b8c789644a965c30acf4a
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c", "prisma db push --schema /app/litellm/proxy/schema.prisma --skip-generate --accept-data-loss"]
          envFrom:
            - secretRef:
                name: litellm-secrets
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1536Mi
        # ═══════════════════════════════════════════════════════════════
        # YAML-as-source-of-truth enforcement (added 2026-04-27).
        #
        # LiteLLM v1.82.x merges three rows from the LiteLLM_Config table
        # into runtime settings on every proxy startup, with DB winning
        # over YAML on overlapping keys:
        #   * router_settings   — _add_router_settings_from_db_config
        #     (proxy_server.py:4023). Hard merge via _update_dictionary;
        #     stale ``fallbacks`` / ``model_group_alias`` etc. silently
        #     replace YAML.
        #   * litellm_settings  — _init_callback_settings_from_db
        #     (proxy_server.py:4582+). Stale ``callbacks`` lists
        #     deregister hooks that the YAML expects to be active.
        #   * general_settings  — chicken-and-egg flip at
        #     proxy_server.py:6015 reads DB.store_model_in_db and
        #     overrides YAML's ``false``. Once flipped to True, the
        #     proxy persists admin-UI changes back to the same DB rows,
        #     re-creating the drift on the next restart.
        #
        # Symptom we hit on 2026-04-27: ``mock_testing_fallbacks=true``
        # returned HTTP 500 ``No fallback model group found`` because the
        # YAML's 13 fallback entries were lost — DB had only 4 stale
        # entries from a prior admin UI session. Three of four custom
        # callbacks (force_stream, streaming_bridge, embedding_sanitize)
        # were silently absent from the request path for the same reason.
        #
        # Fix: physically DELETE the three rows before the proxy starts.
        # YAML is then the sole source of truth on every cold start.
        # Admin UI changes still work for one pod lifetime — they simply
        # do not survive a restart, which is the intended trade.
        #
        # Idempotent: DELETE WHERE on a missing row is a no-op. Safe to
        # run on every restart, including the very first when the
        # LiteLLM_Config table is empty. Runs AFTER prisma-migrate so
        # the table is guaranteed to exist.
        # ═══════════════════════════════════════════════════════════════
        - name: wipe-db-config-rows
          image: ghcr.io/berriai/litellm@sha256:d90ae7e09aee669c53e4b6b267c123f0e830ed3f067b8c789644a965c30acf4a
          imagePullPolicy: IfNotPresent
          command: ["python3", "-c"]
          args:
            - |
              import asyncio
              import sys
              from prisma import Prisma

              ROWS = ("router_settings", "litellm_settings", "general_settings")

              async def go() -> None:
                  db = Prisma()
                  await db.connect()
                  try:
                      before = await db.query_raw(
                          'SELECT param_name FROM "LiteLLM_Config" '
                          'WHERE param_name IN ($1, $2, $3) '
                          'ORDER BY param_name',
                          *ROWS,
                      )
                      before_names = [r["param_name"] for r in before]
                      print(f"[wipe-db-config-rows] before: {before_names}", flush=True)

                      await db.execute_raw(
                          'DELETE FROM "LiteLLM_Config" '
                          'WHERE param_name IN ($1, $2, $3)',
                          *ROWS,
                      )

                      after = await db.query_raw(
                          'SELECT param_name FROM "LiteLLM_Config" '
                          'WHERE param_name IN ($1, $2, $3) '
                          'ORDER BY param_name',
                          *ROWS,
                      )
                      after_names = [r["param_name"] for r in after]
                      print(f"[wipe-db-config-rows] after : {after_names}", flush=True)

                      if after_names:
                          print(
                              "[wipe-db-config-rows] FATAL: rows still present, "
                              "DELETE did not take effect",
                              file=sys.stderr,
                              flush=True,
                          )
                          raise SystemExit(2)

                      print(
                          f"[wipe-db-config-rows] OK: removed "
                          f"{len(before_names)} row(s); LiteLLM_Config is "
                          f"clean for YAML-only startup",
                          flush=True,
                      )
                  finally:
                      await db.disconnect()

              asyncio.run(go())
          envFrom:
            - secretRef:
                name: litellm-secrets
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
      containers:
        - name: litellm
          image: ghcr.io/berriai/litellm@sha256:d90ae7e09aee669c53e4b6b267c123f0e830ed3f067b8c789644a965c30acf4a
          imagePullPolicy: IfNotPresent
          args: ["--config", "/app/config.yaml", "--port", "4000"]
          ports:
            - containerPort: 4000
              name: http
          env:
            # Gating for streaming_bridge.streaming_bridge.
            # Matching keys get: (1) SSE keepalive injection to prevent
            # Cloudflare Tunnel 524s during long Opus 4.7 thinking, and
            # (2) completion_start_time stamped on the first
            # content_block_delta so SpendLogs TTFT is meaningful rather
            # than defaulting to end_time.
            #
            # The startTime fix (monkey-patch of
            # BaseAnthropicMessagesStreamingIterator.__init__) is
            # applied globally and does NOT depend on this gate.
            #
            # All Claude Code CLI users are matched via key_alias
            # prefix. ALIASES is set empty (and explicitly non-None) so
            # the bundled default canary list does not re-add itself.
            - name: STREAMING_BRIDGE_KEY_ALIASES
              value: ""
            - name: STREAMING_BRIDGE_KEY_PREFIXES
              value: "claude-code-"
            # Gating for force_stream.force_stream (initial canary).
            # Matching keys get their non-streaming /v1/messages calls
            # collapsed via streaming_bridge: upstream is invoked with
            # stream=true, whitespace heartbeats keep CF alive, the SSE
            # is reassembled into one Anthropic Message JSON for the
            # client. This eliminates the residual ~45/day 524s on
            # non-stream long-tail requests.
            #
            # Full Claude Code CLI rollout (2026-04-25): collapse-mode
            # protection for all ``claude-code-*`` keys. Prefix gate
            # mirrors STREAMING_BRIDGE_KEY_PREFIXES and covers every
            # current and future Claude Code user without per-key
            # maintenance.
            #
            # Why this is safe to do at full scale:
            #   - The hook only fires when call_type == anthropic_messages
            #     AND the client did NOT set stream=true. Streaming
            #     clients are unaffected (they go through streaming_bridge
            #     pass-through mode).
            #   - For matching requests, force_stream flips
            #     data["stream"]=True and tags
            #     litellm_metadata["_force_stream_collapse"]=True. The
            #     bridge then buffers the upstream SSE, sends b" "
            #     keepalives every 25 s, and yields one final reassembled
            #     Message JSON. The Anthropic JS SDK and Python SDK
            #     both call response.json() on non-streaming requests
            #     regardless of Content-Type, and JSON tolerates leading
            #     whitespace, so the on-the-wire ``b"   {...}"`` parses
            #     identically to ``b"{...}"``.
            #   - Canary roster prior to this rollout (verified working):
            #       claude-code-liuguoxian-50gj  (long Sonnet 101s success)
            #       claude-code-tenggeer-qvaz    (long Opus 4-6 226s success)
            #
            # KEY_ALIASES kept empty so prefix is the sole gate. To
            # exclude a specific Claude Code key from collapse mode in
            # the future, list it explicitly here AND add an opt-out
            # check inside force_stream.py — there is currently no
            # opt-out path because we have no need for one.
            - name: FORCE_STREAM_KEY_ALIASES
              value: ""
            - name: FORCE_STREAM_KEY_PREFIXES
              value: "claude-code-"
            # Anthropic-provider httpx per-chunk read timeout, in seconds.
            #
            # When set, streaming_bridge.py monkey-patches the cached
            # ``litellm.LlmProviders.ANTHROPIC`` async httpx client at
            # module load and wraps ``get_async_httpx_client`` so any
            # future cache miss receives the same tightened timeout.
            #
            # Background: LiteLLM's ``async_anthropic_messages_handler``
            # builds upstream requests via ``httpx_client.post(stream=True)``
            # without forwarding ``request_timeout`` / ``stream_timeout``.
            # The httpx client therefore falls back to its hardcoded
            # ``Timeout(read=600)`` default, which is what produced the
            # observed "fake-success" rows for ``claude-code-tenggeer-qvaz``
            # and other ``claude-code-*`` users (duration ≈ 600 s,
            # status = success, output_tokens ≈ 0). Setting this to 120 s
            # surfaces upstream Wangsu cheliantianxia mid-stream stalls
            # as ``httpx.ReadTimeout`` after 2 minutes; streaming_bridge's
            # iterator catches the exception and emits a synthetic
            # Anthropic error frame so the client SDK retries.
            #
            # Clamped server-side to ``[30, 600]`` seconds. Unset or
            # blank reverts to LiteLLM's 600 s default on next pod
            # restart (clean rollback path).
            #
            # Mock-validated 2026-04-26: triggers correctly under stall;
            # does NOT false-positive during normal long-thinking with
            # 1 s pings; isolated to anthropic provider only (OpenAI /
            # OpenRouter clients keep their 600 s default); idempotent
            # across multiple module imports.
            - name: STREAMING_BRIDGE_HTTPX_READ_TIMEOUT_SECONDS
              value: "120"
          envFrom:
            - secretRef:
                name: litellm-secrets
            - secretRef:
                name: carher-env-keys
          resources:
            requests:
              cpu: 200m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
          livenessProbe:
            httpGet:
              path: /health/liveliness
              port: 4000
            initialDelaySeconds: 90
            periodSeconds: 15
            failureThreshold: 5
            timeoutSeconds: 15
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: 4000
            initialDelaySeconds: 90
            periodSeconds: 15
            failureThreshold: 5
            timeoutSeconds: 15
          # preStop sleep gives kube-proxy time to drop this pod's IP from
          # the Service endpoint set before uvicorn starts shutting down,
          # so new requests stop arriving before SIGTERM is delivered.
          # With terminationGracePeriodSeconds=60, the effective shutdown
          # budget is ~15s no-new-traffic + ~45s graceful drain.
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 15"]
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
              readOnly: true
            # Custom pre-call hooks live next to config.yaml so LiteLLM's
            # get_instance_fn() resolves them by relative path.
            - name: callbacks
              mountPath: /app/opus_47_fix.py
              subPath: opus_47_fix.py
              readOnly: true
            - name: callbacks
              mountPath: /app/embedding_sanitize.py
              subPath: embedding_sanitize.py
              readOnly: true
            - name: callbacks
              mountPath: /app/streaming_bridge.py
              subPath: streaming_bridge.py
              readOnly: true
            - name: callbacks
              mountPath: /app/force_stream.py
              subPath: force_stream.py
              readOnly: true
            - name: callbacks
              mountPath: /app/null_byte_sanitize.py
              subPath: null_byte_sanitize.py
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: litellm-config
        - name: callbacks
          configMap:
            name: litellm-callbacks
---
apiVersion: v1
kind: Service
metadata:
  name: litellm-proxy
  namespace: carher
  labels:
    app: litellm-proxy
spec:
  type: ClusterIP
  selector:
    app: litellm-proxy
  ports:
    - port: 4000
      targetPort: 4000
      name: http
