<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="900" viewBox="0 0 1500 900">
<style>
  .title{font-family:'Noto Sans SC',sans-serif;font-size:30px;font-weight:800;fill:#172033}
  .subtitle{font-family:'Noto Sans SC',sans-serif;font-size:15px;fill:#64748b}
  .laneTitle{font-family:'Noto Sans SC',sans-serif;font-size:18px;font-weight:800;fill:#334155}
  .nodeTitle{font-family:'Noto Sans SC',sans-serif;font-size:17px;font-weight:800;fill:#172033}
  .nodeText{font-family:'Noto Sans SC',sans-serif;font-size:13px;fill:#64748b}
  .tiny{font-family:'Noto Sans SC',sans-serif;font-size:12px;fill:#64748b}
  .pill{font-family:'Noto Sans SC',sans-serif;font-size:12px;font-weight:700;fill:#14532d}
  .mainStroke{stroke:#16a34a;stroke-width:5;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .fbStroke{stroke:#f97316;stroke-width:3;fill:none;stroke-dasharray:10 8;stroke-linecap:round;stroke-linejoin:round}
  .p1Stroke{stroke:#dc2626;stroke-width:3;fill:none;stroke-dasharray:7 7;stroke-linecap:round;stroke-linejoin:round}
</style><defs><marker id="g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#16a34a"/></marker><marker id="o" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#f97316"/></marker><marker id="r" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/></marker></defs><rect x="0" y="0" width="1500" height="900" fill="#f8fafc"/><text class="title" x="50" y="60">SPA：标准自动处理流程</text><text class="subtitle" x="52" y="92">用四段式把自动兜底、人工升级、恢复闭环拆开，方便值班执行和领导汇报</text>
<rect x="45" y="135" width="330" height="620" rx="26" fill="#ffffff" stroke="#dbe3ee" stroke-width="1.5"/><text class="laneTitle" x="69" y="169">阶段一：正常请求处理</text><rect x="410" y="135" width="300" height="620" rx="26" fill="#f0fdf4" stroke="#dbe3ee" stroke-width="1.5"/><text class="laneTitle" x="434" y="169">阶段二：LiteLLM 兜底</text><rect x="745" y="135" width="350" height="620" rx="26" fill="#fff7ed" stroke="#dbe3ee" stroke-width="1.5"/><text class="laneTitle" x="769" y="169">阶段三：OpenClaw 兜底</text><rect x="1130" y="135" width="320" height="620" rx="26" fill="#fff1f2" stroke="#dbe3ee" stroke-width="1.5"/><text class="laneTitle" x="1154" y="169">阶段四：恢复闭环</text>
<rect x="85" y="205" width="245" height="76" rx="18" fill="#ffffff" stroke="#16a34a" stroke-width="2.5"/><text class="nodeTitle" x="107" y="237">1 用户请求进入 Her</text><text class="nodeText" x="107" y="263">OpenClaw 使用默认 primary</text><rect x="85" y="325" width="245" height="76" rx="18" fill="#ffffff" stroke="#16a34a" stroke-width="2.5"/><text class="nodeTitle" x="107" y="357">2 请求 LiteLLM</text><text class="nodeText" x="107" y="383">主 provider/model</text><rect x="92" y="452" width="230" height="92" rx="18" fill="#eef8ff" stroke="#0284c7" stroke-width="2.5"/><text class="nodeTitle" x="114" y="484">3 LiteLLM 可达？</text><text class="nodeText" x="114" y="510">可达进入 Router</text><text class="nodeText" x="114" y="530">不可达交给 OpenClaw</text><rect x="445" y="205" width="230" height="86" rx="18" fill="#ffffff" stroke="#16a34a" stroke-width="2.5"/><text class="nodeTitle" x="467" y="237">4 Router 主路由</text><text class="nodeText" x="467" y="263">主供应商 / 主模型</text><rect x="445" y="345" width="230" height="90" rx="18" fill="#eef8ff" stroke="#0284c7" stroke-width="2.5"/><text class="nodeTitle" x="467" y="377">5 上游成功？</text><text class="nodeText" x="467" y="403">成功返回用户</text><text class="nodeText" x="467" y="423">失败切备用</text><rect x="445" y="500" width="230" height="92" rx="18" fill="#fff7ed" stroke="#f97316" stroke-width="2.5"/><text class="nodeTitle" x="467" y="532">6 LiteLLM fallback</text><text class="nodeText" x="467" y="558">备用模型组 / 备用账号</text>
<rect x="790" y="235" width="255" height="92" rx="18" fill="#fff7ed" stroke="#f97316" stroke-width="2.5"/><text class="nodeTitle" x="812" y="267">7 错误返回 OpenClaw</text><text class="nodeText" x="812" y="293">连接失败 / 5xx / timeout</text><rect x="790" y="385" width="255" height="92" rx="18" fill="#eef8ff" stroke="#0284c7" stroke-width="2.5"/><text class="nodeTitle" x="812" y="417">8 是否可 failover？</text><text class="nodeText" x="812" y="443">billing / rate limit / auth</text><text class="nodeText" x="812" y="463">context overflow 不切换</text><rect x="790" y="540" width="255" height="92" rx="18" fill="#fff7ed" stroke="#f97316" stroke-width="2.5"/><text class="nodeTitle" x="812" y="572">9 切直连供应商</text><text class="nodeText" x="812" y="598">Anthropic / OpenRouter / Wangsu</text>
<rect x="1175" y="250" width="230" height="92" rx="18" fill="#fff1f2" stroke="#dc2626" stroke-width="2.5"/><text class="nodeTitle" x="1197" y="282">10 人工升级</text><text class="nodeText" x="1197" y="308">两层都失败才进入 P1</text><rect x="1175" y="410" width="230" height="92" rx="18" fill="#fff7ed" stroke="#f97316" stroke-width="2.5"/><text class="nodeTitle" x="1197" y="442">11 修复与探测</text><text class="nodeText" x="1197" y="468">修 key / 补容量 / 探 primary</text><rect x="1175" y="570" width="230" height="80" rx="18" fill="#ecfdf5" stroke="#059669" stroke-width="2.5"/><text class="nodeTitle" x="1197" y="602">12 恢复主路由</text><text class="nodeText" x="1197" y="628">清除 override</text><rect x="650" y="800" width="205" height="60" rx="18" fill="#ecfdf5" stroke="#059669" stroke-width="2.5"/><text class="nodeTitle" x="672" y="832">返回用户</text><text class="nodeText" x="672" y="858">成功响应</text>
<path d="M330 243 H445" class="mainStroke" marker-end="url(#g)"/><path d="M207 281 V325" class="mainStroke" marker-end="url(#g)"/><path d="M207 401 V452" class="mainStroke" marker-end="url(#g)"/><path d="M322 498 C375 455 405 410 445 388" class="mainStroke" marker-end="url(#g)"/><path d="M675 248 C725 285 732 780 650 820" class="mainStroke" marker-end="url(#g)"/>
<path d="M560 435 V500" class="fbStroke" marker-end="url(#o)"/><path d="M675 546 C705 610 740 815 650 830" class="fbStroke" marker-end="url(#o)"/><path d="M322 498 C545 670 700 350 790 280" class="fbStroke" marker-end="url(#o)"/><path d="M1045 586 C1090 560 1120 470 1175 456" class="fbStroke" marker-end="url(#o)"/>
<path d="M1045 431 C1095 395 1120 305 1175 296" class="p1Stroke" marker-end="url(#r)"/><path d="M1290 342 V410" class="p1Stroke" marker-end="url(#r)"/><path d="M1290 502 V570" class="fbStroke" marker-end="url(#o)"/><text class="tiny" x="70" y="820">绿色：主链路  ·  橙色：自动 fallback / 恢复  ·  红色：P1 人工路径</text></svg>