# LiteLLM Proxy: unified LLM gateway with spend tracking.
# Experiment phase: single replica, no HPA.
#
# Secret is defined by the template in k8s/litellm-secrets.yaml.
# Render that file with real values before applying the Secret.
apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: carher
  labels:
    app: litellm-proxy
data:
  config.yaml: |
    model_list:
      # ═══════════════════════════════════════════
      # Sonnet / Opus: Wangsu Anthropic Direct (v2 gateway) — primary
      # Native Anthropic protocol via cheliantianxia3 gateway.
      #
      # IMPORTANT: Pricing MUST be in litellm_params (not only model_info).
      # LiteLLM bug: register_model() fails to inject model_info pricing
      # when model names collide with built-in entries. Per-deployment
      # cost path (litellm_params) is the only reliable path.
      # ═══════════════════════════════════════════

      # ── Claude Opus 4.6 via Wangsu Direct ──
      - model_name: claude-opus-4-6
        litellm_params:
          model: anthropic/anthropic.claude-opus-4-6
          api_key: os.environ/WANGSU_DIRECT_API_KEY
          api_base: https://aigateway.edgecloudapp.com/v2/gws/yqhhclqf/anthropic
          input_cost_per_token: 0.000005
          output_cost_per_token: 0.000025
          cache_read_input_token_cost: 0.0000005
          cache_creation_input_token_cost: 0.00000625
          extra_headers:
            anthropic-beta: "prompt-caching-2024-07-31,extended-cache-ttl-2025-04-11"
          cache_control_injection_points:
            - location: message
              role: system
              control:
                type: ephemeral
                ttl: "1h"
            - location: message
              role: user
              index: -1
              control:
                type: ephemeral
                ttl: "1h"
        model_info:
          id: wangsu-direct/claude-opus-4-6
          input_cost_per_token: 0.000005
          output_cost_per_token: 0.000025
          cache_read_input_token_cost: 0.0000005
          cache_creation_input_token_cost: 0.00000625

      # ── Claude Sonnet 4.6 via Wangsu Direct ──
      - model_name: claude-sonnet-4-6
        litellm_params:
          model: anthropic/anthropic.claude-sonnet-4-6
          api_key: os.environ/WANGSU_DIRECT_API_KEY
          api_base: https://aigateway.edgecloudapp.com/v2/gws/yqhhclqf/anthropic
          input_cost_per_token: 0.000003
          output_cost_per_token: 0.000015
          cache_read_input_token_cost: 0.0000003
          cache_creation_input_token_cost: 0.00000375
          extra_headers:
            anthropic-beta: "prompt-caching-2024-07-31,extended-cache-ttl-2025-04-11"
          cache_control_injection_points:
            - location: message
              role: system
              control:
                type: ephemeral
                ttl: "1h"
            - location: message
              role: user
              index: -1
              control:
                type: ephemeral
                ttl: "1h"
        model_info:
          id: wangsu-direct/claude-sonnet-4-6
          input_cost_per_token: 0.000003
          output_cost_per_token: 0.000015
          cache_read_input_token_cost: 0.0000003
          cache_creation_input_token_cost: 0.00000375

      # ═══════════════════════════════════════════
      # GPT / Gemini: OpenRouter — primary (unchanged)
      # ═══════════════════════════════════════════

      # ── GPT-5.4 via OpenRouter ──
      - model_name: gpt-5.4
        litellm_params:
          model: openrouter/openai/gpt-5.4
          api_key: os.environ/OPENROUTER_API_KEY
          input_cost_per_token: 0.0000025
          output_cost_per_token: 0.000015
        model_info:
          id: openrouter/gpt-5.4
          input_cost_per_token: 0.0000025
          output_cost_per_token: 0.000015

      # ── Gemini 3.1 Pro via OpenRouter ──
      - model_name: gemini-3.1-pro-preview
        litellm_params:
          model: openrouter/google/gemini-3.1-pro-preview
          api_key: os.environ/OPENROUTER_API_KEY
          input_cost_per_token: 0.000002
          output_cost_per_token: 0.000012
        model_info:
          id: openrouter/gemini-3.1-pro-preview
          input_cost_per_token: 0.000002
          output_cost_per_token: 0.000012

      # ═══════════════════════════════════════════
      # OpenRouter OpenAI-compat: Claude via /chat/completions
      # Used by CarHer bot (OpenAI-compat client) for:
      #   - fallback of claude-opus-4-6 / claude-sonnet-4-6 (Wangsu-primary)
      #   - primary of "openrouter-primary" cohort (e.g. even-ID carher users)
      # OpenRouter verified to support Anthropic prompt caching via the
      # standard `cache_control` field + anthropic-beta headers (2026-04-21).
      # ═══════════════════════════════════════════

      # NOTE: we intentionally use the `openrouter/` provider here (not
      # `custom_openai/`) because LiteLLM's cache_control_injection_points
      # only works for Anthropic-aware providers (anthropic, openrouter).
      # The `custom_openai/` path does NOT auto-inject cache_control
      # (verified 2026-04-22), so cache would be effectively disabled.
      #
      # Known tradeoff: LiteLLM v1.82.x has a bug in the openrouter provider's
      # /v1/responses handler where it forwards the `openrouter/` prefix to
      # OpenRouter, causing HTTP 400. For /v1/chat/completions (the common
      # bot path) this works correctly with full cache injection.
      # The 400 on /v1/responses is absorbed by the key-level fallback to
      # anthropic.claude-opus-4-X (Wangsu Direct5/6), which also has cache.
      #
      # `extra_body.provider.order` forces OpenRouter to route to Anthropic
      # first, Google Vertex second, and never Amazon Bedrock — because
      # Bedrock does not support Anthropic prompt cache via OpenRouter
      # (verified 2026-04-22 across opus-4.6, opus-4.7).
      - model_name: openrouter-claude-opus-4-6
        litellm_params:
          model: openrouter/anthropic/claude-opus-4.6
          api_key: os.environ/OPENROUTER_API_KEY
          input_cost_per_token: 0.000005
          output_cost_per_token: 0.000025
          cache_read_input_token_cost: 0.0000005
          cache_creation_input_token_cost: 0.00000625
          extra_body:
            provider:
              order: ["anthropic", "google-vertex"]
              allow_fallbacks: false
          extra_headers:
            anthropic-beta: "prompt-caching-2024-07-31,extended-cache-ttl-2025-04-11"
          cache_control_injection_points:
            - location: message
              role: system
              control:
                type: ephemeral
                ttl: "1h"
            - location: message
              role: user
              index: -1
              control:
                type: ephemeral
                ttl: "1h"
        model_info:
          id: openrouter/claude-opus-4-6
          input_cost_per_token: 0.000005
          output_cost_per_token: 0.000025
          cache_read_input_token_cost: 0.0000005
          cache_creation_input_token_cost: 0.00000625

      # Same openrouter/ + provider.order pattern as opus-4-6. sonnet-4.6
      # defaults to Google Vertex (which supports cache), so pinning is
      # technically optional; we pin for consistency with the opus family.
      - model_name: openrouter-claude-sonnet-4-6
        litellm_params:
          model: openrouter/anthropic/claude-sonnet-4.6
          api_key: os.environ/OPENROUTER_API_KEY
          input_cost_per_token: 0.000003
          output_cost_per_token: 0.000015
          cache_read_input_token_cost: 0.0000003
          cache_creation_input_token_cost: 0.00000375
          extra_body:
            provider:
              order: ["anthropic", "google-vertex"]
              allow_fallbacks: false
          extra_headers:
            anthropic-beta: "prompt-caching-2024-07-31,extended-cache-ttl-2025-04-11"
          cache_control_injection_points:
            - location: message
              role: system
              control:
                type: ephemeral
                ttl: "1h"
            - location: message
              role: user
              index: -1
              control:
                type: ephemeral
                ttl: "1h"
        model_info:
          id: openrouter/claude-sonnet-4-6
          input_cost_per_token: 0.000003
          output_cost_per_token: 0.000015
          cache_read_input_token_cost: 0.0000003
          cache_creation_input_token_cost: 0.00000375

      # Same openrouter/ + provider.order pattern as opus-4-6.
      - model_name: openrouter-claude-opus-4-7
        litellm_params:
          model: openrouter/anthropic/claude-opus-4.7
          api_key: os.environ/OPENROUTER_API_KEY
          input_cost_per_token: 0.000005
          output_cost_per_token: 0.000025
          cache_read_input_token_cost: 0.0000005
          cache_creation_input_token_cost: 0.00000625
          extra_body:
            provider:
              order: ["anthropic", "google-vertex"]
              allow_fallbacks: false
          extra_headers:
            anthropic-beta: "prompt-caching-2024-07-31,extended-cache-ttl-2025-04-11"
          cache_control_injection_points:
            - location: message
              role: system
              control:
                type: ephemeral
                ttl: "1h"
            - location: message
              role: user
              index: -1
              control:
                type: ephemeral
                ttl: "1h"
        model_info:
          id: openrouter/claude-opus-4-7
          input_cost_per_token: 0.000005
          output_cost_per_token: 0.000025
          cache_read_input_token_cost: 0.0000005
          cache_creation_input_token_cost: 0.00000625

      # ═══════════════════════════════════════════
      # Fallback: Wangsu (网宿) OpenAI compat for GPT / Gemini
      # Use custom_openai/* so LiteLLM stays on chat/completions.
      # ═══════════════════════════════════════════

      - model_name: wangsu-gpt-5.4
        litellm_params:
          model: custom_openai/gpt-5.4
          api_key: os.environ/WANGSU_API_KEY
          api_base: https://aigateway.edgecloudapp.com/v1/23dcb2866d219047ae6edd6a2724dbc2/cheliantianxia1
        model_info:
          id: wangsu/gpt-5.4
          input_cost_per_token: 0.0000025
          output_cost_per_token: 0.000015

      - model_name: wangsu-gemini-3.1-pro-preview
        litellm_params:
          model: custom_openai/gemini-3.1-pro-preview
          api_key: os.environ/WANGSU_API_KEY
          api_base: https://aigateway.edgecloudapp.com/v1/23dcb2866d219047ae6edd6a2724dbc2/cheliantianxia1
        model_info:
          id: wangsu/gemini-3.1-pro-preview
          input_cost_per_token: 0.000002
          output_cost_per_token: 0.000012

      # ═══════════════════════════════════════════
      # Provider: Wangsu Anthropic Direct Mode (v2 gateway)
      # Native Anthropic protocol for Cursor / Claude Code users.
      # Gateway: cheliantianxia5, schema: anthropic, strict model match.
      #
      # BUG WORKAROUND (LiteLLM v1.82.6):
      # register_model() fails to inject custom pricing when model_info.id
      # collides with built-in entries (bedrock_converse 'anthropic.claude-sonnet-4-6')
      # or is absent from the bundled model_prices JSON ('anthropic.claude-opus-4-6').
      # Cost calc resolves model_without_prefix = 'anthropic.claude-*' but finds
      # either wrong pricing (bedrock) or nothing -> spend=$0.
      # Fix: duplicate pricing into litellm_params so the per-deployment cost
      # path is used, AND use unique model_info.id to avoid collisions.
      # ═══════════════════════════════════════════

      - model_name: anthropic.claude-sonnet-4-6
        litellm_params:
          model: anthropic/anthropic.claude-sonnet-4-6
          api_key: os.environ/WANGSU_DIRECT5_API_KEY
          api_base: https://aigateway.edgecloudapp.com/v2/gws/sqix2pnh/anthropic
          input_cost_per_token: 0.000003
          output_cost_per_token: 0.000015
          cache_read_input_token_cost: 0.0000003
          cache_creation_input_token_cost: 0.00000375
          extra_headers:
            anthropic-beta: "prompt-caching-2024-07-31,extended-cache-ttl-2025-04-11"
          cache_control_injection_points:
            - location: message
              role: system
              control:
                type: ephemeral
                ttl: "1h"
            - location: message
              role: user
              index: -1
              control:
                type: ephemeral
                ttl: "1h"
        model_info:
          id: wangsu-direct5/claude-sonnet-4-6
          input_cost_per_token: 0.000003
          output_cost_per_token: 0.000015
          cache_read_input_token_cost: 0.0000003
          cache_creation_input_token_cost: 0.00000375

      - model_name: anthropic.claude-opus-4-6
        litellm_params:
          model: anthropic/anthropic.claude-opus-4-6
          api_key: os.environ/WANGSU_DIRECT5_API_KEY
          api_base: https://aigateway.edgecloudapp.com/v2/gws/sqix2pnh/anthropic
          input_cost_per_token: 0.000005
          output_cost_per_token: 0.000025
          cache_read_input_token_cost: 0.0000005
          cache_creation_input_token_cost: 0.00000625
          extra_headers:
            anthropic-beta: "prompt-caching-2024-07-31,extended-cache-ttl-2025-04-11"
          cache_control_injection_points:
            - location: message
              role: system
              control:
                type: ephemeral
                ttl: "1h"
            - location: message
              role: user
              index: -1
              control:
                type: ephemeral
                ttl: "1h"
        model_info:
          id: wangsu-direct5/claude-opus-4-6
          input_cost_per_token: 0.000005
          output_cost_per_token: 0.000025
          cache_read_input_token_cost: 0.0000005
          cache_creation_input_token_cost: 0.00000625

      - model_name: anthropic.claude-haiku-4-5
        litellm_params:
          model: anthropic/anthropic.claude-haiku-4-5
          api_key: os.environ/WANGSU_DIRECT5_API_KEY
          api_base: https://aigateway.edgecloudapp.com/v2/gws/sqix2pnh/anthropic
          input_cost_per_token: 0.000001
          output_cost_per_token: 0.000005
          cache_read_input_token_cost: 0.0000001
          cache_creation_input_token_cost: 0.00000125
          extra_headers:
            anthropic-beta: "prompt-caching-2024-07-31,extended-cache-ttl-2025-04-11"
          cache_control_injection_points:
            - location: message
              role: system
              control:
                type: ephemeral
                ttl: "1h"
            - location: message
              role: user
              index: -1
              control:
                type: ephemeral
                ttl: "1h"
        model_info:
          id: wangsu-direct5/claude-haiku-4-5
          input_cost_per_token: 0.000001
          output_cost_per_token: 0.000005
          cache_read_input_token_cost: 0.0000001
          cache_creation_input_token_cost: 0.00000125

      # ═══════════════════════════════════════════
      # Provider: Wangsu Anthropic Direct Mode (v2 gateway) — cheliantianxia6
      # Gateway id: af1ho8mp. Initially opt-in only: restricted to specific
      # virtual keys via per-key `models` allowlist (e.g. carher-1000 and
      # claude-code-liuguoxian-50gj). Pricing identical to Opus 4.6.
      # ═══════════════════════════════════════════

      - model_name: anthropic.claude-opus-4-7
        litellm_params:
          model: anthropic/anthropic.claude-opus-4-7
          api_key: os.environ/WANGSU_DIRECT6_API_KEY
          api_base: https://aigateway.edgecloudapp.com/v2/gws/af1ho8mp/anthropic
          input_cost_per_token: 0.000005
          output_cost_per_token: 0.000025
          cache_read_input_token_cost: 0.0000005
          cache_creation_input_token_cost: 0.00000625
          extra_headers:
            anthropic-beta: "prompt-caching-2024-07-31,extended-cache-ttl-2025-04-11"
          cache_control_injection_points:
            - location: message
              role: system
              control:
                type: ephemeral
                ttl: "1h"
            - location: message
              role: user
              index: -1
              control:
                type: ephemeral
                ttl: "1h"
        model_info:
          id: wangsu-direct6/claude-opus-4-7
          input_cost_per_token: 0.000005
          output_cost_per_token: 0.000025
          cache_read_input_token_cost: 0.0000005
          cache_creation_input_token_cost: 0.00000625

      # ═══════════════════════════════════════════
      # Provider: OpenRouter Anthropic-native (/v1/messages passthrough)
      # For Claude Code / Cursor users that call LiteLLM's Anthropic-native
      # /v1/messages endpoint but want OpenRouter as the primary.
      # OpenRouter exposes an Anthropic-compatible /api/v1/messages endpoint
      # (verified 2026-04-21), so LiteLLM can passthrough with the `anthropic`
      # provider + api_base override, preserving cache_control / tool_use /
      # thinking fields with zero protocol-conversion loss.
      # ═══════════════════════════════════════════

      - model_name: anthropic.openrouter.claude-sonnet-4-6
        litellm_params:
          model: anthropic/anthropic/claude-sonnet-4.6
          api_base: https://openrouter.ai/api
          api_key: os.environ/OPENROUTER_API_KEY
          input_cost_per_token: 0.000003
          output_cost_per_token: 0.000015
          cache_read_input_token_cost: 0.0000003
          cache_creation_input_token_cost: 0.00000375
          extra_headers:
            anthropic-beta: "prompt-caching-2024-07-31,extended-cache-ttl-2025-04-11"
          cache_control_injection_points:
            - location: message
              role: system
              control:
                type: ephemeral
                ttl: "1h"
            - location: message
              role: user
              index: -1
              control:
                type: ephemeral
                ttl: "1h"
        model_info:
          id: openrouter-anthropic/claude-sonnet-4-6
          input_cost_per_token: 0.000003
          output_cost_per_token: 0.000015
          cache_read_input_token_cost: 0.0000003
          cache_creation_input_token_cost: 0.00000375

      - model_name: anthropic.openrouter.claude-opus-4-6
        litellm_params:
          model: anthropic/anthropic/claude-opus-4.6
          api_base: https://openrouter.ai/api
          api_key: os.environ/OPENROUTER_API_KEY
          input_cost_per_token: 0.000005
          output_cost_per_token: 0.000025
          cache_read_input_token_cost: 0.0000005
          cache_creation_input_token_cost: 0.00000625
          extra_headers:
            anthropic-beta: "prompt-caching-2024-07-31,extended-cache-ttl-2025-04-11"
          cache_control_injection_points:
            - location: message
              role: system
              control:
                type: ephemeral
                ttl: "1h"
            - location: message
              role: user
              index: -1
              control:
                type: ephemeral
                ttl: "1h"
        model_info:
          id: openrouter-anthropic/claude-opus-4-6
          input_cost_per_token: 0.000005
          output_cost_per_token: 0.000025
          cache_read_input_token_cost: 0.0000005
          cache_creation_input_token_cost: 0.00000625

      - model_name: anthropic.openrouter.claude-opus-4-7
        litellm_params:
          model: anthropic/anthropic/claude-opus-4.7
          api_base: https://openrouter.ai/api
          api_key: os.environ/OPENROUTER_API_KEY
          input_cost_per_token: 0.000005
          output_cost_per_token: 0.000025
          cache_read_input_token_cost: 0.0000005
          cache_creation_input_token_cost: 0.00000625
          extra_headers:
            anthropic-beta: "prompt-caching-2024-07-31,extended-cache-ttl-2025-04-11"
          cache_control_injection_points:
            - location: message
              role: system
              control:
                type: ephemeral
                ttl: "1h"
            - location: message
              role: user
              index: -1
              control:
                type: ephemeral
                ttl: "1h"
        model_info:
          id: openrouter-anthropic/claude-opus-4-7
          input_cost_per_token: 0.000005
          output_cost_per_token: 0.000025
          cache_read_input_token_cost: 0.0000005
          cache_creation_input_token_cost: 0.00000625

      # ═══════════════════════════════════════════
      # OpenRouter-only models (no Wangsu equivalent)
      # These only have OpenRouter routing, no primary/fallback split.
      # ═══════════════════════════════════════════

      # ── MiniMax M2.7 via OpenRouter ──
      - model_name: minimax-m2.7
        litellm_params:
          model: openrouter/minimax/minimax-m2.7
          api_key: os.environ/OPENROUTER_API_KEY
          input_cost_per_token: 0.0000005
          output_cost_per_token: 0.0000015
        model_info:
          id: openrouter/minimax-m2.7
          input_cost_per_token: 0.0000005
          output_cost_per_token: 0.0000015

      # ── GLM-5 via OpenRouter ──
      - model_name: glm-5
        litellm_params:
          model: openrouter/z-ai/glm-5
          api_key: os.environ/OPENROUTER_API_KEY
          input_cost_per_token: 0.000001
          output_cost_per_token: 0.000003
        model_info:
          id: openrouter/glm-5
          input_cost_per_token: 0.000001
          output_cost_per_token: 0.000003

      # ── GPT-5.3 Codex via OpenRouter ──
      - model_name: gpt-5.3-codex
        litellm_params:
          model: openrouter/openai/gpt-5.3-codex
          api_key: os.environ/OPENROUTER_API_KEY
          input_cost_per_token: 0.000003
          output_cost_per_token: 0.000015
        model_info:
          id: openrouter/gpt-5.3-codex
          input_cost_per_token: 0.000003
          output_cost_per_token: 0.000015

      # ═══════════════════════════════════════════
      # Embedding
      # ═══════════════════════════════════════════

      # ── BGE-M3 via OpenRouter (memory search) ──
      # Official OpenRouter pricing (confirmed 2026-04-21):
      # https://openrouter.ai/baai/bge-m3/pricing
      #   Input:  $0.01 per 1M tokens  (= 1e-8 per token)
      #   Output: $0.00
      # Both litellm_params and model_info carry the pricing to match the
      # double-write pattern used by other models in this config (LiteLLM
      # v1.82.x register_model() reliability: per-deployment cost path).
      - model_name: BAAI/bge-m3
        litellm_params:
          model: openrouter/BAAI/bge-m3
          api_key: os.environ/OPENROUTER_API_KEY
          api_base: https://openrouter.ai/api/v1
          input_cost_per_token: 0.00000001
          output_cost_per_token: 0
        model_info:
          id: openrouter/bge-m3
          mode: embedding
          input_cost_per_token: 0.00000001
          output_cost_per_token: 0

    router_settings:
      fallbacks:
        # ── Wangsu-primary Claude (OpenAI-compat, bot default) ──
        - claude-opus-4-6: ["openrouter-claude-opus-4-6"]
        - claude-sonnet-4-6: ["openrouter-claude-sonnet-4-6"]
        - gpt-5.4: ["wangsu-gpt-5.4"]
        - gemini-3.1-pro-preview: ["wangsu-gemini-3.1-pro-preview"]
        # opus-4-7 lives only on cheliantianxia6 (af1ho8mp). If it returns
        # 400 (e.g. upstream schema drift) silently degrade to opus-4-6 so
        # bot users never see a hard error. opus-4-6 then has its own
        # openrouter fallback further below.
        - anthropic.claude-opus-4-7: ["anthropic.claude-opus-4-6", "openrouter-claude-opus-4-6"]
        # ── OpenRouter-primary Claude (OpenAI-compat, opt-in cohort) ──
        # Symmetric fallback to Wangsu Direct5 when OpenRouter fails.
        - openrouter-claude-opus-4-7: ["anthropic.claude-opus-4-7"]
        - openrouter-claude-opus-4-6: ["anthropic.claude-opus-4-6"]
        - openrouter-claude-sonnet-4-6: ["anthropic.claude-sonnet-4-6"]
        # ── OpenRouter-primary Claude (Anthropic-native, Claude Code cohort) ──
        - anthropic.openrouter.claude-opus-4-7: ["anthropic.claude-opus-4-7"]
        - anthropic.openrouter.claude-opus-4-6: ["anthropic.claude-opus-4-6"]
        - anthropic.openrouter.claude-sonnet-4-6: ["anthropic.claude-sonnet-4-6"]

    litellm_settings:
      drop_params: true
      num_retries: 2
      request_timeout: 300
      stream_timeout: 120
      telemetry: false
      return_response_headers: true
      # Pre-call hooks (run in order, one file each in ConfigMap litellm-callbacks):
      # - opus_47_fix.thinking_schema_fix: rewrite legacy thinking.type=enabled /
      #   reasoning_effort payloads to the 2026 adaptive schema for opus-4-7+.
      #   Covers carher's OpenAI chat path and Claude Code / Cursor's Anthropic-
      #   native /v1/messages path.
      # - embedding_sanitize.embedding_sanitize: strip lone UTF-16 surrogates
      #   from embedding inputs before Python httpx tries to UTF-8 encode them
      #   (Node.js clients sometimes byte-slice emoji, producing bare \ud8xx
      #   code points that would otherwise throw `surrogates not allowed`).
      # - streaming_bridge.streaming_bridge: canary wrapper around the
      #   anthropic_messages (/v1/messages) SSE iterator. Injects keepalive
      #   comment frames to prevent Cloudflare Tunnel 524 timeouts on long
      #   Opus 4.7 thinking stretches, and stamps completion_start_time on
      #   the first chunk so SpendLogs TTFT no longer defaults to end_time.
      #   Gated on user_api_key_dict.key_alias — see the source file for the
      #   default canary list + STREAMING_BRIDGE_KEY_ALIASES env override.
      # Source files live under k8s/litellm-callbacks/ and are mounted into
      # /app/<file>.py by the litellm-callbacks ConfigMap + pod volumeMounts.
      callbacks: ["opus_47_fix.thinking_schema_fix", "embedding_sanitize.embedding_sanitize", "streaming_bridge.streaming_bridge"]

    general_settings:
      master_key: os.environ/LITELLM_MASTER_KEY
      store_model_in_db: false
      database_url: os.environ/DATABASE_URL
      # Always auto-inject stream_options.include_usage=true on streaming
      # requests. Without this, OpenAI-compatible clients that omit the flag
      # get no usage chunk from streaming responses, and:
      #   (a) LiteLLM_SpendLogs occasionally loses entries for streamed calls
      #   (b) CarHer's Feishu footer shows "?/400k" because pi-ai can't read
      #       prompt/completion tokens from the stream.
      # LiteLLM applies this BEFORE function_setup + pre_call_hook, so it is
      # the only reliable place to enforce the flag on every upstream call.
      always_include_stream_usage: true
---
# Custom pre-call hook: rewrite legacy Anthropic "thinking" schema to the
# 2026 adaptive schema for opus-4-7+.
#
# stream_options.include_usage injection is handled by
# general_settings.always_include_stream_usage: true above — that path runs
# before function_setup, which is the only stage that reliably propagates the
# flag to upstream providers. Injecting from a pre-call hook happens too late.
#
# See k8s/litellm-callbacks/opus_47_fix.py for the canonical source — keep
# the two in sync when editing.
apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-callbacks
  namespace: carher
  labels:
    app: litellm-proxy
data:
  opus_47_fix.py: |
    """
    LiteLLM pre-call hook — thinking schema rewrite (opus-4-7+).

    See k8s/litellm-callbacks/opus_47_fix.py for the canonical source.
    """
    from __future__ import annotations

    from typing import Any, Dict, Optional, Union

    from litellm.integrations.custom_logger import CustomLogger
    import litellm


    NEEDS_ADAPTIVE_MODELS = (
        "opus-4-7",
        "opus_4_7",
        "opus-4.7",
        "opus_4.7",
    )


    EFFORT_MAP_FROM_OPENAI = {
        "minimal": "low",
        "low": "low",
        "medium": "medium",
        "high": "high",
        "max": "max",
    }


    def _budget_to_effort(budget_tokens: int) -> str:
        if budget_tokens <= 8192:
            return "low"
        if budget_tokens <= 32768:
            return "medium"
        return "high"


    def _is_target_model(*model_candidates: Optional[str]) -> bool:
        for m in model_candidates:
            if not isinstance(m, str):
                continue
            ml = m.lower()
            if any(tag in ml for tag in NEEDS_ADAPTIVE_MODELS):
                return True
        return False


    def _rewrite_thinking(data: Dict[str, Any]) -> bool:
        changed = False

        reasoning_effort = data.pop("reasoning_effort", None)
        effort_from_re: Optional[str] = None
        if reasoning_effort is not None:
            effort_from_re = EFFORT_MAP_FROM_OPENAI.get(
                str(reasoning_effort).lower(), "medium"
            )

        thinking = data.get("thinking")
        effort_from_thinking: Optional[str] = None
        if isinstance(thinking, dict) and thinking.get("type") == "enabled":
            raw_budget = thinking.get("budget_tokens")
            try:
                budget = int(raw_budget) if raw_budget is not None else 4096
            except (TypeError, ValueError):
                budget = 4096
            effort_from_thinking = _budget_to_effort(budget)

        effort = effort_from_re or effort_from_thinking
        if effort is None and reasoning_effort is None:
            return changed

        final_effort = effort or "medium"

        existing_oc = data.get("output_config")
        oc: Dict[str, Any] = dict(existing_oc) if isinstance(existing_oc, dict) else {}
        oc.setdefault("effort", final_effort)
        data["output_config"] = oc

        data["thinking"] = {"type": "adaptive"}
        changed = True

        return changed


    class ThinkingSchemaFix(CustomLogger):
        """Pre-call hook: rewrite opus-4-7 thinking params to adaptive schema."""

        async def async_pre_call_hook(
            self,
            user_api_key_dict: Any,
            cache: Any,
            data: Dict[str, Any],
            call_type: Any,
        ) -> Optional[Union[Exception, str, Dict[str, Any]]]:
            try:
                if not isinstance(data, dict):
                    return data

                model_group: Optional[str] = None
                meta = data.get("metadata") or data.get("litellm_metadata") or {}
                if isinstance(meta, dict):
                    model_group = meta.get("model_group")

                if not _is_target_model(data.get("model"), model_group):
                    return data

                if _rewrite_thinking(data):
                    try:
                        litellm.print_verbose(
                            "[opus_47_fix] rewrote thinking schema "
                            f"model={data.get('model')!r} call_type={call_type!r} "
                            f"new_thinking={data.get('thinking')} "
                            f"output_config={data.get('output_config')}"
                        )
                    except Exception:
                        pass
            except Exception as exc:
                try:
                    litellm.print_verbose(f"[opus_47_fix] ERROR: {exc!r}")
                except Exception:
                    pass
            return data


    thinking_schema_fix = ThinkingSchemaFix()

  embedding_sanitize.py: |
    """
    LiteLLM pre-call hook — strip lone UTF-16 surrogates from embedding inputs.
    
    Problem
    -------
    Node.js callers (e.g. the carher bot) sometimes emit text containing lone
    UTF-16 surrogates (U+D800..U+DFFF) because of byte-level slicing that cuts
    an emoji in half. Node.js HTTP clients silently replace such code points
    with U+FFFD when serializing the request body, so directly-connected
    OpenRouter calls appeared to work. LiteLLM forwards those requests through
    Python httpx, which is strict: `str.encode('utf-8')` raises
    `UnicodeEncodeError: surrogates not allowed` before the request is ever
    sent upstream, bubbling up as a 500 (and eventually a 404 via the
    `no fallback for bge-m3` path) to the bot.
    
    Fix
    ---
    On `embedding`/`aembedding` calls, sanitize the `input` field by dropping
    any lone surrogate code points. Behavior now matches the lenient Node.js
    path. The dropped bytes are never valid characters on their own, so there
    is no real semantic loss.
    
    This hook only touches embedding calls; all other call types pass through
    unchanged.
    """
    from __future__ import annotations
    
    import re
    from typing import Any, Dict, Optional, Union
    
    from litellm.integrations.custom_logger import CustomLogger
    import litellm
    
    
    # Matches any lone surrogate code unit (U+D800..U+DFFF). Properly paired
    # surrogates are collapsed to a single Python str code point by CPython,
    # so this regex only fires on broken ones.
    _LONE_SURROGATE_RE = re.compile(r"[\ud800-\udfff]")
    
    
    def _sanitize(value: Any) -> Any:
        """Recursively strip lone surrogates from str / list[str] / dict values."""
        if isinstance(value, str):
            return _LONE_SURROGATE_RE.sub("", value)
        if isinstance(value, list):
            return [_sanitize(v) for v in value]
        if isinstance(value, dict):
            return {k: _sanitize(v) for k, v in value.items()}
        return value
    
    
    class EmbeddingSanitize(CustomLogger):
        """Pre-call hook: strip lone surrogates from embedding inputs."""
    
        _EMBED_CALL_TYPES = frozenset({"embedding", "aembedding"})
    
        async def async_pre_call_hook(
            self,
            user_api_key_dict: Any,
            cache: Any,
            data: Dict[str, Any],
            call_type: Any,
        ) -> Optional[Union[Exception, str, Dict[str, Any]]]:
            try:
                if not isinstance(data, dict):
                    return data
                if call_type not in self._EMBED_CALL_TYPES:
                    return data
    
                orig = data.get("input")
                if orig is None:
                    return data
    
                cleaned = _sanitize(orig)
                if cleaned != orig:
                    try:
                        litellm.print_verbose(
                            "[embedding_sanitize] stripped lone surrogates from input "
                            f"(call_type={call_type!r}, model={data.get('model')!r})"
                        )
                    except Exception:
                        pass
                    data["input"] = cleaned
            except Exception as exc:
                # Never block the request on this hook's failure: if sanitize
                # itself errors, just pass the original data through.
                try:
                    litellm.print_verbose(f"[embedding_sanitize] ERROR: {exc!r}")
                except Exception:
                    pass
            return data
    
    
    embedding_sanitize = EmbeddingSanitize()

  streaming_bridge.py: |
    """
    LiteLLM streaming bridge — SSE heartbeat + TTFT fix for the
    ``anthropic_messages`` (/v1/messages) passthrough path.

    Three independent problems this module addresses
    ------------------------------------------------

    1.  **524 origin timeouts on Claude Code CLI clients.**

        Claude Code CLI users hit ``https://litellm.carher.net`` → Cloudflare
        Tunnel → in-cluster LiteLLM. Cloudflare free/Pro applies a
        ~100–120 s "Proxy Read Timeout" to the *origin* stream: if the
        tunneled response emits no bytes in that window, Cloudflare
        drops the connection and returns 524.

        When claude-opus-4-7 on the Wangsu cheliantianxia6 gateway enters
        extended ``thinking`` (e.g. large tool loop context), the upstream
        can stay silent well past 100 s before the first visible byte
        arrives. Internal carher bots are unaffected — they talk to
        ``litellm-proxy.carher.svc:4000`` directly and skip Cloudflare
        entirely — but external claude-code CLI traffic keeps 524ing.

    2.  **``LiteLLM_SpendLogs.startTime`` is captured at the wrong moment
        for every ``anthropic_messages`` request (upstream bug).**

        In ``litellm/llms/anthropic/experimental_pass_through/messages/
        streaming_iterator.py``, ``BaseAnthropicMessagesStreamingIterator.
        __init__`` does:

            self.start_time = datetime.now()

        and that timestamp is what gets threaded all the way down to
        ``async_success_handler(start_time=...)`` → ``get_logging_payload`` →
        ``LiteLLM_SpendLogs.startTime``. But this ``__init__`` runs AFTER
        ``await async_httpx_client.post(stream=True)`` has returned, which
        means AFTER the upstream HTTP response status + headers have been
        received. In practice Wangsu buffers the first batch of SSE frames
        server-side and flushes headers together with
        ``message_start + content_block_start + ping +
        content_block_delta`` in a single ~600 B TCP chunk. So the
        iterator's ``self.start_time`` is essentially the same instant as
        the first content byte, and ``completionStartTime - startTime``
        collapses to ≈ 0.

        The ``acompletion`` path (/v1/chat/completions, what carher bots
        use) avoids this entirely because ``function_setup`` initializes
        ``Logging(start_time=<proxy entry time>)`` and ``CustomStreamWrapper``
        stamps ``completion_start_time`` on the first chunk. That is why
        carher's Opus 4.7 SpendLogs have correct TTFT and Duration while
        claude-code's Opus 4.7 SpendLogs do not — the route determines the
        code path, not the model.

    3.  **``completionStartTime`` is never set on the passthrough path, so
        LiteLLM falls back to ``end_time``.**

        ``litellm_core_utils/litellm_logging.py`` has:

            if self.completion_start_time is None:
                self.completion_start_time = end_time

        which makes ``TTFT == Duration`` for half the ``anthropic_messages``
        rows (the ones whose requests ran long enough that our pre-call
        hook wasn't in effect). We need to explicitly stamp
        ``completion_start_time`` when the first user-visible token arrives.

    Fix
    ---

    This module does two things at import time + one thing per request:

    *   **(patch, global)** Replaces
        ``BaseAnthropicMessagesStreamingIterator.__init__`` with a version
        that pulls the start time from
        ``litellm_logging_obj.start_time`` (the real proxy-entry time set
        by ``function_setup`` in
        ``litellm/proxy/common_request_processing.py``) whenever it is
        available. Falls back to ``datetime.now()`` for safety. Applied
        unconditionally to every ``anthropic_messages`` request because
        proxy-entry time is semantically the right value for
        ``LiteLLM_SpendLogs.startTime`` in every case — this removes the
        upstream bug's effect on Duration as well.

    *   **(hook, gated)** Registers an
        ``async_post_call_streaming_iterator_hook`` callback. For requests
        matching the gate (``CANARY_KEY_ALIASES`` + call_type ==
        ``anthropic_messages``) we wrap the upstream byte iterator with a
        pre-fetching async generator that:

        * Scans the upstream bytes for the first ``content_block_delta``
          SSE event and at that moment calls
          ``logging_obj._update_completion_start_time(datetime.now())``.
          This is the first frame that carries user-visible token payload
          (``text_delta``, ``thinking_delta``, ``input_json_delta``). It
          suppresses the ``end_time`` fallback so
          ``LiteLLM_SpendLogs.completionStartTime`` reflects a real TTFT.
        * If ``HEARTBEAT_INTERVAL_SECONDS`` elapse without a chunk, emits an
          SSE comment frame (``b": keepalive\\n\\n"``). Per the EventSource
          spec, any compliant SSE client (incl. all Anthropic SDKs and
          claude-code CLI) silently ignores lines starting with ``:``.
          Cloudflare sees activity on the wire and does not time out.

    Combined effect for canary requests
    -----------------------------------

        startTime            = proxy entry (from logging_obj.start_time)
        completionStartTime  = first content_block_delta from upstream
        endTime              = end of request
        TTFT  = completionStartTime - startTime
              = time from client-perceived request start until upstream's
                first model-output token reached us — a number users can
                actually reason about.
        Duration = endTime - startTime
                 = full request wall time.

    For non-canary requests the hook is inactive, so completionStartTime
    still falls back to endTime and TTFT still == Duration. That's no
    worse than the existing behavior; it just doesn't benefit from the hook.
    startTime is corrected for everyone.

    Gating (canary strategy)
    ------------------------

    Two narrow predicates must match before we wrap the iterator:

        * ``user_api_key_dict.key_alias`` matches either
          ``STREAMING_BRIDGE_KEY_ALIASES`` (exact, comma-separated) or
          ``STREAMING_BRIDGE_KEY_PREFIXES`` (prefix, comma-separated). At
          least one env var should be set in production; if neither is set
          the bundled default matches only ``claude-code-liuguoxian-50gj``.
        * ``logging_obj.call_type == "anthropic_messages"``.

    The __init__ monkey-patch is NOT gated — it's a correctness fix that
    makes LiteLLM_SpendLogs.startTime match what every other call_type
    already stores.

    Heartbeat interval is tunable via ``STREAMING_BRIDGE_HEARTBEAT_SECONDS``
    (default 25 s — 4× safety margin under Cloudflare's ~100 s limit).

    Registered in LiteLLM via ``litellm_settings.callbacks``:

        litellm_settings:
          callbacks: ["streaming_bridge.streaming_bridge"]
    """
    from __future__ import annotations

    import asyncio
    import datetime
    import logging as _stdlib_logging
    import os
    from typing import Any, AsyncIterator, Optional, Set, Tuple

    from litellm.integrations.custom_logger import CustomLogger
    import litellm


    _log = _stdlib_logging.getLogger("streaming_bridge")


    # Default canary: only liuguoxian's Claude Code key when no env is set.
    # In production we expect ``STREAMING_BRIDGE_KEY_PREFIXES=claude-code-``
    # so every Claude Code CLI user is covered without maintaining a list.
    _DEFAULT_CANARY_KEY_ALIASES: frozenset = frozenset({"claude-code-liuguoxian-50gj"})
    _DEFAULT_CANARY_KEY_PREFIXES: Tuple[str, ...] = ()

    # Well below Cloudflare's ~100 s origin read timeout.
    _DEFAULT_HEARTBEAT_SECONDS: float = 25.0

    # Only the passthrough path has the TTFT bug; acompletion handles its
    # own completion_start_time via CustomStreamWrapper.
    _TARGET_CALL_TYPE: str = "anthropic_messages"

    # SSE comment frame. Lines starting with ':' are ignored by compliant
    # SSE clients, but the bytes on the wire reset Cloudflare's idle timer.
    _HEARTBEAT_CHUNK: bytes = b": keepalive\n\n"

    # First SSE event that carries actual model output (text_delta,
    # thinking_delta, input_json_delta). Seeing this marker in the raw byte
    # stream is what we treat as "first token produced" for TTFT purposes.
    _CONTENT_DELTA_MARKER: bytes = b"content_block_delta"

    # Upper bound on how many bytes we retain while scanning for the marker.
    # In practice message_start + content_block_start + a few pings stay
    # well under 4 KB; 64 KB leaves plenty of headroom while still capping
    # worst-case buffering for a request that never emits a delta.
    _SCAN_BUFFER_LIMIT: int = 64 * 1024


    def _load_canary_aliases() -> Set[str]:
        raw = os.environ.get("STREAMING_BRIDGE_KEY_ALIASES")
        if raw is None:
            # Only fall back to the bundled default when NO env var is
            # configured at all. If the operator explicitly sets
            # STREAMING_BRIDGE_KEY_PREFIXES (even empty), that signals
            # prefix-only gating and we should not silently add the default.
            if os.environ.get("STREAMING_BRIDGE_KEY_PREFIXES") is None:
                return set(_DEFAULT_CANARY_KEY_ALIASES)
            return set()
        return {item.strip() for item in raw.split(",") if item.strip()}


    def _load_canary_prefixes() -> Tuple[str, ...]:
        raw = os.environ.get("STREAMING_BRIDGE_KEY_PREFIXES")
        if raw is None:
            return _DEFAULT_CANARY_KEY_PREFIXES
        return tuple(item.strip() for item in raw.split(",") if item.strip())


    def _load_heartbeat_seconds() -> float:
        raw = os.environ.get("STREAMING_BRIDGE_HEARTBEAT_SECONDS")
        if not raw:
            return _DEFAULT_HEARTBEAT_SECONDS
        try:
            value = float(raw)
        except (TypeError, ValueError):
            return _DEFAULT_HEARTBEAT_SECONDS
        if value < 1.0:
            return 1.0
        if value > 90.0:
            return 90.0
        return value


    def _chunk_bytes_view(chunk: Any) -> Optional[bytes]:
        """Return a bytes view of the chunk iff it can be scanned for the marker.

        The anthropic_messages passthrough always yields bytes. Anything
        else (dict / str / None) we skip — we do not want to stamp TTFT on
        unexpected chunk shapes.
        """
        if isinstance(chunk, (bytes, bytearray)):
            return bytes(chunk) if chunk else None
        return None


    def _patch_base_anthropic_streaming_iterator() -> None:
        """Pin ``BaseAnthropicMessagesStreamingIterator.start_time`` to
        ``litellm_logging_obj.start_time`` (proxy entry time).

        The upstream class captures ``self.start_time = datetime.now()``
        inside ``__init__`` which runs AFTER the upstream HTTP response
        headers have arrived. Wangsu/Anthropic flushes headers together with
        the first SSE events, so this timestamp is essentially identical
        to the moment the first content token reaches us, collapsing TTFT
        to ≈ 0. The correct value is ``logging_obj.start_time``, set by
        ``function_setup`` the instant the request entered the proxy.

        The patch is idempotent and fails open (falls back to
        ``datetime.now()``) if ``litellm_logging_obj`` ever lacks a usable
        start_time.
        """
        try:
            from litellm.llms.anthropic.experimental_pass_through.messages.streaming_iterator import (
                BaseAnthropicMessagesStreamingIterator,
            )
        except Exception as exc:
            _log.warning(
                "streaming_bridge: cannot import BaseAnthropicMessagesStreamingIterator: %r",
                exc,
            )
            return

        original_init = BaseAnthropicMessagesStreamingIterator.__init__
        if getattr(original_init, "_streaming_bridge_patched", False):
            return  # already patched (e.g. module imported twice)

        def patched_init(self, litellm_logging_obj, request_body):  # type: ignore[no-untyped-def]
            self.litellm_logging_obj = litellm_logging_obj
            self.request_body = request_body

            proxy_entry_time = getattr(litellm_logging_obj, "start_time", None)
            if isinstance(proxy_entry_time, datetime.datetime):
                self.start_time = proxy_entry_time
            else:
                self.start_time = datetime.datetime.now()

        patched_init._streaming_bridge_patched = True  # type: ignore[attr-defined]
        BaseAnthropicMessagesStreamingIterator.__init__ = patched_init
        _log.info(
            "streaming_bridge: patched BaseAnthropicMessagesStreamingIterator.__init__"
            " to use logging_obj.start_time"
        )


    # Apply the __init__ patch at import time so every subsequent
    # /v1/messages request uses the corrected start_time.
    _patch_base_anthropic_streaming_iterator()


    class StreamingBridge(CustomLogger):
        """SSE heartbeat + TTFT stamping for anthropic_messages streams."""

        def __init__(self) -> None:
            super().__init__()
            self._canary_aliases: Set[str] = _load_canary_aliases()
            self._canary_prefixes: Tuple[str, ...] = _load_canary_prefixes()
            self._heartbeat_seconds: float = _load_heartbeat_seconds()

        def _alias_matches(self, key_alias: Optional[str]) -> bool:
            if not isinstance(key_alias, str):
                return False
            if key_alias in self._canary_aliases:
                return True
            if self._canary_prefixes and key_alias.startswith(self._canary_prefixes):
                return True
            return False

        def _should_bridge(
            self, user_api_key_dict: Any, request_data: Any
        ) -> Optional[Any]:
            """Return the logging_obj iff this request should be bridged.

            Returning None means "pass the upstream iterator through untouched".
            """
            try:
                key_alias = getattr(user_api_key_dict, "key_alias", None)
                if not self._alias_matches(key_alias):
                    return None

                if not isinstance(request_data, dict):
                    return None

                logging_obj = request_data.get("litellm_logging_obj")
                if logging_obj is None:
                    return None

                if getattr(logging_obj, "call_type", None) != _TARGET_CALL_TYPE:
                    return None

                return logging_obj
            except Exception:
                return None

        @staticmethod
        def _stamp_completion_start(logging_obj: Any) -> None:
            try:
                logging_obj._update_completion_start_time(
                    datetime.datetime.now()
                )
            except Exception as exc:
                try:
                    litellm.print_verbose(
                        f"[streaming_bridge] TTFT stamp failed: {exc!r}"
                    )
                except Exception:
                    pass

        async def async_post_call_streaming_iterator_hook(
            self,
            user_api_key_dict: Any,
            response: AsyncIterator[Any],
            request_data: dict,
        ) -> AsyncIterator[Any]:
            logging_obj = self._should_bridge(user_api_key_dict, request_data)
            if logging_obj is None:
                async for chunk in response:
                    yield chunk
                return

            # Prefetcher pushes upstream chunks into a queue; the main loop
            # reads with wait_for so we can inject heartbeats on silence.
            queue: asyncio.Queue = asyncio.Queue()
            eof_sentinel = object()
            err_sentinel = object()

            async def _prefetch() -> None:
                try:
                    async for chunk in response:
                        await queue.put(chunk)
                except asyncio.CancelledError:
                    raise
                except Exception as exc:
                    await queue.put((err_sentinel, exc))
                finally:
                    await queue.put(eof_sentinel)

            task = asyncio.create_task(_prefetch())
            # Scan buffer for first `content_block_delta` marker across chunk
            # boundaries (httpx may split a single SSE frame across TCP reads).
            # We keep up to ``_SCAN_BUFFER_LIMIT`` bytes and slide the window
            # so that a marker split exactly at the edge is still detected.
            scan_buf = bytearray()
            marker_len = len(_CONTENT_DELTA_MARKER)
            first_content_seen = False

            try:
                while True:
                    try:
                        item = await asyncio.wait_for(
                            queue.get(), timeout=self._heartbeat_seconds
                        )
                    except asyncio.TimeoutError:
                        # Upstream has been silent long enough that Cloudflare
                        # would soon 524. Inject an SSE comment — clients
                        # ignore it, Cloudflare sees activity.
                        yield _HEARTBEAT_CHUNK
                        continue

                    if item is eof_sentinel:
                        return
                    if (
                        isinstance(item, tuple)
                        and len(item) == 2
                        and item[0] is err_sentinel
                    ):
                        raise item[1]

                    if not first_content_seen:
                        view = _chunk_bytes_view(item)
                        if view is not None:
                            scan_buf.extend(view)
                            if _CONTENT_DELTA_MARKER in scan_buf:
                                first_content_seen = True
                                self._stamp_completion_start(logging_obj)
                                scan_buf = bytearray()  # free memory
                            elif len(scan_buf) > _SCAN_BUFFER_LIMIT:
                                # Retain only the tail so a marker straddling
                                # the boundary is still findable, but stop
                                # the buffer from growing unboundedly.
                                del scan_buf[: -(marker_len - 1)]
                    yield item
            finally:
                if not task.done():
                    task.cancel()
                    try:
                        await task
                    except (asyncio.CancelledError, Exception):
                        pass


    streaming_bridge = StreamingBridge()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm-proxy
  namespace: carher
  labels:
    app: litellm-proxy
spec:
  replicas: 2
  # Zero-disruption rolling updates: always keep all existing replicas
  # Ready while surging up one new pod, so the Service never drops below
  # the desired replica count. Combined with the container's preStop +
  # terminationGracePeriodSeconds, in-flight streaming requests on a pod
  # being rotated get up to 60s to drain while new traffic is steered to
  # the other Ready pod.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: litellm-proxy
  template:
    metadata:
      labels:
        app: litellm-proxy
    spec:
      # Give in-flight streaming requests time to complete when a pod is
      # being rotated out during a rolling update. Default is 30s which
      # can cut off streaming chat completions mid-response.
      terminationGracePeriodSeconds: 60
      imagePullSecrets:
        - name: acr-vpc-secret
      initContainers:
        - name: prisma-migrate
          image: ghcr.io/berriai/litellm@sha256:d90ae7e09aee669c53e4b6b267c123f0e830ed3f067b8c789644a965c30acf4a
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c", "prisma db push --schema /app/litellm/proxy/schema.prisma --skip-generate --accept-data-loss"]
          envFrom:
            - secretRef:
                name: litellm-secrets
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1536Mi
      containers:
        - name: litellm
          image: ghcr.io/berriai/litellm@sha256:d90ae7e09aee669c53e4b6b267c123f0e830ed3f067b8c789644a965c30acf4a
          imagePullPolicy: IfNotPresent
          args: ["--config", "/app/config.yaml", "--port", "4000"]
          ports:
            - containerPort: 4000
              name: http
          env:
            # Gating for streaming_bridge.streaming_bridge.
            # Matching keys get: (1) SSE keepalive injection to prevent
            # Cloudflare Tunnel 524s during long Opus 4.7 thinking, and
            # (2) completion_start_time stamped on the first
            # content_block_delta so SpendLogs TTFT is meaningful rather
            # than defaulting to end_time.
            #
            # The startTime fix (monkey-patch of
            # BaseAnthropicMessagesStreamingIterator.__init__) is
            # applied globally and does NOT depend on this gate.
            #
            # All Claude Code CLI users are matched via key_alias
            # prefix. ALIASES is set empty (and explicitly non-None) so
            # the bundled default canary list does not re-add itself.
            - name: STREAMING_BRIDGE_KEY_ALIASES
              value: ""
            - name: STREAMING_BRIDGE_KEY_PREFIXES
              value: "claude-code-"
          envFrom:
            - secretRef:
                name: litellm-secrets
            - secretRef:
                name: carher-env-keys
          resources:
            requests:
              cpu: 200m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
          livenessProbe:
            httpGet:
              path: /health/liveliness
              port: 4000
            initialDelaySeconds: 90
            periodSeconds: 15
            failureThreshold: 5
            timeoutSeconds: 15
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: 4000
            initialDelaySeconds: 90
            periodSeconds: 15
            failureThreshold: 5
            timeoutSeconds: 15
          # preStop sleep gives kube-proxy time to drop this pod's IP from
          # the Service endpoint set before uvicorn starts shutting down,
          # so new requests stop arriving before SIGTERM is delivered.
          # With terminationGracePeriodSeconds=60, the effective shutdown
          # budget is ~15s no-new-traffic + ~45s graceful drain.
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 15"]
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
              readOnly: true
            # Custom pre-call hooks live next to config.yaml so LiteLLM's
            # get_instance_fn() resolves them by relative path.
            - name: callbacks
              mountPath: /app/opus_47_fix.py
              subPath: opus_47_fix.py
              readOnly: true
            - name: callbacks
              mountPath: /app/embedding_sanitize.py
              subPath: embedding_sanitize.py
              readOnly: true
            - name: callbacks
              mountPath: /app/streaming_bridge.py
              subPath: streaming_bridge.py
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: litellm-config
        - name: callbacks
          configMap:
            name: litellm-callbacks
---
apiVersion: v1
kind: Service
metadata:
  name: litellm-proxy
  namespace: carher
  labels:
    app: litellm-proxy
spec:
  type: ClusterIP
  selector:
    app: litellm-proxy
  ports:
    - port: 4000
      targetPort: 4000
      name: http
