# carher-base-config: shared functional config for all CarHer pods.
# Mounted as /data/.openclaw/carher-config.json and /data/.openclaw/shared-config.json5
# Updated for upgrade-0402 compatibility.
apiVersion: v1
kind: ConfigMap
metadata:
  name: carher-base-config
  namespace: carher
  labels:
    app: carher
    managed-by: carher-admin
data:
  shared-config.json5: |
    // CarHer shared config — synced with upgrade-0402 branch
    {
      agents: {
        defaults: {
          contextTokens: 1000000,
          userTimezone: "Asia/Shanghai",
          llm: { idleTimeoutSeconds: 300 },
          compaction: { mode: "safeguard", reserveTokens: 100000, truncateAfterCompaction: true },
          memorySearch: {
            provider: "openai",
            // Route all memorySearch / embedding calls through the internal
            // LiteLLM Proxy so every call lands in LiteLLM_SpendLogs and
            // appears in the /ui + her-spend-stats dashboards.
            // Per-instance virtual key is injected by the Operator as
            // LITELLM_API_KEY env var; base-config substitutes it at pod
            // start. See k8s/litellm-proxy.yaml for the upstream mapping
            // (currently openrouter/BAAI/bge-m3, priced at $0.01/1M tokens).
            remote: {
              baseUrl: "http://litellm-proxy.carher.svc:4000",
              apiKey: "${LITELLM_API_KEY}",
            },
            model: "BAAI/bge-m3",
            sources: ["memory", "sessions"],
            experimental: { sessionMemory: true },
            query: {
              minScore: 0.25,
              maxResults: 8,
              hybrid: {
                vectorWeight: 0.7,
                textWeight: 0.3,
                mmr: { enabled: true, lambda: 0.4 },
              },
            },
          },
        },
      },
      tools: {
        web: { search: { provider: "perplexity" } },
        media: { audio: { models: [{ provider: "groq" }] } },
      },
      commands: { native: "auto", nativeSkills: "auto" },
      messages: {
        ackReactionScope: "group-mentions",
        tts: {
          auto: "inbound",
          provider: "edge",
          providers: {
            edge: { voice: "zh-CN-XiaoxiaoNeural" },
          },
        },
      },
      browser: {
        enabled: true,
        defaultProfile: "openclaw",
        cdpPortRangeStart: 18900,
      },
      plugins: {
        deny: ["feishu"],
        load: {
          paths: ["/app/docker/plugins/a2a-gateway"],
        },
        entries: {
          "feishu-her": { enabled: true },
          "a2a-gateway": {
            enabled: true,
            config: {
              routing: { defaultAgentId: "main" },
              limits: { maxConcurrentTasks: 8 },
            },
          },
        },
      },
      channels: {
        feishu: {
          enabled: true,
          groups: { enabled: true, archive: true },
          cardStreamVersion: "v1",
        },
      },
    }

  carher-config.json: |
    {
      "$include": "./shared-config.json5",
      "meta": { "lastTouchedVersion": "2026.4.2" },
      "agents": {
        "defaults": {
          "contextTokens": 1000000,
          "model": { "primary": "openrouter/anthropic/claude-sonnet-4.6" }
        }
      },
      "models": {
        "providers": {
          "anthropic": {
            "baseUrl": "https://api.anthropic.com",
            "apiKey": "sk-ant-not-used-on-server",
            "models": [
              { "id": "claude-opus-4-6", "name": "Claude Opus 4.6", "api": "anthropic-messages", "reasoning": true, "input": ["text", "image"], "contextWindow": 1000000, "maxTokens": 128000, "cost": { "input": 5, "output": 25, "cacheRead": 0.5, "cacheWrite": 6.25 } },
              { "id": "claude-sonnet-4-6", "name": "Claude Sonnet 4.6", "api": "anthropic-messages", "reasoning": true, "input": ["text", "image"], "contextWindow": 1000000, "maxTokens": 64000, "cost": { "input": 3, "output": 15, "cacheRead": 0.3, "cacheWrite": 3.75 } }
            ]
          },
          "wangsu": {
            "baseUrl": "https://aigateway.edgecloudapp.com/v1/23dcb2866d219047ae6edd6a2724dbc2/cheliantianxia1",
            "apiKey": "${WANGSU_API_KEY}",
            "models": [
              { "id": "claude-opus-4-6", "name": "Claude Opus 4.6", "api": "openai-completions", "reasoning": true, "input": ["text", "image"], "contextWindow": 1000000, "maxTokens": 128000, "cost": { "input": 5, "output": 25, "cacheRead": 0.5, "cacheWrite": 6.25 } },
              { "id": "claude-sonnet-4-6", "name": "Claude Sonnet 4.6", "api": "openai-completions", "reasoning": true, "input": ["text", "image"], "contextWindow": 1000000, "maxTokens": 64000, "cost": { "input": 3, "output": 15, "cacheRead": 0.3, "cacheWrite": 3.75 } },
              { "id": "gemini-3.1-pro-preview", "name": "Gemini 3.1 Pro", "api": "openai-completions", "reasoning": true, "input": ["text", "image"], "contextWindow": 200000, "maxTokens": 65536, "cost": { "input": 2, "output": 12, "cacheRead": 0.2, "cacheWrite": 0.375 } },
              { "id": "gpt-5.4", "name": "GPT-5.4", "api": "openai-completions", "reasoning": true, "input": ["text", "image"], "contextWindow": 200000, "maxTokens": 128000, "cost": { "input": 2.5, "output": 15, "cacheRead": 0.25 } }
            ]
          },
          "openrouter": {
            "baseUrl": "https://openrouter.ai/api/v1",
            "models": [
              { "id": "anthropic/claude-opus-4.6", "name": "Claude Opus 4.6", "api": "openai-completions", "reasoning": true, "input": ["text", "image"], "contextWindow": 1000000, "maxTokens": 128000, "cost": { "input": 5, "output": 25, "cacheRead": 0.5, "cacheWrite": 6.25 } },
              { "id": "anthropic/claude-sonnet-4.6", "name": "Claude Sonnet 4.6", "api": "openai-completions", "reasoning": true, "input": ["text", "image"], "contextWindow": 1000000, "maxTokens": 64000, "cost": { "input": 3, "output": 15, "cacheRead": 0.3, "cacheWrite": 3.75 } },
              { "id": "google/gemini-3.1-pro-preview", "name": "Gemini 3.1 Pro", "api": "openai-completions", "reasoning": true, "input": ["text", "image"], "contextWindow": 200000, "maxTokens": 65536, "cost": { "input": 2, "output": 12, "cacheRead": 0.2, "cacheWrite": 0.375 } },
              { "id": "minimax/minimax-m2.7", "name": "MiniMax M2.7", "api": "openai-completions", "reasoning": false, "input": ["text"], "contextWindow": 200000, "maxTokens": 16384, "cost": { "input": 0.3, "output": 1.1, "cacheRead": 0.15 } },
              { "id": "z-ai/glm-5", "name": "GLM-5", "api": "openai-completions", "reasoning": true, "input": ["text"], "contextWindow": 200000, "maxTokens": 131072, "cost": { "input": 0.95, "output": 2.55 } },
              { "id": "openai/gpt-5.3-codex", "name": "GPT-5.3 Codex", "api": "openai-completions", "reasoning": true, "input": ["text", "image"], "contextWindow": 200000, "maxTokens": 128000, "cost": { "input": 1.75, "output": 14, "cacheRead": 0.175 } },
              { "id": "openai/gpt-5.4", "name": "OpenAI: GPT-5.4", "api": "openai-completions", "reasoning": true, "input": ["text", "image"], "contextWindow": 200000, "maxTokens": 128000, "cost": { "input": 2.5, "output": 15, "cacheRead": 0.25 } }
            ]
          }
        }
      },
      "browser": { "headless": true, "noSandbox": true },
      "commands": { "restart": false },
      "tools": { "sessions": { "visibility": "agent" } },
      "gateway": {
        "port": 18789,
        "mode": "local",
        "bind": "lan",
        "auth": { "mode": "token", "token": "carher-container-token" },
        "controlUi": {
          "allowInsecureAuth": true,
          "dangerouslyDisableDeviceAuth": true,
          "dangerouslyAllowHostHeaderOriginFallback": true
        }
      },
      "plugins": {
        "entries": {
          "realtime": {
            "enabled": true,
            "config": { "port": 18790 }
          }
        }
      }
    }
