apiVersion: v1
kind: ServiceAccount
metadata:
  name: carher-admin
  namespace: carher
---
# Namespace-scoped permissions
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: carher-admin
  namespace: carher
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "pods/exec"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "patch"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
  # HerInstance CRD operations (admin backend crd_ops.py)
  - apiGroups: ["carher.io"]
    resources: ["herinstances", "herinstances/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: carher-admin
  namespace: carher
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: carher-admin
subjects:
  - kind: ServiceAccount
    name: carher-admin
    namespace: carher
---
# Cluster-scoped permissions (nodes + metrics API)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: carher-admin-cluster
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: carher-admin-cluster
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: carher-admin-cluster
subjects:
  - kind: ServiceAccount
    name: carher-admin
    namespace: carher
