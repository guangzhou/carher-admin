apiVersion: apps/v1
kind: Deployment
metadata:
  name: carher-admin
  namespace: carher
  labels:
    app: carher-admin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: carher-admin
  template:
    metadata:
      labels:
        app: carher-admin
    spec:
      serviceAccountName: carher-admin
      imagePullSecrets:
        - name: acr-secret
      # Pin to a specific node for stable hostPath storage
      nodeSelector:
        kubernetes.io/hostname: cn-hongkong.10.0.1.226
      containers:
        - name: admin
          image: cltx-her-ck-registry.ap-southeast-1.cr.aliyuncs.com/her/carher-admin:latest
          ports:
            - containerPort: 8900
              name: http
          env:
            - name: CARHER_ADMIN_DB_DIR
              value: /data/db
            - name: CARHER_ADMIN_BACKUP_DIR
              value: /data/nas-backup
            - name: DEPLOY_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: carher-admin-secrets
                  key: deploy-webhook-secret
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          volumeMounts:
            # SQLite on local disk (hostPath) — safe for file locking
            - name: db-local
              mountPath: /data/db
            # NAS mount for backup only (write backup, never run SQLite here)
            - name: nas-backup
              mountPath: /data/nas-backup
          livenessProbe:
            httpGet:
              path: /api/status
              port: 8900
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/status
              port: 8900
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        # Local disk on pinned node — SQLite runs here
        - name: db-local
          hostPath:
            path: /data/carher-admin/db
            type: DirectoryOrCreate
        # NAS — backup destination only
        - name: nas-backup
          persistentVolumeClaim:
            claimName: carher-admin-backup
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: carher-admin-backup
  namespace: carher
spec:
  accessModes: [ReadWriteMany]
  storageClassName: alibabacloud-cnfs-nas
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: carher-admin
  namespace: carher
  labels:
    app: carher-admin
spec:
  selector:
    app: carher-admin
  ports:
    - port: 8900
      targetPort: 8900
      protocol: TCP
      name: http
