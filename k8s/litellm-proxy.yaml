# LiteLLM Proxy: unified LLM gateway with spend tracking.
# Experiment phase: single replica, no HPA.
#
# Secret is defined by the template in k8s/litellm-secrets.yaml.
# Render that file with real values before applying the Secret.
apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: carher
  labels:
    app: litellm-proxy
data:
  config.yaml: |
    model_list:
      # ═══════════════════════════════════════════
      # Provider: OpenRouter — primary
      # `order: 1` makes these the preferred routing targets.
      # ═══════════════════════════════════════════

      # ── Claude Opus 4.6 via OpenRouter ──
      - model_name: claude-opus-4-6
        litellm_params:
          model: openrouter/anthropic/claude-opus-4.6
          api_key: os.environ/OPENROUTER_API_KEY
          order: 1
        model_info:
          id: openrouter/claude-opus-4-6
          input_cost_per_token: 0.000005
          output_cost_per_token: 0.000025

      # ── Claude Sonnet 4.6 via OpenRouter ──
      - model_name: claude-sonnet-4-6
        litellm_params:
          model: openrouter/anthropic/claude-sonnet-4.6
          api_key: os.environ/OPENROUTER_API_KEY
          order: 1
        model_info:
          id: openrouter/claude-sonnet-4-6
          input_cost_per_token: 0.000003
          output_cost_per_token: 0.000015

      # ── GPT-5.4 via OpenRouter ──
      - model_name: gpt-5.4
        litellm_params:
          model: openrouter/openai/gpt-5.4
          api_key: os.environ/OPENROUTER_API_KEY
          order: 1
        model_info:
          id: openrouter/gpt-5.4
          input_cost_per_token: 0.0000025
          output_cost_per_token: 0.000015

      # ── Gemini 3.1 Pro via OpenRouter ──
      - model_name: gemini-3.1-pro-preview
        litellm_params:
          model: openrouter/google/gemini-3.1-pro-preview
          api_key: os.environ/OPENROUTER_API_KEY
          order: 1
        model_info:
          id: openrouter/gemini-3.1-pro-preview
          input_cost_per_token: 0.000002
          output_cost_per_token: 0.000012

      # ═══════════════════════════════════════════
      # Provider: Wangsu (网宿) — fallback
      # Uses OpenAI-compatible protocol via aigateway.edgecloudapp.com
      # LiteLLM treats this as "openai" provider; api_base distinguishes it.
      # `order: 2` makes these strict failover targets instead of load-balanced peers.
      # ═══════════════════════════════════════════

      # ── Claude Opus 4.6 via Wangsu ──
      - model_name: claude-opus-4-6
        litellm_params:
          model: openai/claude-opus-4-6
          api_key: os.environ/WANGSU_API_KEY
          api_base: https://aigateway.edgecloudapp.com/v1/23dcb2866d219047ae6edd6a2724dbc2/cheliantianxia1
          order: 2
        model_info:
          id: wangsu/claude-opus-4-6
          input_cost_per_token: 0.000005
          output_cost_per_token: 0.000025
          cache_read_input_token_cost: 0.0000005

      # ── Claude Sonnet 4.6 via Wangsu ──
      - model_name: claude-sonnet-4-6
        litellm_params:
          model: openai/claude-sonnet-4-6
          api_key: os.environ/WANGSU_API_KEY
          api_base: https://aigateway.edgecloudapp.com/v1/23dcb2866d219047ae6edd6a2724dbc2/cheliantianxia1
          order: 2
        model_info:
          id: wangsu/claude-sonnet-4-6
          input_cost_per_token: 0.000003
          output_cost_per_token: 0.000015
          cache_read_input_token_cost: 0.0000003

      # ── GPT-5.4 via Wangsu ──
      - model_name: gpt-5.4
        litellm_params:
          model: openai/gpt-5.4
          api_key: os.environ/WANGSU_API_KEY
          api_base: https://aigateway.edgecloudapp.com/v1/23dcb2866d219047ae6edd6a2724dbc2/cheliantianxia1
          order: 2
        model_info:
          id: wangsu/gpt-5.4
          input_cost_per_token: 0.0000025
          output_cost_per_token: 0.000015

      # ── Gemini 3.1 Pro via Wangsu ──
      - model_name: gemini-3.1-pro-preview
        litellm_params:
          model: openai/gemini-3.1-pro-preview
          api_key: os.environ/WANGSU_API_KEY
          api_base: https://aigateway.edgecloudapp.com/v1/23dcb2866d219047ae6edd6a2724dbc2/cheliantianxia1
          order: 2
        model_info:
          id: wangsu/gemini-3.1-pro-preview
          input_cost_per_token: 0.000002
          output_cost_per_token: 0.000012

      # ═══════════════════════════════════════════
      # OpenRouter-only models (no Wangsu equivalent)
      # These only have OpenRouter routing, no primary/fallback split.
      # ═══════════════════════════════════════════

      # ── MiniMax M2.7 via OpenRouter ──
      - model_name: minimax-m2.7
        litellm_params:
          model: openrouter/minimax/minimax-m2.7
          api_key: os.environ/OPENROUTER_API_KEY
        model_info:
          id: openrouter/minimax-m2.7
          input_cost_per_token: 0.0000005
          output_cost_per_token: 0.0000015

      # ── GLM-5 via OpenRouter ──
      - model_name: glm-5
        litellm_params:
          model: openrouter/z-ai/glm-5
          api_key: os.environ/OPENROUTER_API_KEY
        model_info:
          id: openrouter/glm-5
          input_cost_per_token: 0.000001
          output_cost_per_token: 0.000003

      # ── GPT-5.3 Codex via OpenRouter ──
      - model_name: gpt-5.3-codex
        litellm_params:
          model: openrouter/openai/gpt-5.3-codex
          api_key: os.environ/OPENROUTER_API_KEY
        model_info:
          id: openrouter/gpt-5.3-codex
          input_cost_per_token: 0.000003
          output_cost_per_token: 0.000015

      # ═══════════════════════════════════════════
      # Embedding
      # ═══════════════════════════════════════════

      # ── BGE-M3 via OpenRouter (memory search) ──
      - model_name: BAAI/bge-m3
        litellm_params:
          model: openrouter/BAAI/bge-m3
          api_key: os.environ/OPENROUTER_API_KEY
          api_base: https://openrouter.ai/api/v1
        model_info:
          id: openrouter/bge-m3
          mode: embedding

    litellm_settings:
      drop_params: true
      num_retries: 2
      request_timeout: 300
      stream_timeout: 120
      telemetry: false

    general_settings:
      master_key: os.environ/LITELLM_MASTER_KEY
      store_model_in_db: false
      database_url: os.environ/DATABASE_URL
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm-proxy
  namespace: carher
  labels:
    app: litellm-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: litellm-proxy
  template:
    metadata:
      labels:
        app: litellm-proxy
    spec:
      containers:
        - name: litellm
          image: ghcr.io/berriai/litellm@sha256:9e1536c6a9219519f024f221706b20b012ca5176988164798adc5c7fe011e5d5
          args: ["--config", "/app/config.yaml", "--port", "4000"]
          ports:
            - containerPort: 4000
              name: http
          envFrom:
            - secretRef:
                name: litellm-secrets
            - secretRef:
                name: carher-env-keys
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /health/liveliness
              port: 4000
            initialDelaySeconds: 90
            periodSeconds: 15
            failureThreshold: 3
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: 4000
            initialDelaySeconds: 90
            periodSeconds: 15
            failureThreshold: 3
            timeoutSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: litellm-config
---
apiVersion: v1
kind: Service
metadata:
  name: litellm-proxy
  namespace: carher
  labels:
    app: litellm-proxy
spec:
  type: ClusterIP
  selector:
    app: litellm-proxy
  ports:
    - port: 4000
      targetPort: 4000
      name: http
