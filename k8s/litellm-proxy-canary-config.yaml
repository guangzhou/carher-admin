      # ═══════════════════════════════════════════
      # Tag-routed kuaihui-primary aliases — added 2026-04-29
      # ═══════════════════════════════════════════
      # Per-key canary: liuguoxian's claude-code key keeps using the
      # canonical model_name (anthropic.claude-{opus-4-7,opus-4-6,
      # sonnet-4-6,haiku-4-5}) but its requests get routed to kuaihui
      # primary, with the existing wangsu / openrouter chain acting as
      # fallback. Implementation = LiteLLM tag-based routing:
      #
      #   1) These 4 deployments are tagged `liuguoxian-canary`. Per
      #      LiteLLM router rules, a tagged deployment ONLY accepts
      #      requests whose key.metadata.tags contains a matching tag.
      #   2) The pre-existing wangsu / openrouter deployments for the
      #      same 4 model_name(s) are UNTAGGED, so all ~200 other keys
      #      keep landing on them — zero blast radius.
      #   3) liuguoxian's key (alias `claude-code-liuguoxian-50gj`) has
      #      metadata.tags=["liuguoxian-canary"] (set out-of-band via
      #      /key/update). Its requests prefer the tagged kuaihui
      #      deployment; if kuaihui fails, the untagged wangsu copy of
      #      the same model_group is reachable too, and beyond that
      #      router_settings.fallbacks chains to the openrouter twin.
      #   4) router_settings.enable_tag_filtering: true (added below)
      #      activates the whole mechanism cluster-wide.
      #
      # extra_headers (anthropic-beta) MUST be set on every kuaihui
      # anthropic-provider entry — without them LiteLLM's anthropic
      # client wedges 60s on /v1/messages because of how kuaihui's
      # streaming/cache fields are formatted; verified 2026-04-29 on
      # the kuaihui-claude-sonnet-4-6 sibling deployment.
      #
      # Pricing: same official Anthropic list-price as the kuaihui-*
      # naked-name siblings above (kuaihui charges ≤ list-price; SpendLogs
      # is upper-bound until kuaihui's billing console exposes per-token
      # rates).

