apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: herinstances.carher.io
spec:
  group: carher.io
  names:
    kind: HerInstance
    listKind: HerInstanceList
    plural: herinstances
    singular: herinstance
    shortNames: [her]
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [userId, name, appId]
              properties:
                userId:
                  type: integer
                name:
                  type: string
                model:
                  type: string
                  default: gpt
                  enum: [gpt, sonnet, opus]
                appId:
                  type: string
                appSecretRef:
                  type: string
                  description: "Name of K8s Secret containing app_secret"
                prefix:
                  type: string
                  default: s1
                owner:
                  type: string
                  default: ""
                provider:
                  type: string
                  default: openrouter
                  enum: [openrouter, anthropic, wangsu]
                botOpenId:
                  type: string
                  default: ""
                deployGroup:
                  type: string
                  default: stable
                  description: "Custom deploy group name, e.g. canary, early, stable, vip, test"
                image:
                  type: string
                  default: v20260328
                paused:
                  type: boolean
                  default: false
                  description: "When true, operator will not create/maintain a Pod"
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: [Pending, Running, Failed, Stopped, Paused]
                podIP:
                  type: string
                node:
                  type: string
                restarts:
                  type: integer
                age:
                  type: string
                feishuWS:
                  type: string
                  enum: [Connected, Disconnected, Unknown]
                memoryDB:
                  type: boolean
                lastHealthCheck:
                  type: string
                message:
                  type: string
                configHash:
                  type: string
                  description: "Hash of current ConfigMap content for change detection"
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: User
          type: integer
          jsonPath: .spec.userId
        - name: Name
          type: string
          jsonPath: .spec.name
        - name: Model
          type: string
          jsonPath: .spec.model
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Feishu
          type: string
          jsonPath: .status.feishuWS
        - name: Group
          type: string
          jsonPath: .spec.deployGroup
        - name: Image
          type: string
          jsonPath: .spec.image
        - name: Age
          type: string
          jsonPath: .metadata.creationTimestamp
