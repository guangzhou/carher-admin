<rect x="850" y="215" width="130" height="98" rx="18" fill="#eef8ff" stroke="#0284c7" stroke-width="2.5"/><text class="nodeTitle" x="872" y="247">Router</text><text class="nodeText" x="872" y="273">重试</text><text class="nodeText" x="872" y="293">冷却</text><text class="nodeText" x="872" y="313">路由</text>
