<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="850" viewBox="0 0 1500 850"><style>.title{font-family:'Noto Sans SC',sans-serif;font-size:30px;font-weight:800;fill:#162033}.sub{font-family:'Noto Sans SC',sans-serif;font-size:15px;fill:#64748b}.lane{font-family:'Noto Sans SC',sans-serif;font-size:16px;font-weight:800;fill:#334155}.h{font-family:'Noto Sans SC',sans-serif;font-size:17px;font-weight:800;fill:#172033}.t{font-family:'Noto Sans SC',sans-serif;font-size:13px;fill:#64748b}.tiny{font-family:'Noto Sans SC',sans-serif;font-size:12px;fill:#64748b}.main{stroke:#16a34a;stroke-width:5;fill:none;stroke-linecap:round;stroke-linejoin:round}.fb{stroke:#f97316;stroke-width:3;fill:none;stroke-dasharray:9 7;stroke-linecap:round;stroke-linejoin:round}.p1{stroke:#dc2626;stroke-width:3;fill:none;stroke-dasharray:7 7;stroke-linecap:round;stroke-linejoin:round}</style><defs><marker id="g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#16a34a"/></marker><marker id="o" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#f97316"/></marker><marker id="r" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#dc2626"/></marker></defs><rect width="1500" height="850" fill="#f8fafc"/><text class="title" x="52" y="62">SPA：标准自动处理流程</text><text class="sub" x="54" y="94">主线横向完成请求；fallback 只在下方旁路处理，失败才进入 P1</text>
<rect x="60" y="145" width="1380" height="210" rx="24" fill="#ffffff" stroke="#dbe3ee" stroke-width="1.5"/><text class="lane" x="84" y="179">主线：正常请求从 OpenClaw 到 LiteLLM 再返回用户</text>
<rect x="60" y="405" width="610" height="270" rx="24" fill="#f0fdf4" stroke="#dbe3ee" stroke-width="1.5"/><text class="lane" x="84" y="439">LiteLLM 层自动兜底</text><rect x="730" y="405" width="420" height="270" rx="24" fill="#fff7ed" stroke="#dbe3ee" stroke-width="1.5"/><text class="lane" x="754" y="439">OpenClaw 层兜底</text><rect x="1200" y="405" width="240" height="270" rx="24" fill="#fff1f2" stroke="#dbe3ee" stroke-width="1.5"/><text class="lane" x="1224" y="439">人工与恢复</text>
<rect x="95" y="225" width="150" height="82" rx="18" fill="#fff" stroke="#16a34a" stroke-width="2.5"/><text class="h" x="115" y="256">1 请求进入</text><text class="t" x="115" y="282">Her / OpenClaw</text><rect x="300" y="225" width="165" height="82" rx="18" fill="#fff" stroke="#16a34a" stroke-width="2.5"/><text class="h" x="320" y="256">2 请求 LiteLLM</text><text class="t" x="320" y="282">默认 primary</text><rect x="520" y="225" width="170" height="82" rx="18" fill="#fff" stroke="#16a34a" stroke-width="2.5"/><text class="h" x="540" y="256">3 Router 主路由</text><text class="t" x="540" y="282">主供应商</text><rect x="750" y="225" width="170" height="82" rx="18" fill="#e0f2fe" stroke="#0284c7" stroke-width="2.5"/><text class="h" x="770" y="256">4 上游成功？</text><text class="t" x="770" y="282">成功则返回</text><rect x="1165" y="225" width="170" height="82" rx="18" fill="#ecfdf5" stroke="#059669" stroke-width="2.5"/><text class="h" x="1185" y="256">返回用户</text><text class="t" x="1185" y="282">成功响应</text>
<rect x="115" y="485" width="205" height="88" rx="18" fill="#fff7ed" stroke="#f97316" stroke-width="2.5"/><text class="h" x="135" y="516">5 上游失败</text><text class="t" x="135" y="542">429 / billing / 5xx</text><rect x="375" y="485" width="205" height="88" rx="18" fill="#fff7ed" stroke="#f97316" stroke-width="2.5"/><text class="h" x="395" y="516">6 切备用模型组</text><text class="t" x="395" y="542">同级模型 / 备用账号</text><rect x="775" y="485" width="210" height="88" rx="18" fill="#fff7ed" stroke="#f97316" stroke-width="2.5"/><text class="h" x="795" y="516">7 LiteLLM 不可达</text><text class="t" x="795" y="542">连接失败 / 网关 5xx</text><rect x="1010" y="485" width="105" height="88" rx="18" fill="#fff7ed" stroke="#f97316" stroke-width="2.5"/><text class="h" x="1030" y="516">8 直连</text><text class="t" x="1030" y="542">供应商</text><rect x="1235" y="485" width="165" height="88" rx="18" fill="#fff1f2" stroke="#dc2626" stroke-width="2.5"/><text class="h" x="1255" y="516">9 人工升级</text><text class="t" x="1255" y="542">两层失败才 P1</text><rect x="1235" y="595" width="165" height="60" rx="18" fill="#ecfdf5" stroke="#059669" stroke-width="2.5"/><text class="h" x="1255" y="626">恢复探测</text><text class="t" x="1255" y="652">回主路由</text>
<polyline points="245,266 300,266" class="main" marker-end="url(#g)"/><polyline points="465,266 520,266" class="main" marker-end="url(#g)"/><polyline points="690,266 750,266" class="main" marker-end="url(#g)"/><polyline points="920,266 1165,266" class="main" marker-end="url(#g)"/>
<polyline points="835,307 835,370 217,370 217,485" class="fb" marker-end="url(#o)"/><polyline points="320,529 375,529" class="fb" marker-end="url(#o)"/><polyline points="580,529 610,529 610,625 1165,625 1165,307" class="fb" marker-end="url(#o)"/>
<polyline points="390,307 390,385 880,385 880,485" class="fb" marker-end="url(#o)"/><polyline points="985,529 995,529 995,610 1010,610" class="fb" marker-end="url(#o)"/><polyline points="1115,529 1140,529 1140,625 1165,625 1165,307" class="fb" marker-end="url(#o)"/>
<polyline points="1115,529 1160,529 1160,610 1235,610" class="p1" marker-end="url(#r)"/><polyline points="1318,573 1318,595" class="p1" marker-end="url(#r)"/>
<text class="tiny" x="86" y="730">绿色：正常完成  ·  橙色：自动 fallback 旁路  ·  红色：两层都失败后的人工路径</text></svg>