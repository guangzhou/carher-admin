  <rect x="940" y="925" width="760" height="72" rx="18" fill="#FEF2F2" stroke="#EF4444" stroke-width="3"/>
  <text x="975" y="970" font-family="Noto Sans SC, Arial" font-size="23" font-weight="800" fill="#991B1B">后做：Codex 调 Her；记忆/群聊类工具暂不开放</text>
