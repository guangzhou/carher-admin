  <text x="1470" y="416" font-family="Noto Sans SC, Arial" font-size="19" fill="#52606D">127.0.0.1 only</text>
  <rect x="1440" y="530" width="240" height="120" rx="18" fill="#FFFFFF" stroke="#818CF8" stroke-width="3"/>
  <text x="1470" y="574" font-family="Noto Sans SC, Arial" font-size="24" font-weight="700" fill="#111827">供应商 API key</text>
