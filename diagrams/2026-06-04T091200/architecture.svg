<rect x="860" y="395" width="125" height="92" rx="18" fill="#fff7ed" stroke="#f97316" stroke-width="2.5"/><text class="nodeTitle" x="882" y="427">备用供应商</text><text class="nodeText" x="882" y="453">同级模型</text>
