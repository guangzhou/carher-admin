apiVersion: v1
kind: ServiceAccount
metadata:
  name: carher-operator
  namespace: carher
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: carher-operator
rules:
  # CRD management
  - apiGroups: [carher.io]
    resources: [herinstances, herinstances/status]
    verbs: [get, list, watch, create, update, patch, delete]
  # Pod lifecycle
  - apiGroups: [""]
    resources: [pods, pods/log, pods/exec]
    verbs: [get, list, watch, create, update, patch, delete]
  # ConfigMaps
  - apiGroups: [""]
    resources: [configmaps]
    verbs: [get, list, watch, create, update, patch, delete]
  # PVCs
  - apiGroups: [""]
    resources: [persistentvolumeclaims]
    verbs: [get, list, watch, create, delete]
  # Secrets (read-only, for app_secret)
  - apiGroups: [""]
    resources: [secrets]
    verbs: [get, list, watch]
  # Events (kopf posts events)
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
  # Namespaces (for kopf peering)
  - apiGroups: [""]
    resources: [namespaces]
    verbs: [get, list]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: carher-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: carher-operator
subjects:
  - kind: ServiceAccount
    name: carher-operator
    namespace: carher
