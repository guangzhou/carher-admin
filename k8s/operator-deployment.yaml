apiVersion: apps/v1
kind: Deployment
metadata:
  name: carher-operator
  namespace: carher
  labels:
    app: carher-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: carher-operator
  template:
    metadata:
      labels:
        app: carher-operator
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: carher-operator
      imagePullSecrets:
        - name: acr-secret
      containers:
        - name: operator
          image: cltx-her-ck-registry.ap-southeast-1.cr.aliyuncs.com/her/carher-operator:latest
          ports:
            - containerPort: 8080
              name: metrics
            - containerPort: 8081
              name: health
          resources:
            requests:
              cpu: "200m"
              memory: "128Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: carher-operator-metrics
  namespace: carher
  labels:
    app: carher-operator
spec:
  selector:
    app: carher-operator
  ports:
    - port: 8080
      targetPort: 8080
      name: metrics
