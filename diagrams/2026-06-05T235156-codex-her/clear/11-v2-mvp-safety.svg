  <text x="150" y="545" font-family="Noto Sans SC, Arial" font-size="19" fill="#52606D">只提交 repo + prompt</text>
  <text x="150" y="573" font-family="Noto Sans SC, Arial" font-size="19" fill="#52606D">不执行 shell</text>
