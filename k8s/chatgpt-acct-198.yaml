# 198 K3s chatgpt-acct 池（litellm-product ns）
# 用途：把 188 docker-compose 上 wk% >95% 的账号搬到同集群，对齐阿里云 carher 模板
# 关联 skill: chatgpt-pro-litellm + chatgpt-pool-aliyun-canary
# 部署：kubectl apply -f k8s/chatgpt-acct-198.yaml
# OAuth：每 acct 起来后 kubectl logs 看 user_code，浏览器 auth.openai.com/codex 输入
# 接入 198 prod LiteLLM：UPDATE LiteLLM_ProxyModelTable SET litellm_params.api_base='http://chatgpt-acct-N.litellm-product.svc:4000'
---
apiVersion: v1
kind: Secret
metadata:
  name: chatgpt-pool-master-key
  namespace: litellm-product
  labels:
    pool: chatgpt-acct
type: Opaque
stringData:
  # 各 acct pod 的 LiteLLM master key（pod 内部使用，不对外）。198 prod LiteLLM 调它时用同一个 key 作 api_key。
  LITELLM_MASTER_KEY: REPLACE_ME_FROM_RUNTIME_SECRET
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: chatgpt-pool-config
  namespace: litellm-product
  labels:
    pool: chatgpt-acct
data:
  config.yaml: |
    model_list:
      - model_name: chatgpt-gpt-5.5
        litellm_params: {model: chatgpt/gpt-5.5}
        model_info: {mode: responses}
      - model_name: chatgpt-gpt-5.4
        litellm_params: {model: chatgpt/gpt-5.4}
        model_info: {mode: responses}
      - model_name: chatgpt-gpt-5.4-pro
        litellm_params: {model: chatgpt/gpt-5.4-pro}
        model_info: {mode: responses}
      - model_name: chatgpt-gpt-5.3-codex
        litellm_params: {model: chatgpt/gpt-5.3-codex}
        model_info: {mode: responses}
      - model_name: chatgpt-gpt-5.3-codex-spark
        litellm_params: {model: chatgpt/gpt-5.3-codex-spark}
        model_info: {mode: responses}
      - model_name: chatgpt-gpt-5.3-instant
        litellm_params: {model: chatgpt/gpt-5.3-instant}
        model_info: {mode: responses}
      - model_name: chatgpt-gpt-5.3-chat-latest
        litellm_params: {model: chatgpt/gpt-5.3-chat-latest}
        model_info: {mode: responses}

    litellm_settings:
      drop_params: true
      num_retries: 1
      request_timeout: 120

    general_settings:
      master_key: os.environ/LITELLM_MASTER_KEY
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata: {name: chatgpt-acct-1-auth, namespace: litellm-product, labels: {pool: chatgpt-acct, account: "1"}}
spec: {accessModes: [ReadWriteOnce], resources: {requests: {storage: 1Gi}}, storageClassName: local-path}
---
