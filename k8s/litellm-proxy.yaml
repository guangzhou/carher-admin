          output_cost_per_token: 0.000025
          cache_read_input_token_cost: 0.0000005
          cache_creation_input_token_cost: 0.00000625

      # ═══════════════════════════════════════════
      # Provider: OpenRouter Anthropic-native (/v1/messages passthrough)
      # For Claude Code / Cursor users that call LiteLLM's Anthropic-native
      # /v1/messages endpoint but want OpenRouter as the primary.
      # OpenRouter exposes an Anthropic-compatible /api/v1/messages endpoint
      # (verified 2026-04-21), so LiteLLM can passthrough with the `anthropic`
      # provider + api_base override, preserving cache_control / tool_use /
      # thinking fields with zero protocol-conversion loss.
      # ═══════════════════════════════════════════

      - model_name: anthropic.openrouter.claude-sonnet-4-6
        litellm_params:
          model: anthropic/anthropic/claude-sonnet-4.6
          api_base: https://openrouter.ai/api
          api_key: os.environ/OPENROUTER_API_KEY
          input_cost_per_token: 0.000003
          output_cost_per_token: 0.000015
          cache_read_input_token_cost: 0.0000003
          cache_creation_input_token_cost: 0.00000375
          extra_headers:
            anthropic-beta: "prompt-caching-2024-07-31,extended-cache-ttl-2025-04-11"
          cache_control_injection_points:
            - location: message
              role: system
              control:
                type: ephemeral
                ttl: "1h"
            - location: message
              role: user
              index: -1
              control:
                type: ephemeral
                ttl: "1h"
        model_info:
          id: openrouter-anthropic/claude-sonnet-4-6
          input_cost_per_token: 0.000003
          output_cost_per_token: 0.000015
          cache_read_input_token_cost: 0.0000003
          cache_creation_input_token_cost: 0.00000375

      - model_name: anthropic.openrouter.claude-opus-4-6
        litellm_params:
          model: anthropic/anthropic/claude-opus-4.6
          api_base: https://openrouter.ai/api
          api_key: os.environ/OPENROUTER_API_KEY
          input_cost_per_token: 0.000005
          output_cost_per_token: 0.000025
          cache_read_input_token_cost: 0.0000005
          cache_creation_input_token_cost: 0.00000625
          extra_headers:
            anthropic-beta: "prompt-caching-2024-07-31,extended-cache-ttl-2025-04-11"
          cache_control_injection_points:
            - location: message
              role: system
              control:
                type: ephemeral
                ttl: "1h"
            - location: message
              role: user
              index: -1
