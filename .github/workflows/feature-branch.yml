name: Feature Branch Build

on:
  workflow_dispatch:
    inputs:
      deploy_to_canary:
        description: "Deploy to canary group after build?"
        type: boolean
        default: true

env:
  ACR_REGISTRY: cltx-her-ck-registry.ap-southeast-1.cr.aliyuncs.com
  ADMIN_URL: https://admin.carher.net

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate tag from branch
        id: tag
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          SAFE_BRANCH=$(echo "$BRANCH" | sed 's/[^a-zA-Z0-9]/-/g' | head -c 40)
          TAG="dev-${SAFE_BRANCH}-${GITHUB_SHA::7}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build CarHer image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ env.ACR_REGISTRY }}/her/carher:${{ steps.tag.outputs.tag }}

      - name: Summary
        run: |
          echo "### Feature Branch Build" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: \`${{ steps.tag.outputs.branch }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Tag: \`${{ steps.tag.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Image: \`her/carher\`" >> $GITHUB_STEP_SUMMARY

  deploy-canary:
    needs: build
    runs-on: ubuntu-latest
    if: inputs.deploy_to_canary == true
    steps:
      - name: Deploy to canary group only
        run: |
          TAG="${{ needs.build.outputs.image_tag }}"
          BRANCH="${GITHUB_REF_NAME}"
          SHA="${GITHUB_SHA}"
          AUTHOR="${{ github.actor }}"
          REPO="${{ github.repository }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          echo "Deploying $TAG (branch: $BRANCH) to canary group..."

          PAYLOAD=$(jq -n \
            --arg tag "$TAG" --arg secret "${{ secrets.DEPLOY_WEBHOOK_SECRET }}" \
            --arg branch "$BRANCH" --arg sha "$SHA" \
            --arg author "$AUTHOR" --arg repo "$REPO" \
            --arg run_url "$RUN_URL" \
            '{image_tag:$tag, secret:$secret, mode:"", branch:$branch,
              commit_sha:$sha, author:$author, repo:$repo, run_url:$run_url}')

          HTTP_CODE=$(curl -s -o /tmp/resp.json -w "%{http_code}" \
            -X POST "${{ env.ADMIN_URL }}/api/deploy/webhook" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          echo "HTTP: $HTTP_CODE"
          cat /tmp/resp.json

          if [ "$HTTP_CODE" -ge 400 ]; then
            BODY=$(cat /tmp/resp.json)
            if echo "$BODY" | jq -r '.status // ""' 2>/dev/null | grep -q "already_deploy\|build_only"; then
              echo "Skipped: $BODY"
            else
              echo "::error::Deploy failed: $HTTP_CODE"
              exit 1
            fi
          fi

          echo "### Feature Branch Deploy" >> $GITHUB_STEP_SUMMARY
          echo "- Tag: \`$TAG\`" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: \`$BRANCH\`" >> $GITHUB_STEP_SUMMARY
