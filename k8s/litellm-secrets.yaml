# LiteLLM secrets template — render with real values before apply.
#
# immutable: true means kubectl apply/patch will be REJECTED by the API server.
# To change values: kubectl delete secret <name> -n carher && re-render this file with
# real values before applying again.
#
# This file is intentionally separate from litellm-proxy.yaml and litellm-postgres.yaml
# so that `kubectl apply -f k8s/litellm-proxy.yaml` never touches secrets.
apiVersion: v1
kind: Secret
metadata:
  name: litellm-secrets
  namespace: carher
  labels:
    app: litellm-proxy
type: Opaque
immutable: true
stringData:
  LITELLM_MASTER_KEY: CHANGE_ME_LITELLM_MASTER_KEY
  DATABASE_URL: CHANGE_ME_DATABASE_URL
  # Kuaihui (https://kuaihuiai.com/v1) — added 2026-04-29 for carher-1000 canary
  # of claude-* / gpt-* via this gateway. Used by kuaihui-* model_list entries.
  KUAIHUI_API_KEY: CHANGE_ME_KUAIHUI_API_KEY
---
apiVersion: v1
kind: Secret
metadata:
  name: litellm-db-credentials
  namespace: carher
  labels:
    app: litellm-db
type: Opaque
immutable: true
stringData:
  POSTGRES_USER: litellm
  POSTGRES_PASSWORD: CHANGE_ME_POSTGRES_PASSWORD
  POSTGRES_DB: litellm
