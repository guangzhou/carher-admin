<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1000" viewBox="0 0 1800 1000">
  <rect width="1800" height="1000" fill="#FAFBFC"/>
  <text x="80" y="82" font-family="Noto Sans SC, Arial" font-size="44" font-weight="800" fill="#102A43">两条调用链路对照</text>
  <text x="82" y="126" font-family="Noto Sans SC, Arial" font-size="23" fill="#52606D">左边是 Codex 调 Her；右边是 Her 调本地 Codex。两条链路都经过 Bridge 做鉴权、路由和审计。</text>

  <rect x="80" y="180" width="790" height="700" rx="28" fill="#EAF4FF" stroke="#1E88E5" stroke-width="5"/>
  <text x="125" y="240" font-family="Noto Sans SC, Arial" font-size="34" font-weight="800" fill="#0D47A1">A. Codex 调 Her</text>
  <text x="125" y="280" font-family="Noto Sans SC, Arial" font-size="21" fill="#355070">适合：让 Her 用自己的飞书身份、记忆和 OpenClaw 工具完成任务。</text>

  <g font-family="Noto Sans SC, Arial">
    <circle cx="155" cy="370" r="32" fill="#1E88E5"/><text x="144" y="381" font-size="28" font-weight="800" fill="#FFFFFF">1</text>
    <rect x="210" y="330" width="570" height="80" rx="16" fill="#FFFFFF" stroke="#90CAF9" stroke-width="3"/>
    <text x="240" y="365" font-size="24" font-weight="700" fill="#102A43">Codex 调 MCP 工具</text>
    <text x="240" y="394" font-size="18" fill="#52606D">her_send / her_status / her_wait</text>

    <circle cx="155" cy="495" r="32" fill="#1E88E5"/><text x="144" y="506" font-size="28" font-weight="800" fill="#FFFFFF">2</text>
    <rect x="210" y="455" width="570" height="80" rx="16" fill="#FFFFFF" stroke="#90CAF9" stroke-width="3"/>
    <text x="240" y="490" font-size="24" font-weight="700" fill="#102A43">MCP 调 Bridge</text>
    <text x="240" y="519" font-size="18" fill="#52606D">校验 token、目标 Her、调用者权限</text>

    <circle cx="155" cy="620" r="32" fill="#1E88E5"/><text x="144" y="631" font-size="28" font-weight="800" fill="#FFFFFF">3</text>
    <rect x="210" y="580" width="570" height="80" rx="16" fill="#FFFFFF" stroke="#90CAF9" stroke-width="3"/>
    <text x="240" y="615" font-size="24" font-weight="700" fill="#102A43">Bridge 路由到 Her Gateway</text>
    <text x="240" y="644" font-size="18" fill="#52606D">her_uid -> carher-{uid}-svc -> OpenClaw/A2A</text>

    <circle cx="155" cy="745" r="32" fill="#1E88E5"/><text x="144" y="756" font-size="28" font-weight="800" fill="#FFFFFF">4</text>
    <rect x="210" y="705" width="570" height="80" rx="16" fill="#FFFFFF" stroke="#90CAF9" stroke-width="3"/>
    <text x="240" y="740" font-size="24" font-weight="700" fill="#102A43">Her 结果返回 Codex</text>
    <text x="240" y="769" font-size="18" fill="#52606D">结果进入 Codex 工具输出，可继续推理</text>
  </g>

  <rect x="930" y="180" width="790" height="700" rx="28" fill="#EAF7EF" stroke="#43A047" stroke-width="5"/>
  <text x="975" y="240" font-family="Noto Sans SC, Arial" font-size="34" font-weight="800" fill="#1B5E20">B. Her 调本地 Codex</text>
  <text x="975" y="280" font-family="Noto Sans SC, Arial" font-size="21" fill="#355070">适合：飞书里触发本地 repo 诊断、改代码、跑测试、审批命令。</text>

  <g font-family="Noto Sans SC, Arial">
    <circle cx="1005" cy="370" r="32" fill="#43A047"/><text x="994" y="381" font-size="28" font-weight="800" fill="#FFFFFF">1</text>
    <rect x="1060" y="330" width="570" height="80" rx="16" fill="#FFFFFF" stroke="#A5D6A7" stroke-width="3"/>
    <text x="1090" y="365" font-size="24" font-weight="700" fill="#102A43">飞书 /codex 进入 Her</text>
    <text x="1090" y="394" font-size="18" fill="#52606D">CodexOpsHer 或白名单 Her 才响应</text>

    <circle cx="1005" cy="495" r="32" fill="#43A047"/><text x="994" y="506" font-size="28" font-weight="800" fill="#FFFFFF">2</text>
    <rect x="1060" y="455" width="570" height="80" rx="16" fill="#FFFFFF" stroke="#A5D6A7" stroke-width="3"/>
    <text x="1090" y="490" font-size="24" font-weight="700" fill="#102A43">Skill 调 Bridge</text>
    <text x="1090" y="519" font-size="18" fill="#52606D">传 her_uid、open_id、chat_id、repo、prompt</text>

    <circle cx="1005" cy="620" r="32" fill="#43A047"/><text x="994" y="631" font-size="28" font-weight="800" fill="#FFFFFF">3</text>
    <rect x="1060" y="580" width="570" height="80" rx="16" fill="#FFFFFF" stroke="#A5D6A7" stroke-width="3"/>
    <text x="1090" y="615" font-size="24" font-weight="700" fill="#102A43">Bridge 下发给 Mac Worker</text>
    <text x="1090" y="644" font-size="18" fill="#52606D">Worker 主动长连，无需暴露 Mac 公网端口</text>

    <circle cx="1005" cy="745" r="32" fill="#43A047"/><text x="994" y="756" font-size="28" font-weight="800" fill="#FFFFFF">4</text>
    <rect x="1060" y="705" width="570" height="80" rx="16" fill="#FFFFFF" stroke="#A5D6A7" stroke-width="3"/>
    <text x="1090" y="740" font-size="24" font-weight="700" fill="#102A43">Codex 输出 / 审批回飞书</text>
    <text x="1090" y="769" font-size="18" fill="#52606D">命令请求转成飞书卡片，用户允许一次或拒绝</text>
  </g>

  <line x1="870" y1="220" x2="930" y2="220" stroke="#CBD5E1" stroke-width="4" stroke-dasharray="12 10"/>
  <line x1="870" y1="830" x2="930" y2="830" stroke="#CBD5E1" stroke-width="4" stroke-dasharray="12 10"/>
  <text x="830" y="928" font-family="Noto Sans SC, Arial" font-size="26" font-weight="800" fill="#102A43" text-anchor="middle">共同控制点：Bridge 做身份、路由、审批、审计</text>
</svg>
