      - model_name: gpt-5.3-codex-spark
        litellm_params:
          model: openai/gpt-5.3-codex-spark
          api_base: http://chatgpt-acct-11.carher.svc:4000
          api_key: os.environ/CHATGPT_POOL_KEY
        model_info: {mode: responses, id: chatgpt-acct-11/gpt-5.3-codex-spark}

    router_settings:
      # ── tag-based routing ────────────────────────────────────────────
      # Activate per-key deployment selection via tags. Behavior:
      #   * Untagged deployments accept ALL requests (default).
      #   * Tagged deployments ONLY accept requests whose API key carries
      #     a matching tag in metadata.tags.
      # Currently the only tagged deployments are the 4 kuaihui-primary
      # `anthropic.claude-*` aliases above (tag=`liuguoxian-canary`),
      # paired with the `claude-code-liuguoxian-50gj` key which has
      # metadata.tags=["liuguoxian-canary"]. All other ~200 keys carry
      # no tag, so this flag is a no-op for them. See the model_list
      # block above for the full design rationale.
      enable_tag_filtering: true

      # Map dated-snapshot model names that newer Anthropic SDKs send (e.g.
      # ``@anthropic-ai/sdk`` / Claude Code CLI emits ``claude-haiku-4-5-
      # 20251001`` when the user picks haiku-4.5) onto our existing model
      # groups. ``model_group_alias`` is consulted inside
      # ``_can_object_call_model`` BEFORE the ACL check fails, so any key
      # that already lists the canonical name (``anthropic.claude-haiku-
      # 4-5``) is automatically allowed to call the dated alias — no
      # per-key migration needed.
      #
      # Why this exists: 2026-04-25 audit found 9787 failures across 5 keys
      # over 48 h, 0 successes, all because Claude Code CLI sends the dated
      # snapshot but every existing key allowlist references the canonical.
      #
      # When adding a new dated alias, also confirm the underlying model
      # group exists in ``model_list`` and that pricing/usage tracking on
      # that group is correct — alias maps the request, not the cost row.
      model_group_alias:
        "claude-haiku-4-5-20251001": "anthropic.claude-haiku-4-5"
      # ── cooldowns: enabled (default) ─────────────────────────────────
      # 2026-04-27 ROLLBACK: 之前在此处设 ``disable_cooldowns: true``，
      # commit 0058214 论证为"zombie key 触发 bge-m3 cooldown 殃及 12 个
      # 用户"。按 .cursor/rules/diagnosis-discipline.mdc 三段式复审后该
      # 论证被双重证伪（见 docs/improvement-plan.md 或本仓库 audit 记录）：
      #
      #   假设：删 verification token → stale client → 触发 bge-m3 cooldown
      #   证伪条件：(a) cooldown 受害者 api_key 应是 zombie hash；
      #             (b) zombie 401 应进入 router/deployment 阶段
      #   数据：✗ (a) 受害者是 12 个**健康** key，不是 zombie hash；
      #         ✗ (b) zombie 401 在 auth_checks.py:2213 直接抛出，**从未
      #               进入 router** —— 因此不可能触发任何 cooldown
      #         真凶：4-22~4-24 OpenRouter 上游 BAAI/bge-m3 自身故障
      #               ('No successful provider responses' NotFoundError 404，
      #               4-25 起上游已恢复至 < 11 次/天）
      #
      # 撤回此 flag 让 router 自愈机制恢复（5s cooldown 隔离 bad replica）。
      # 对今天 wangsu-direct /v1/messages 的偶发抽风是正向的（router 会
      # 自动 failover）。多 deployment 组依然有 num_retries: 2 + 完整
      # router-level fallbacks 兜底。
      fallbacks:
        # ── Wangsu-primary Claude (OpenAI-compat, bot default) ──
        - claude-opus-4-6: ["openrouter-claude-opus-4-6"]
        - claude-sonnet-4-6: ["openrouter-claude-sonnet-4-6"]
        - gpt-5.4: ["wangsu-gpt-5.4"]
        - chatgpt-gpt-5.5: ["wangsu-gpt-5.5"]
        - gemini-3.1-pro-preview: ["wangsu-gemini-3.1-pro-preview"]
        # opus-4-7 primary lives on Wangsu cheliantianxia6 (af1ho8mp).
        # Fallback chain (in order, each tried once):
        #   1) anthropic.openrouter.claude-opus-4-7
        #      OpenRouter Anthropic-native, SAME model, alternative provider.
        #      Verified live 2026-04-27 (status 200, gen-* id, both stream &
        #      non-stream, content_block_delta + message_stop intact).
        #      Covers Wangsu pre-headers stalls / 5xx without quality loss.
        #   2) anthropic.claude-opus-4-6
        #      One-tier downgrade if both opus-4-7 paths are dead. Native
        #      protocol, no provider switch.
        #   3) openrouter-claude-opus-4-6
        #      Last resort: opus-4-6 via OpenRouter OpenAI-compat. Note that
        #      Router fallbacks are flat (the chain is tried left-to-right
        #      against the originating request); this is a manual mirror
        #      of `claude-opus-4-6: ["openrouter-claude-opus-4-6"]` so users
        #      never see a hard 5xx even if both Wangsu paths are down.
        - anthropic.claude-opus-4-7: ["anthropic.openrouter.claude-opus-4-7", "anthropic.claude-opus-4-6", "openrouter-claude-opus-4-6"]
        # ── Wangsu-primary Claude (Anthropic-native, Claude Code cohort) ──
        # 2026-04-27: prior to this addition the /v1/messages path's
        # ``anthropic.claude-*-4-6`` aliases had NO router-level fallback.
        # When the Wangsu cheliantianxia5 gateway returns a pre-headers
        # error (HTTP 5xx, ConnectTimeout, the 120 s ReadTimeout from the
        # streaming_bridge httpx patch, etc.) LiteLLM Router's
        # ``async_function_with_fallbacks`` uses these entries to retry
        # the request on OpenRouter Anthropic-native, which speaks the
        # same /v1/messages protocol with full cache_control support.
        # Mid-stream stalls (after first byte) bypass router retry by
        # design; those are handled by streaming_bridge's synthetic
        # error frames so SDK-level retries kick in.
        - anthropic.claude-opus-4-6: ["anthropic.openrouter.claude-opus-4-6"]
        - anthropic.claude-sonnet-4-6: ["anthropic.openrouter.claude-sonnet-4-6"]
        # ── OpenRouter-primary Claude (OpenAI-compat, opt-in cohort) ──
        # Symmetric fallback to Wangsu Direct5 when OpenRouter fails.
        - openrouter-claude-opus-4-7: ["anthropic.claude-opus-4-7"]
        - openrouter-claude-opus-4-6: ["anthropic.claude-opus-4-6"]
        - openrouter-claude-sonnet-4-6: ["anthropic.claude-sonnet-4-6"]
        # ── OpenRouter-primary Claude (Anthropic-native, Claude Code cohort) ──
        - anthropic.openrouter.claude-opus-4-7: ["anthropic.claude-opus-4-7"]
        - anthropic.openrouter.claude-opus-4-6: ["anthropic.claude-opus-4-6"]
        - anthropic.openrouter.claude-sonnet-4-6: ["anthropic.claude-sonnet-4-6"]

    litellm_settings:
      drop_params: true
      num_retries: 2
      request_timeout: 300
      stream_timeout: 120
      telemetry: false
      return_response_headers: true
      # ── Settings absorbed from previous DB litellm_settings row (2026-04-27) ──
      # Prior to this commit a DB row at LiteLLM_Config.param_name='litellm_settings'
      # contributed these two keys via _init_callback_settings_from_db /
      # _add_litellm_settings_from_db_config and won over YAML on overlap. The
      # initContainer ``wipe-db-config-rows`` now deletes that row on every
      # pod start, so YAML must carry them itself or they vanish.
      log_raw_request_response: true
      store_prompts_in_spend_logs: true
      # Pre-call hooks (run in order, one file each in ConfigMap litellm-callbacks):
      # - opus_47_fix.thinking_schema_fix: rewrite legacy thinking.type=enabled /
      #   reasoning_effort payloads to the 2026 adaptive schema for opus-4-7+.
      #   Covers carher's OpenAI chat path and Claude Code / Cursor's Anthropic-
      #   native /v1/messages path.
      # - embedding_sanitize.embedding_sanitize: strip lone UTF-16 surrogates
      #   from embedding inputs before Python httpx tries to UTF-8 encode them
      #   (Node.js clients sometimes byte-slice emoji, producing bare \ud8xx
      #   code points that would otherwise throw `surrogates not allowed`).
      # - force_stream.force_stream: pre-call hook for selected
      #   claude-code-* keys; when the client did NOT request streaming
      #   on /v1/messages we flip data["stream"]=True upstream and stamp
      #   litellm_metadata["_force_stream_collapse"]=True so the bridge
      #   below knows to keep the connection alive with whitespace
      #   heartbeats and reassemble the SSE back into one JSON Message.
      #   This eliminates the residual ~45/day 524s on non-streaming
      #   long-tail requests (Cursor IDE Background Agent etc.). Gated
      #   on FORCE_STREAM_KEY_ALIASES / FORCE_STREAM_KEY_PREFIXES.
      # - streaming_bridge.streaming_bridge: post-call iterator hook for
      #   anthropic_messages (/v1/messages). Two modes:
      #   * pass-through (default): inject SSE comment frames every 25 s
      #     to prevent Cloudflare Tunnel 524 on long Opus 4.7 thinking,
      #     stamp completion_start_time on the first content_block_delta
      #     so SpendLogs TTFT is real instead of equal to end_time.
      #   * collapse mode (when force_stream marked the request): buffer
      #     all upstream SSE bytes, yield a single space b" " every 25 s
      #     for keepalive (JSON parsers ignore leading whitespace), and
      #     at EOF emit the reassembled Anthropic Message JSON object as
      #     the final chunk.
      #   Pass-through mode gated on STREAMING_BRIDGE_KEY_ALIASES /
      #   STREAMING_BRIDGE_KEY_PREFIXES. Collapse mode triggers off the
      #   _force_stream_collapse flag set by force_stream.
      # - null_byte_sanitize.null_byte_sanitize: import-time monkey-patch of
      #   PrismaClient.jsonify_object / module-level jsonify_object /
      #   safe_dumps to recursively scrub two byte patterns that crash
      #   the spend-log flush job:
      #     1) NUL bytes (\x00 and the literal \u0000 escape) — PG
      #        rejects with SQLSTATE 22P05.
      #     2) Lone UTF-16 surrogates (\ud800..\udfff) — prisma's Rust
      #        serde_json driver rejects with "unexpected end of hex
      #        escape", which has the same blast radius.
      #   In either case LiteLLM 1.82.6's flush loop drops the whole
      #   1000-row batch without retry — observed 23–27× per pod per
      #   30 min in production prior to this fix. Class instance is
      #   inert; the patches run at import time, so this entry only
      #   matters insofar as listing the module here is what *causes*
      #   LiteLLM to import it. Tracked upstream in
      #   github.com/BerriAI/litellm/issues/21290, /24310 (NUL bytes)
      #   and /19847 (lone surrogates). Remove this line + delete the
      #   file once an upstream release ships its own sanitization.
      # - anthropic_passthrough_pingfix.anthropic_passthrough_pingfix:
      #   import-time monkey-patch of
      #   ModelResponseIterator.convert_str_chunk_to_generic_chunk to
      #   tolerate JSONDecodeError on un-parseable ``data:`` SSE lines.
      #   Without this patch, a single keepalive heartbeat from
      #   OpenRouter (e.g. ``data:\n`` during long prefills) raises
      #   inside ``_route_streaming_logging_to_handler`` and aborts the
      #   entire post-stream success chain — leaving the request HTTP
      #   200 to the client but with NO LiteLLM_SpendLogs row. Affects
      #   every claude-code-* request that fails over to or runs on
      #   OpenRouter; Wangsu's heartbeat shape is different and does
      #   not trigger the bug. Patch tolerates ALL JSONDecodeErrors at
      #   that one call site, replacing the failed chunk with the same
      #   empty ModelResponseStream that the upstream already returns
      #   for non-data: lines. Lost telemetry: at most one heartbeat
      #   delta per affected stream (zero token impact by spec).
      #   Class instance is inert; listing this module here is what
      #   triggers the import-time patch. Remove once an upstream
      #   LiteLLM release fixes the unconditional json.loads.
      # Order matters: force_stream MUST run before streaming_bridge so
      # the flag is in place before the iterator hook fires.
      # null_byte_sanitize and anthropic_passthrough_pingfix are
      # order-independent (both only do import-time monkey-patching,
      # contribute no per-request behavior).
      # Source files live under k8s/litellm-callbacks/ and are mounted into
      # /app/<file>.py by the litellm-callbacks ConfigMap + pod volumeMounts.
      callbacks: ["opus_47_fix.thinking_schema_fix", "embedding_sanitize.embedding_sanitize", "force_stream.force_stream", "streaming_bridge.streaming_bridge", "null_byte_sanitize.null_byte_sanitize", "anthropic_passthrough_pingfix.anthropic_passthrough_pingfix"]

    general_settings:
      master_key: os.environ/LITELLM_MASTER_KEY
      database_url: os.environ/DATABASE_URL
      # CRITICAL — keep `false`. With `true` the proxy persists model_list
      # changes via the admin UI/API to LiteLLM_Config and merges them on
      # 2026-04-29: opened back up to True so the single admin user
      # (Liuguoxian) can edit Spend Logs settings (Store Prompts toggle,
      # retention period) from the LiteLLM admin UI without hitting
      # "Set 'STORE_MODEL_IN_DB=True' in your env to enable this feature."
      # Risk surface is bounded because: (1) UI is single-user; (2) the
      # wipe-db-config-rows initContainer below still deletes the
      # router_settings + litellm_settings rows on every pod start, so
      # fallbacks / callback registrations remain YAML-as-source-of-truth
      # and cannot be silently flipped via UI. Only general_settings is
      # now allowed to persist via DB row.
      store_model_in_db: true
      # Always auto-inject stream_options.include_usage=true on streaming
      # requests. Without this, OpenAI-compatible clients that omit the flag
      # get no usage chunk from streaming responses, and:
      #   (a) LiteLLM_SpendLogs occasionally loses entries for streamed calls
      #   (b) CarHer's Feishu footer shows "?/400k" because pi-ai can't read
      #       prompt/completion tokens from the stream.
      # LiteLLM applies this BEFORE function_setup + pre_call_hook, so it is
      # the only reliable place to enforce the flag on every upstream call.
      always_include_stream_usage: true
      # ── Settings absorbed from previous DB general_settings row (2026-04-27) ──
      # Prior to wipe-db-config-rows initContainer being introduced these
      # six keys lived only in the LiteLLM_Config DB row and were applied
      # via _add_general_settings_from_db_config (alerting only) and the
      # 30 s background _update_general_settings job that runs while
      # store_model_in_db=True. With store_model_in_db now permanently
      # false and the DB row wiped on every restart, YAML must carry them
      # to preserve the prior runtime behaviour.
      database_connection_pool_limit: 10
      database_connection_timeout: 60
      health_check_interval: 300
      enable_public_model_hub: false
      store_prompts_in_spend_logs: true
      ui_access_mode: all
