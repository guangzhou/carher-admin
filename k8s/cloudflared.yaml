apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflared-config
  namespace: carher
  labels:
    app: cloudflared
data:
  config.yml: |
    credentials-file: /etc/cloudflared/credentials.json
    ingress:
    - hostname: admin.carher.net
      service: http://carher-admin.carher.svc.cluster.local:8900
    - hostname: "*.carher.net"
      service: http://auth-proxy.carher.svc.cluster.local:80
    - service: http_status:404
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: carher
  labels:
    app: cloudflared
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudflared
  template:
    metadata:
      labels:
        app: cloudflared
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:latest
          args:
            - tunnel
            - --config
            - /etc/cloudflared/config.yml
            - --grace-period
            - "30s"
            - run
            - carher-k8s
          lifecycle:
            preStop:
              exec:
                command:
                  - cloudflared
                  - tunnel
                  - cleanup
                  - carher-k8s
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: config
              mountPath: /etc/cloudflared/config.yml
              subPath: config.yml
              readOnly: true
            - name: credentials
              mountPath: /etc/cloudflared/credentials.json
              subPath: credentials.json
              readOnly: true
            - name: credentials
              mountPath: /etc/cloudflared/cert.pem
              subPath: cert.pem
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: cloudflared-config
        - name: credentials
          secret:
            secretName: cloudflared-credentials
