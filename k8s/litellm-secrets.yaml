# LiteLLM secrets — apply ONCE, then hands-off.
#
# immutable: true means kubectl apply/patch will be REJECTED by the API server.
# To change values: kubectl delete secret <name> -n carher && kubectl apply -f k8s/litellm-secrets.yaml
#
# This file is intentionally separate from litellm-proxy.yaml and litellm-postgres.yaml
# so that `kubectl apply -f k8s/litellm-proxy.yaml` never touches secrets.
apiVersion: v1
kind: Secret
metadata:
  name: litellm-secrets
  namespace: carher
  labels:
    app: litellm-proxy
type: Opaque
immutable: true
stringData:
  LITELLM_MASTER_KEY: sk-carher-litellm-7c5e14f76cc7718def67ccfae6f00707
  DATABASE_URL: postgresql://litellm:nlacVBVCRgnjEEKZDK81Bw@litellm-db.carher.svc:5432/litellm
---
apiVersion: v1
kind: Secret
metadata:
  name: litellm-db-credentials
  namespace: carher
  labels:
    app: litellm-db
type: Opaque
immutable: true
stringData:
  POSTGRES_USER: litellm
  POSTGRES_PASSWORD: nlacVBVCRgnjEEKZDK81Bw
  POSTGRES_DB: litellm
