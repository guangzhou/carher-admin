<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="850" viewBox="0 0 1500 850">
<style>
  .title{font-family:'Noto Sans SC',sans-serif;font-size:30px;font-weight:800;fill:#172033}
  .subtitle{font-family:'Noto Sans SC',sans-serif;font-size:15px;fill:#64748b}
  .laneTitle{font-family:'Noto Sans SC',sans-serif;font-size:18px;font-weight:800;fill:#334155}
  .nodeTitle{font-family:'Noto Sans SC',sans-serif;font-size:17px;font-weight:800;fill:#172033}
  .nodeText{font-family:'Noto Sans SC',sans-serif;font-size:13px;fill:#64748b}
  .tiny{font-family:'Noto Sans SC',sans-serif;font-size:12px;fill:#64748b}
  .pill{font-family:'Noto Sans SC',sans-serif;font-size:12px;font-weight:700;fill:#14532d}
  .mainStroke{stroke:#16a34a;stroke-width:5;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .fbStroke{stroke:#f97316;stroke-width:3;fill:none;stroke-dasharray:10 8;stroke-linecap:round;stroke-linejoin:round}
  .p1Stroke{stroke:#dc2626;stroke-width:3;fill:none;stroke-dasharray:7 7;stroke-linecap:round;stroke-linejoin:round}
</style><defs><marker id="g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#16a34a"/></marker><marker id="o" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#f97316"/></marker><marker id="r" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/></marker></defs><rect x="0" y="0" width="1500" height="850" fill="#f8fafc"/><text class="title" x="50" y="60">值班处理流程：先判断用户是否受影响</text><text class="subtitle" x="52" y="92">把“观察处理”和“P1 救火”分成两条路径，避免所有告警都升级成事故</text>
<rect x="55" y="145" width="290" height="560" rx="26" fill="#e0f2fe" stroke="#dbe3ee" stroke-width="1.5"/><text class="laneTitle" x="79" y="179">告警分流</text><rect x="390" y="145" width="450" height="560" rx="26" fill="#f0fdf4" stroke="#dbe3ee" stroke-width="1.5"/><text class="laneTitle" x="414" y="179">主值班路径：用户未受影响</text><rect x="890" y="145" width="255" height="560" rx="26" fill="#fff1f2" stroke="#dbe3ee" stroke-width="1.5"/><text class="laneTitle" x="914" y="179">P1 路径：用户已受影响</text><rect x="1190" y="145" width="250" height="560" rx="26" fill="#fff7ed" stroke="#dbe3ee" stroke-width="1.5"/><text class="laneTitle" x="1214" y="179">恢复与复盘</text>
<rect x="95" y="235" width="210" height="86" rx="18" fill="#eef8ff" stroke="#0284c7" stroke-width="2.5"/><text class="nodeTitle" x="117" y="267">收到告警</text><text class="nodeText" x="117" y="293">模型异常 / fallback 突增</text><rect x="92" y="390" width="216" height="106" rx="18" fill="#eef8ff" stroke="#0284c7" stroke-width="2.5"/><text class="nodeTitle" x="114" y="422">用户请求是否成功？</text><text class="nodeText" x="114" y="448">成功：fallback 已兜住</text><text class="nodeText" x="114" y="468">失败：用户已受影响</text>
<rect x="430" y="205" width="170" height="86" rx="18" fill="#ffffff" stroke="#16a34a" stroke-width="2.5"/><text class="nodeTitle" x="452" y="237">记录影响范围</text><text class="nodeText" x="452" y="263">模型 / 供应商 / 实例</text><rect x="630" y="205" width="170" height="86" rx="18" fill="#ffffff" stroke="#16a34a" stroke-width="2.5"/><text class="nodeTitle" x="652" y="237">查日志</text><text class="nodeText" x="652" y="263">SpendLogs / Router logs</text><rect x="430" y="355" width="170" height="92" rx="18" fill="#fff7ed" stroke="#f97316" stroke-width="2.5"/><text class="nodeTitle" x="452" y="387">billing/auth?</text><text class="nodeText" x="452" y="413">补费 / 换 key / 禁用 profile</text><rect x="630" y="355" width="170" height="92" rx="18" fill="#ffffff" stroke="#16a34a" stroke-width="2.5"/><text class="nodeTitle" x="652" y="387">5xx/timeout/429?</text><text class="nodeText" x="652" y="413">保持 fallback 并观察恢复</text><rect x="530" y="520" width="170" height="92" rx="18" fill="#fff7ed" stroke="#f97316" stroke-width="2.5"/><text class="nodeTitle" x="552" y="552">请求侧问题?</text><text class="nodeText" x="552" y="578">上下文 / 工具 / 格式</text>
<rect x="920" y="245" width="190" height="96" rx="18" fill="#fff1f2" stroke="#dc2626" stroke-width="2.5"/><text class="nodeTitle" x="942" y="277">进入 P1</text><text class="nodeText" x="942" y="303">同时查 OpenClaw 与 LiteLLM</text><rect x="920" y="410" width="190" height="96" rx="18" fill="#fff1f2" stroke="#dc2626" stroke-width="2.5"/><text class="nodeTitle" x="942" y="442">临时切直连</text><text class="nodeText" x="942" y="468">默认模型切稳定供应商</text><rect x="920" y="575" width="190" height="76" rx="18" fill="#fff1f2" stroke="#dc2626" stroke-width="2.5"/><text class="nodeTitle" x="942" y="607">回补配置</text><text class="nodeText" x="942" y="633">验证恢复</text>
<rect x="1230" y="265" width="170" height="90" rx="18" fill="#fff7ed" stroke="#f97316" stroke-width="2.5"/><text class="nodeTitle" x="1252" y="297">恢复探测</text><text class="nodeText" x="1252" y="323">primary 健康检查</text><rect x="1230" y="430" width="170" height="90" rx="18" fill="#ecfdf5" stroke="#059669" stroke-width="2.5"/><text class="nodeTitle" x="1252" y="462">恢复主路由</text><text class="nodeText" x="1252" y="488">清除 fallback override</text><rect x="1230" y="595" width="170" height="76" rx="18" fill="#ecfdf5" stroke="#059669" stroke-width="2.5"/><text class="nodeTitle" x="1252" y="627">复盘沉淀</text><text class="nodeText" x="1252" y="653">根因 / 自动化缺口</text>
<path d="M200 321 V390" class="mainStroke" marker-end="url(#g)"/><path d="M308 433 C355 360 388 260 430 248" class="mainStroke" marker-end="url(#g)"/><path d="M600 248 H630" class="mainStroke" marker-end="url(#g)"/><path d="M715 291 V355" class="mainStroke" marker-end="url(#g)"/><path d="M715 447 C760 535 930 725 1230 640" class="mainStroke" marker-end="url(#g)"/>
<path d="M515 447 V520" class="fbStroke" marker-end="url(#o)"/><path d="M615 612 C800 700 1120 540 1230 480" class="fbStroke" marker-end="url(#o)"/><path d="M515 447 C775 650 1110 350 1230 310" class="fbStroke" marker-end="url(#o)"/>
<path d="M308 453 C520 120 820 180 920 294" class="p1Stroke" marker-end="url(#r)"/><path d="M1015 341 V410" class="p1Stroke" marker-end="url(#r)"/><path d="M1015 506 V575" class="p1Stroke" marker-end="url(#r)"/><path d="M1110 614 C1155 615 1190 610 1230 633" class="p1Stroke" marker-end="url(#r)"/>
<text class="tiny" x="70" y="780">绿色：用户未受影响的主值班路径  ·  橙色：需处理但未升级 P1  ·  红色：用户已受影响，进入 P1</text></svg>