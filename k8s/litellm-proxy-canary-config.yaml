          input_cost_per_token: 0.000005
          output_cost_per_token: 0.000025
          cache_read_input_token_cost: 0.0000005
          cache_creation_input_token_cost: 0.00000625

      - model_name: anthropic.openrouter.claude-opus-4-7
        litellm_params:
          model: anthropic/anthropic/claude-opus-4.7
          api_base: https://openrouter.ai/api
          api_key: os.environ/OPENROUTER_API_KEY
          input_cost_per_token: 0.000005
          output_cost_per_token: 0.000025
          cache_read_input_token_cost: 0.0000005
          cache_creation_input_token_cost: 0.00000625
          extra_headers:
            anthropic-beta: "prompt-caching-2024-07-31,extended-cache-ttl-2025-04-11"
          cache_control_injection_points:
            - location: message
              role: system
              control:
                type: ephemeral
                ttl: "1h"
            - location: message
              role: user
              index: -1
              control:
                type: ephemeral
                ttl: "1h"
        model_info:
          id: openrouter-anthropic/claude-opus-4-7
          input_cost_per_token: 0.000005
          output_cost_per_token: 0.000025
          cache_read_input_token_cost: 0.0000005
          cache_creation_input_token_cost: 0.00000625

      # ═══════════════════════════════════════════
      # OpenRouter-only models (no Wangsu equivalent)
      # These only have OpenRouter routing, no primary/fallback split.
      # ═══════════════════════════════════════════

      # ── MiniMax M2.7 via OpenRouter ──
      - model_name: minimax-m2.7
