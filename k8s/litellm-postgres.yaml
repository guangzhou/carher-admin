# PostgreSQL 16 for LiteLLM spend tracking.
# Single-instance with NAS persistent storage.
#
# Secret is defined by the template in k8s/litellm-secrets.yaml.
# Render that file with real values before applying the Secret.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: litellm-db
  namespace: carher
  labels:
    app: litellm-db
spec:
  serviceName: litellm-db
  replicas: 1
  selector:
    matchLabels:
      app: litellm-db
  template:
    metadata:
      labels:
        app: litellm-db
    spec:
      containers:
        - name: postgres
          image: docker.io/library/postgres@sha256:20edbde7749f822887a1a022ad526fde0a47d6b2be9a8364433605cf65099416
          envFrom:
            - secretRef:
                name: litellm-db-credentials
          ports:
            - containerPort: 5432
              name: postgres
          args:
            - -c
            - shared_buffers=256MB
            - -c
            - work_mem=8MB
            - -c
            - effective_cache_size=512MB
            - -c
            - maintenance_work_mem=128MB
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "litellm", "-d", "litellm"]
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "litellm", "-d", "litellm"]
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: litellm-db-data
              mountPath: /var/lib/postgresql/data
              subPath: pgdata
  volumeClaimTemplates:
    # NOTE: volumeClaimTemplates is immutable after the StatefulSet is created.
    # The live PVC (litellm-db-data-litellm-db-0) has been expanded in-place via
    # `kubectl patch pvc ... {"spec":{"resources":{"requests":{"storage":"100Gi"}}}}`.
    # This field is kept in sync only for documentation / new replica provisioning.
    - metadata:
        name: litellm-db-data
        labels:
          app: litellm-db
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: alibabacloud-cnfs-nas
        resources:
          requests:
            storage: 100Gi
---
apiVersion: v1
kind: Service
metadata:
  name: litellm-db
  namespace: carher
  labels:
    app: litellm-db
spec:
  type: ClusterIP
  selector:
    app: litellm-db
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
