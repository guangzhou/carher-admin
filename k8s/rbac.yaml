# ServiceAccount + Role + RoleBinding for carher-admin
# Scoped to carher namespace only
apiVersion: v1
kind: ServiceAccount
metadata:
  name: carher-admin
  namespace: carher
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: carher-admin
  namespace: carher
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "pods/exec"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: carher-admin
  namespace: carher
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: carher-admin
subjects:
  - kind: ServiceAccount
    name: carher-admin
    namespace: carher
