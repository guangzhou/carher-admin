# 198 K3s chatgpt-acct 池扩容：acct-26..33（8 个新订阅，2026-06-15）
# 结构沿用 acct-25 live spec（v1.89.0 + dnsConfig=1.1.1.1 + RWO PVC + Recreate）
# aclose patch 不写在 manifest 里，由 ~/.claude/skills/chatgpt-acct-close-wait-restart/scripts/patch-aclose-198.sh --apply --only N 注入
# 应用：kubectl apply -f k8s/chatgpt-acct-26-33.yaml
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata: {name: chatgpt-acct-26-auth, namespace: litellm-product, labels: {pool: chatgpt-acct, account: "26"}}
spec: {accessModes: [ReadWriteOnce], resources: {requests: {storage: 1Gi}}, storageClassName: local-path}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatgpt-acct-26
  namespace: litellm-product
  labels: {app: chatgpt-acct-26, pool: chatgpt-acct, account: "26"}
spec:
  replicas: 1
  strategy: {type: Recreate}
  selector:
    matchLabels: {app: chatgpt-acct-26}
  template:
    metadata:
      labels: {app: chatgpt-acct-26, pool: chatgpt-acct, account: "26"}
    spec:
      dnsPolicy: "None"
      dnsConfig:
        nameservers: ["1.1.1.1", "8.8.8.8"]
      containers:
        - name: litellm
          image: 127.0.0.1:5000/litellm-carher:vanilla-v1.89.0
          imagePullPolicy: IfNotPresent
          args: ["--config", "/app/config.yaml", "--port", "4000"]
          ports: [{containerPort: 4000}]
          env:
            - {name: CHATGPT_TOKEN_DIR, value: /chatgpt-auth}
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef: {name: chatgpt-pool-master-key, key: LITELLM_MASTER_KEY}
          resources:
            requests: {cpu: 30m, memory: 128Mi}
            limits: {cpu: "1", memory: 2Gi}
          readinessProbe:
            httpGet: {path: /health/readiness, port: 4000}
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 8
          volumeMounts:
            - {name: config, mountPath: /app/config.yaml, subPath: config.yaml}
            - {name: auth, mountPath: /chatgpt-auth}
      volumes:
        - name: config
          configMap: {name: chatgpt-pool-config}
        - name: auth
          persistentVolumeClaim: {claimName: chatgpt-acct-26-auth}
---
apiVersion: v1
kind: Service
metadata: {name: chatgpt-acct-26, namespace: litellm-product, labels: {app: chatgpt-acct-26, pool: chatgpt-acct, account: "26"}}
spec:
  type: ClusterIP
  selector: {app: chatgpt-acct-26}
  ports: [{port: 4000, targetPort: 4000}]
---
