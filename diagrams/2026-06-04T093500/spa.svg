<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="920" viewBox="0 0 1600 920"><style>.title{font-family:'Noto Sans SC',sans-serif;font-size:30px;font-weight:800;fill:#162033}.sub{font-family:'Noto Sans SC',sans-serif;font-size:15px;fill:#64748b}.lane{font-family:'Noto Sans SC',sans-serif;font-size:16px;font-weight:800;fill:#334155}.h{font-family:'Noto Sans SC',sans-serif;font-size:17px;font-weight:800;fill:#172033}.t{font-family:'Noto Sans SC',sans-serif;font-size:13px;fill:#64748b}.tiny{font-family:'Noto Sans SC',sans-serif;font-size:12px;fill:#64748b}.main{stroke:#16a34a;stroke-width:5;fill:none;stroke-linecap:round;stroke-linejoin:round}.fb{stroke:#f97316;stroke-width:3;fill:none;stroke-dasharray:9 7;stroke-linecap:round;stroke-linejoin:round}.p1{stroke:#dc2626;stroke-width:3;fill:none;stroke-dasharray:7 7;stroke-linecap:round;stroke-linejoin:round}.notice{stroke:#f59e0b;stroke-width:3;fill:none;stroke-dasharray:5 6;stroke-linecap:round;stroke-linejoin:round}</style><defs><marker id="g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#16a34a"/></marker><marker id="o" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#f97316"/></marker><marker id="r" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#dc2626"/></marker><marker id="n" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#f59e0b"/></marker></defs><rect width="1600" height="920" fill="#f8fafc"/><text class="title" x="52" y="62">SPA：标准自动处理流程</text><text class="sub" x="54" y="94">主线横向完成请求；异常先自动兜底，同时自动通知管理员；OpenClaw 作为第三层兜底</text>
<rect x="60" y="145" width="1480" height="210" rx="24" fill="#ffffff" stroke="#dbe3ee" stroke-width="1.5"/><text class="lane" x="84" y="179">主线：正常请求从 OpenClaw 到 LiteLLM 再返回用户</text>
<rect x="60" y="405" width="470" height="270" rx="24" fill="#f0fdf4" stroke="#dbe3ee" stroke-width="1.5"/><text class="lane" x="84" y="439">第一层：LiteLLM 自动兜底</text>
<rect x="570" y="405" width="360" height="270" rx="24" fill="#fffbeb" stroke="#dbe3ee" stroke-width="1.5"/><text class="lane" x="594" y="439">第二层：自动化通知管理员</text>
<rect x="970" y="405" width="330" height="270" rx="24" fill="#fff7ed" stroke="#dbe3ee" stroke-width="1.5"/><text class="lane" x="994" y="439">第三层：OpenClaw 兜底</text>
<rect x="1340" y="405" width="200" height="270" rx="24" fill="#fff1f2" stroke="#dbe3ee" stroke-width="1.5"/><text class="lane" x="1364" y="439">人工与恢复</text>
<rect x="95" y="225" width="150" height="82" rx="18" fill="#fff" stroke="#16a34a" stroke-width="2.5"/><text class="h" x="115" y="256">1 请求进入</text><text class="t" x="115" y="282">Her / OpenClaw</text><rect x="300" y="225" width="165" height="82" rx="18" fill="#fff" stroke="#16a34a" stroke-width="2.5"/><text class="h" x="320" y="256">2 请求 LiteLLM</text><text class="t" x="320" y="282">默认 primary</text><rect x="520" y="225" width="170" height="82" rx="18" fill="#fff" stroke="#16a34a" stroke-width="2.5"/><text class="h" x="540" y="256">3 Router 主路由</text><text class="t" x="540" y="282">主供应商</text><rect x="750" y="225" width="170" height="82" rx="18" fill="#e0f2fe" stroke="#0284c7" stroke-width="2.5"/><text class="h" x="770" y="256">4 上游成功？</text><text class="t" x="770" y="282">成功则返回</text><rect x="1225" y="225" width="170" height="82" rx="18" fill="#ecfdf5" stroke="#059669" stroke-width="2.5"/><text class="h" x="1245" y="256">返回用户</text><text class="t" x="1245" y="282">成功响应</text>
<rect x="100" y="485" width="180" height="88" rx="18" fill="#fff7ed" stroke="#f97316" stroke-width="2.5"/><text class="h" x="120" y="516">5 上游失败</text><text class="t" x="120" y="542">429 / billing / 5xx</text><rect x="325" y="485" width="170" height="88" rx="18" fill="#fff7ed" stroke="#f97316" stroke-width="2.5"/><text class="h" x="345" y="516">6 切备用模型组</text><text class="t" x="345" y="542">同级模型 / 备用账号</text>
<rect x="600" y="455" width="270" height="82" rx="18" fill="#fffbeb" stroke="#f59e0b" stroke-width="2.5"/><text class="h" x="620" y="486">A1 通知管理员</text><text class="t" x="620" y="512">LiteLLM fallback 触发</text><text class="t" x="620" y="531">记录模型 / key / 错误码</text><rect x="600" y="565" width="270" height="82" rx="18" fill="#fffbeb" stroke="#f59e0b" stroke-width="2.5"/><text class="h" x="620" y="596">A2 通知管理员</text><text class="t" x="620" y="622">LiteLLM 整体不可达</text><text class="t" x="620" y="641">记录 Service / 网关状态</text>
<rect x="1005" y="485" width="185" height="88" rx="18" fill="#fff7ed" stroke="#f97316" stroke-width="2.5"/><text class="h" x="1025" y="516">7 LiteLLM 不可达</text><text class="t" x="1025" y="542">连接失败 / 网关 5xx</text><rect x="1195" y="485" width="95" height="88" rx="18" fill="#fff7ed" stroke="#f97316" stroke-width="2.5"/><text class="h" x="1215" y="516">8 直连</text><text class="t" x="1215" y="542">供应商</text>
<rect x="1360" y="485" width="150" height="88" rx="18" fill="#fff1f2" stroke="#dc2626" stroke-width="2.5"/><text class="h" x="1380" y="516">9 人工升级</text><text class="t" x="1380" y="542">两层失败才 P1</text><rect x="1360" y="595" width="150" height="60" rx="18" fill="#ecfdf5" stroke="#059669" stroke-width="2.5"/><text class="h" x="1380" y="626">恢复探测</text><text class="t" x="1380" y="652">回主路由</text>
<polyline points="245,266 300,266" class="main" marker-end="url(#g)"/><polyline points="465,266 520,266" class="main" marker-end="url(#g)"/><polyline points="690,266 750,266" class="main" marker-end="url(#g)"/><polyline points="920,266 1225,266" class="main" marker-end="url(#g)"/>
<polyline points="835,307 835,370 190,370 190,485" class="fb" marker-end="url(#o)"/><polyline points="280,529 325,529" class="fb" marker-end="url(#o)"/><polyline points="495,529 535,529 535,705 1225,705 1225,307" class="fb" marker-end="url(#o)"/>
<polyline points="190,573 190,700 600,700 600,620" class="notice" marker-end="url(#n)"/><polyline points="465,307 465,392 735,392 735,455" class="notice" marker-end="url(#n)"/>
<polyline points="465,307 465,385 1098,385 1098,485" class="fb" marker-end="url(#o)"/><polyline points="1190,529 1195,529" class="fb" marker-end="url(#o)"/><polyline points="1290,529 1310,529 1310,705 1225,705 1225,307" class="fb" marker-end="url(#o)"/>
<polyline points="1098,573 1098,700 870,700 870,606" class="notice" marker-end="url(#n)"/><polyline points="1290,529 1360,529" class="p1" marker-end="url(#r)"/><polyline points="1435,573 1435,595" class="p1" marker-end="url(#r)"/>
<polyline points="1510,625 1530,625 1530,710 735,710 735,647" class="notice" marker-end="url(#n)"/>
<text class="tiny" x="86" y="755">绿色：正常完成  ·  橙色：自动 fallback 旁路  ·  黄色：自动通知管理员  ·  红色：两层都失败后的人工路径</text></svg>