# Kaniko build job: clone guangzhou/litellm from GitHub, build, push to ACR VPC.
# Run once, delete after image is built.
apiVersion: batch/v1
kind: Job
metadata:
  name: litellm-build
  namespace: carher
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      restartPolicy: Never
      initContainers:
        - name: clone
          image: alpine/git@sha256:d453f54c83320412aa89c391b076930bd8569bc1012285e8c68ce2d4435826a3
          imagePullPolicy: IfNotPresent
          command: ["git", "clone", "--depth=1", "https://github.com/guangzhou/litellm.git", "/workspace"]
          volumeMounts:
            - name: workspace
              mountPath: /workspace
      containers:
        - name: kaniko
          image: gcr.io/kaniko-project/executor@sha256:4e7a52dd1f14872430652bb3b027405b8dfd17c4538751c620ac005741ef9698
          imagePullPolicy: IfNotPresent
          args:
            - "--dockerfile=/workspace/Dockerfile"
            - "--context=/workspace"
            - "--destination=cltx-her-ck-registry-vpc.ap-southeast-1.cr.aliyuncs.com/her/litellm-proxy:v1"
            - "--cache=false"
            - "--snapshot-mode=redo"
            - "--compressed-caching=false"
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: docker-config
              mountPath: /kaniko/.docker/
          resources:
            requests:
              cpu: "2"
              memory: 4Gi
            limits:
              cpu: "4"
              memory: 8Gi
      volumes:
        - name: workspace
          emptyDir: {}
        - name: docker-config
          secret:
            secretName: acr-vpc-secret
            items:
              - key: .dockerconfigjson
                path: config.json
