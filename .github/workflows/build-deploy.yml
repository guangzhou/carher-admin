name: Build & Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
      - ".github/**"

env:
  ACR_REGISTRY: cltx-her-ck-registry.ap-southeast-1.cr.aliyuncs.com
  ACR_REPO: her/carher-admin
  ADMIN_URL: https://admin.carher.net

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate image tag
        id: tag
        run: echo "tag=v$(date +%Y%m%d)-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_REPO }}:${{ steps.tag.outputs.tag }}
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_REPO }}:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Trigger deploy via webhook
        run: |
          curl -sf -X POST "${{ env.ADMIN_URL }}/api/deploy/webhook" \
            -H "Content-Type: application/json" \
            -d '{"image_tag": "${{ needs.build-and-push.outputs.image_tag }}", "secret": "${{ secrets.DEPLOY_WEBHOOK_SECRET }}"}'
          echo "Deploy triggered: ${{ needs.build-and-push.outputs.image_tag }}"
