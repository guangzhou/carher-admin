      # ═══════════════════════════════════════════
      # Embedding
      # ═══════════════════════════════════════════

      # ── BGE-M3 via OpenRouter (memory search) ──
      # Official OpenRouter pricing (confirmed 2026-04-21):
      # https://openrouter.ai/baai/bge-m3/pricing
      #   Input:  $0.01 per 1M tokens  (= 1e-8 per token)
      #   Output: $0.00
      # Both litellm_params and model_info carry the pricing to match the
      # double-write pattern used by other models in this config (LiteLLM
      # v1.82.x register_model() reliability: per-deployment cost path).
      - model_name: BAAI/bge-m3
        litellm_params:
          model: openrouter/BAAI/bge-m3
          api_key: os.environ/OPENROUTER_API_KEY
          api_base: https://openrouter.ai/api/v1
          input_cost_per_token: 0.00000001
          output_cost_per_token: 0
        model_info:
          id: openrouter/bge-m3
          mode: embedding
          input_cost_per_token: 0.00000001
          output_cost_per_token: 0

    router_settings:
      # Map dated-snapshot model names that newer Anthropic SDKs send (e.g.
      # ``@anthropic-ai/sdk`` / Claude Code CLI emits ``claude-haiku-4-5-
      # 20251001`` when the user picks haiku-4.5) onto our existing model
      # groups. ``model_group_alias`` is consulted inside
      # ``_can_object_call_model`` BEFORE the ACL check fails, so any key
      # that already lists the canonical name (``anthropic.claude-haiku-
      # 4-5``) is automatically allowed to call the dated alias — no
      # per-key migration needed.
      #
      # Why this exists: 2026-04-25 audit found 9787 failures across 5 keys
      # over 48 h, 0 successes, all because Claude Code CLI sends the dated
      # snapshot but every existing key allowlist references the canonical.
      #
      # When adding a new dated alias, also confirm the underlying model
      # group exists in ``model_list`` and that pricing/usage tracking on
      # that group is correct — alias maps the request, not the cost row.
      model_group_alias:
        "claude-haiku-4-5-20251001": "anthropic.claude-haiku-4-5"
      # ── disable_cooldowns ────────────────────────────────────────────
      # Why this is on: 2026-04-27 audit found a "zombie key" (deleted
      # from LiteLLM_VerificationToken on 2026-04-22 but still being used
      # by a stale client) producing 9945× 401 ProxyException against
      # ``BAAI/bge-m3`` over 48 h. LiteLLM's router cooldown logic
      # (router_utils/cooldown_handlers.py:241–247) treats 401/404 as
      # "non-retryable" and puts the deployment in 5 s cooldown — which
      # for a single-deployment model group like bge-m3 means *every
      # other key's* request returns ``RouterRateLimitError: cooldown_list
      # =['openrouter/bge-m3']`` for the duration. 12 unrelated keys got
      # collateral damage.
      #
      # disable_cooldowns hits the early-return at cooldown_handlers.py:
      # 136-140, so no deployment ever enters cooldown. Trade-off: we
      # lose per-deployment "skip the bad replica" behavior on
      # multi-deployment groups (Wangsu Direct5 / OpenRouter cohorts) —
      # but those still have ``num_retries: 2`` and full router-level
      # ``fallbacks`` (above), so user impact is minimal.
      #
      # Safe to remove this line once: (a) all stale clients on revoked
      # keys are cleaned up *and* (b) we have either a backup bge-m3
      # deployment OR an explicit ``BAAI/bge-m3: [...]`` fallback entry
      # in the list below.
      disable_cooldowns: true
      fallbacks:
        # ── Wangsu-primary Claude (OpenAI-compat, bot default) ──
        - claude-opus-4-6: ["openrouter-claude-opus-4-6"]
        - claude-sonnet-4-6: ["openrouter-claude-sonnet-4-6"]
        - gpt-5.4: ["wangsu-gpt-5.4"]
        - gemini-3.1-pro-preview: ["wangsu-gemini-3.1-pro-preview"]
        # opus-4-7 primary lives on Wangsu cheliantianxia6 (af1ho8mp).
        # Fallback chain (in order, each tried once):
        #   1) anthropic.openrouter.claude-opus-4-7
        #      OpenRouter Anthropic-native, SAME model, alternative provider.
        #      Verified live 2026-04-27 (status 200, gen-* id, both stream &
        #      non-stream, content_block_delta + message_stop intact).
        #      Covers Wangsu pre-headers stalls / 5xx without quality loss.
        #   2) anthropic.claude-opus-4-6
        #      One-tier downgrade if both opus-4-7 paths are dead. Native
        #      protocol, no provider switch.
        #   3) openrouter-claude-opus-4-6
        #      Last resort: opus-4-6 via OpenRouter OpenAI-compat. Note that
        #      Router fallbacks are flat (the chain is tried left-to-right
        #      against the originating request); this is a manual mirror
        #      of `claude-opus-4-6: ["openrouter-claude-opus-4-6"]` so users
        #      never see a hard 5xx even if both Wangsu paths are down.
        - anthropic.claude-opus-4-7: ["anthropic.openrouter.claude-opus-4-7", "anthropic.claude-opus-4-6", "openrouter-claude-opus-4-6"]
        # ── Wangsu-primary Claude (Anthropic-native, Claude Code cohort) ──
        # 2026-04-27: prior to this addition the /v1/messages path's
        # ``anthropic.claude-*-4-6`` aliases had NO router-level fallback.
        # When the Wangsu cheliantianxia5 gateway returns a pre-headers
        # error (HTTP 5xx, ConnectTimeout, the 120 s ReadTimeout from the
        # streaming_bridge httpx patch, etc.) LiteLLM Router's
        # ``async_function_with_fallbacks`` uses these entries to retry
        # the request on OpenRouter Anthropic-native, which speaks the
        # same /v1/messages protocol with full cache_control support.
        # Mid-stream stalls (after first byte) bypass router retry by
        # design; those are handled by streaming_bridge's synthetic
        # error frames so SDK-level retries kick in.
        - anthropic.claude-opus-4-6: ["anthropic.openrouter.claude-opus-4-6"]
        - anthropic.claude-sonnet-4-6: ["anthropic.openrouter.claude-sonnet-4-6"]
        # ── OpenRouter-primary Claude (OpenAI-compat, opt-in cohort) ──
        # Symmetric fallback to Wangsu Direct5 when OpenRouter fails.
        - openrouter-claude-opus-4-7: ["anthropic.claude-opus-4-7"]
        - openrouter-claude-opus-4-6: ["anthropic.claude-opus-4-6"]
        - openrouter-claude-sonnet-4-6: ["anthropic.claude-sonnet-4-6"]
        # ── OpenRouter-primary Claude (Anthropic-native, Claude Code cohort) ──
        - anthropic.openrouter.claude-opus-4-7: ["anthropic.claude-opus-4-7"]
        - anthropic.openrouter.claude-opus-4-6: ["anthropic.claude-opus-4-6"]
        - anthropic.openrouter.claude-sonnet-4-6: ["anthropic.claude-sonnet-4-6"]

    litellm_settings:
      drop_params: true
      num_retries: 2
      request_timeout: 300
      stream_timeout: 120
      telemetry: false
      return_response_headers: true
      # ── Settings absorbed from previous DB litellm_settings row (2026-04-27) ──
      # Prior to this commit a DB row at LiteLLM_Config.param_name='litellm_settings'
      # contributed these two keys via _init_callback_settings_from_db /
      # _add_litellm_settings_from_db_config and won over YAML on overlap. The
      # initContainer ``wipe-db-config-rows`` now deletes that row on every
      # pod start, so YAML must carry them itself or they vanish.
      log_raw_request_response: true
      store_prompts_in_spend_logs: true
      # Pre-call hooks (run in order, one file each in ConfigMap litellm-callbacks):
      # - opus_47_fix.thinking_schema_fix: rewrite legacy thinking.type=enabled /
      #   reasoning_effort payloads to the 2026 adaptive schema for opus-4-7+.
      #   Covers carher's OpenAI chat path and Claude Code / Cursor's Anthropic-
      #   native /v1/messages path.
      # - embedding_sanitize.embedding_sanitize: strip lone UTF-16 surrogates
      #   from embedding inputs before Python httpx tries to UTF-8 encode them
      #   (Node.js clients sometimes byte-slice emoji, producing bare \ud8xx
      #   code points that would otherwise throw `surrogates not allowed`).
      # - force_stream.force_stream: pre-call hook for selected
      #   claude-code-* keys; when the client did NOT request streaming
      #   on /v1/messages we flip data["stream"]=True upstream and stamp
      #   litellm_metadata["_force_stream_collapse"]=True so the bridge
      #   below knows to keep the connection alive with whitespace
      #   heartbeats and reassemble the SSE back into one JSON Message.
      #   This eliminates the residual ~45/day 524s on non-streaming
      #   long-tail requests (Cursor IDE Background Agent etc.). Gated
      #   on FORCE_STREAM_KEY_ALIASES / FORCE_STREAM_KEY_PREFIXES.
      # - streaming_bridge.streaming_bridge: post-call iterator hook for
      #   anthropic_messages (/v1/messages). Two modes:
      #   * pass-through (default): inject SSE comment frames every 25 s
      #     to prevent Cloudflare Tunnel 524 on long Opus 4.7 thinking,
      #     stamp completion_start_time on the first content_block_delta
      #     so SpendLogs TTFT is real instead of equal to end_time.
      #   * collapse mode (when force_stream marked the request): buffer
      #     all upstream SSE bytes, yield a single space b" " every 25 s
      #     for keepalive (JSON parsers ignore leading whitespace), and
      #     at EOF emit the reassembled Anthropic Message JSON object as
      #     the final chunk.
      #   Pass-through mode gated on STREAMING_BRIDGE_KEY_ALIASES /
      #   STREAMING_BRIDGE_KEY_PREFIXES. Collapse mode triggers off the
      #   _force_stream_collapse flag set by force_stream.
      # - null_byte_sanitize.null_byte_sanitize: import-time monkey-patch of
      #   PrismaClient.jsonify_object / module-level jsonify_object /
      #   safe_dumps to recursively scrub two byte patterns that crash
      #   the spend-log flush job:
      #     1) NUL bytes (\x00 and the literal \u0000 escape) — PG
      #        rejects with SQLSTATE 22P05.
      #     2) Lone UTF-16 surrogates (\ud800..\udfff) — prisma's Rust
      #        serde_json driver rejects with "unexpected end of hex
      #        escape", which has the same blast radius.
      #   In either case LiteLLM 1.82.6's flush loop drops the whole
      #   1000-row batch without retry — observed 23–27× per pod per
      #   30 min in production prior to this fix. Class instance is
      #   inert; the patches run at import time, so this entry only
      #   matters insofar as listing the module here is what *causes*
      #   LiteLLM to import it. Tracked upstream in
      #   github.com/BerriAI/litellm/issues/21290, /24310 (NUL bytes)
      #   and /19847 (lone surrogates). Remove this line + delete the
      #   file once an upstream release ships its own sanitization.
      # Order matters: force_stream MUST run before streaming_bridge so
      # the flag is in place before the iterator hook fires.
      # null_byte_sanitize is order-independent (it only does import-time
      # monkey-patching, contributes no per-request behavior).
      # Source files live under k8s/litellm-callbacks/ and are mounted into
      # /app/<file>.py by the litellm-callbacks ConfigMap + pod volumeMounts.
      callbacks: ["opus_47_fix.thinking_schema_fix", "embedding_sanitize.embedding_sanitize", "force_stream.force_stream", "streaming_bridge.streaming_bridge", "null_byte_sanitize.null_byte_sanitize"]

    general_settings:
      master_key: os.environ/LITELLM_MASTER_KEY
      database_url: os.environ/DATABASE_URL
      # CRITICAL — keep `false`. With `true` the proxy persists model_list
      # changes via the admin UI/API to LiteLLM_Config and merges them on
      # every restart, defeating the YAML-as-source-of-truth invariant
      # below. The chicken-and-egg flip at proxy_server.py:6015 reads the
      # DB general_settings.store_model_in_db and overrides this YAML
      # value if it finds True there. The initContainer
      # ``wipe-db-config-rows`` deletes the DB row on every pod start so
      # this YAML value is final and authoritative.
      store_model_in_db: false
      # Always auto-inject stream_options.include_usage=true on streaming
      # requests. Without this, OpenAI-compatible clients that omit the flag
      # get no usage chunk from streaming responses, and:
      #   (a) LiteLLM_SpendLogs occasionally loses entries for streamed calls
      #   (b) CarHer's Feishu footer shows "?/400k" because pi-ai can't read
      #       prompt/completion tokens from the stream.
      # LiteLLM applies this BEFORE function_setup + pre_call_hook, so it is
      # the only reliable place to enforce the flag on every upstream call.
      always_include_stream_usage: true
      # ── Settings absorbed from previous DB general_settings row (2026-04-27) ──
      # Prior to wipe-db-config-rows initContainer being introduced these
      # six keys lived only in the LiteLLM_Config DB row and were applied
      # via _add_general_settings_from_db_config (alerting only) and the
      # 30 s background _update_general_settings job that runs while
      # store_model_in_db=True. With store_model_in_db now permanently
      # false and the DB row wiped on every restart, YAML must carry them
      # to preserve the prior runtime behaviour.
      database_connection_pool_limit: 10
      database_connection_timeout: 60
      health_check_interval: 300
      enable_public_model_hub: false
      store_prompts_in_spend_logs: true
      ui_access_mode: all
---
# Custom pre-call hook: rewrite legacy Anthropic "thinking" schema to the
# 2026 adaptive schema for opus-4-7+.
#
# stream_options.include_usage injection is handled by
# general_settings.always_include_stream_usage: true above — that path runs
# before function_setup, which is the only stage that reliably propagates the
# flag to upstream providers. Injecting from a pre-call hook happens too late.
#
# See k8s/litellm-callbacks/opus_47_fix.py for the canonical source — keep
# the two in sync when editing.
apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-callbacks
  namespace: carher
  labels:
    app: litellm-proxy
data:
  opus_47_fix.py: |
    """
    LiteLLM pre-call hook — thinking schema rewrite (opus-4-7+).

    Rewrites legacy ``thinking.type=enabled`` / OpenAI-style ``reasoning_effort``
    to the 2026 ``thinking.type=adaptive`` + ``output_config.effort`` schema
    required by the Wangsu cheliantianxia6 gateway for claude-opus-4-7.

    NOTE: ``stream_options.include_usage`` injection is NOT done here. It must be
    configured via ``general_settings.always_include_stream_usage: true`` in the
    LiteLLM config — that path runs before ``function_setup``, which is the only
    stage that reliably propagates the flag to the upstream call. Injection from a
    pre-call hook happens too late and is silently ignored by some providers.

    Registered in LiteLLM via ``litellm_settings.callbacks``:

        litellm_settings:
          callbacks: ["opus_47_fix.thinking_schema_fix"]
    """
    from __future__ import annotations

    from typing import Any, Dict, Optional, Union

    from litellm.integrations.custom_logger import CustomLogger
    import litellm


    NEEDS_ADAPTIVE_MODELS = (
        "opus-4-7",
        "opus_4_7",
        "opus-4.7",
        "opus_4.7",
    )


    EFFORT_MAP_FROM_OPENAI = {
        "minimal": "low",
        "low": "low",
        "medium": "medium",
        "high": "high",
        "max": "max",
    }


    def _budget_to_effort(budget_tokens: int) -> str:
        """Map legacy thinking.budget_tokens to the new output_config.effort level."""
        if budget_tokens <= 8192:
            return "low"
        if budget_tokens <= 32768:
            return "medium"
        return "high"


    def _is_target_model(*model_candidates: Optional[str]) -> bool:
        for m in model_candidates:
            if not isinstance(m, str):
                continue
            ml = m.lower()
            if any(tag in ml for tag in NEEDS_ADAPTIVE_MODELS):
                return True
        return False


    def _rewrite_thinking(data: Dict[str, Any]) -> bool:
        """Mutate ``data`` so thinking params conform to the 2026 adaptive schema.

        Returns True when a change was made.
        """
        changed = False

        reasoning_effort = data.pop("reasoning_effort", None)
        effort_from_re: Optional[str] = None
        if reasoning_effort is not None:
            effort_from_re = EFFORT_MAP_FROM_OPENAI.get(
                str(reasoning_effort).lower(), "medium"
            )

        thinking = data.get("thinking")
        effort_from_thinking: Optional[str] = None
        if isinstance(thinking, dict) and thinking.get("type") == "enabled":
            raw_budget = thinking.get("budget_tokens")
            try:
                budget = int(raw_budget) if raw_budget is not None else 4096
            except (TypeError, ValueError):
                budget = 4096
            effort_from_thinking = _budget_to_effort(budget)

        effort = effort_from_re or effort_from_thinking
        if effort is None and reasoning_effort is None:
            return changed

        final_effort = effort or "medium"

        existing_oc = data.get("output_config")
        oc: Dict[str, Any] = dict(existing_oc) if isinstance(existing_oc, dict) else {}
        oc.setdefault("effort", final_effort)
        data["output_config"] = oc

        data["thinking"] = {"type": "adaptive"}
        changed = True

        return changed


    class ThinkingSchemaFix(CustomLogger):
        """Pre-call hook: rewrite opus-4-7 thinking params to adaptive schema."""

        async def async_pre_call_hook(
            self,
            user_api_key_dict: Any,
            cache: Any,
            data: Dict[str, Any],
            call_type: Any,
        ) -> Optional[Union[Exception, str, Dict[str, Any]]]:
            try:
                if not isinstance(data, dict):
                    return data

                model_group: Optional[str] = None
                meta = data.get("metadata") or data.get("litellm_metadata") or {}
                if isinstance(meta, dict):
                    model_group = meta.get("model_group")

                if not _is_target_model(data.get("model"), model_group):
                    return data

                if _rewrite_thinking(data):
                    try:
                        litellm.print_verbose(
                            "[opus_47_fix] rewrote thinking schema "
                            f"model={data.get('model')!r} call_type={call_type!r} "
                            f"new_thinking={data.get('thinking')} "
                            f"output_config={data.get('output_config')}"
                        )
                    except Exception:
                        pass
            except Exception as exc:
                try:
                    litellm.print_verbose(f"[opus_47_fix] ERROR: {exc!r}")
                except Exception:
                    pass
            return data


    thinking_schema_fix = ThinkingSchemaFix()

  embedding_sanitize.py: |
    """
    LiteLLM pre-call hook — strip lone UTF-16 surrogates from embedding inputs.

    Problem
    -------
    Node.js callers (e.g. the carher bot) sometimes emit text containing lone
    UTF-16 surrogates (U+D800..U+DFFF) because of byte-level slicing that cuts
    an emoji in half. Node.js HTTP clients silently replace such code points
    with U+FFFD when serializing the request body, so directly-connected
    OpenRouter calls appeared to work. LiteLLM forwards those requests through
    Python httpx, which is strict: `str.encode('utf-8')` raises
    `UnicodeEncodeError: surrogates not allowed` before the request is ever
    sent upstream, bubbling up as a 500 (and eventually a 404 via the
    `no fallback for bge-m3` path) to the bot.

    Fix
    ---
    On `embedding`/`aembedding` calls, sanitize the `input` field by dropping
    any lone surrogate code points. Behavior now matches the lenient Node.js
    path. The dropped bytes are never valid characters on their own, so there
    is no real semantic loss.

    This hook only touches embedding calls; all other call types pass through
    unchanged.
    """
    from __future__ import annotations

    import re
    from typing import Any, Dict, Optional, Union

    from litellm.integrations.custom_logger import CustomLogger
    import litellm


    # Matches any lone surrogate code unit (U+D800..U+DFFF). Properly paired
    # surrogates are collapsed to a single Python str code point by CPython,
    # so this regex only fires on broken ones.
    _LONE_SURROGATE_RE = re.compile(r"[\ud800-\udfff]")


    def _sanitize(value: Any) -> Any:
        """Recursively strip lone surrogates from str / list[str] / dict values."""
        if isinstance(value, str):
            return _LONE_SURROGATE_RE.sub("", value)
        if isinstance(value, list):
            return [_sanitize(v) for v in value]
        if isinstance(value, dict):
            return {k: _sanitize(v) for k, v in value.items()}
        return value


    class EmbeddingSanitize(CustomLogger):
        """Pre-call hook: strip lone surrogates from embedding inputs."""

        _EMBED_CALL_TYPES = frozenset({"embedding", "aembedding"})

        async def async_pre_call_hook(
            self,
            user_api_key_dict: Any,
            cache: Any,
            data: Dict[str, Any],
            call_type: Any,
        ) -> Optional[Union[Exception, str, Dict[str, Any]]]:
            try:
                if not isinstance(data, dict):
                    return data
                if call_type not in self._EMBED_CALL_TYPES:
                    return data

                orig = data.get("input")
                if orig is None:
                    return data

                cleaned = _sanitize(orig)
                if cleaned != orig:
                    try:
                        litellm.print_verbose(
                            "[embedding_sanitize] stripped lone surrogates from input "
                            f"(call_type={call_type!r}, model={data.get('model')!r})"
                        )
                    except Exception:
                        pass
                    data["input"] = cleaned
            except Exception as exc:
                # Never block the request on this hook's failure: if sanitize
                # itself errors, just pass the original data through.
                try:
                    litellm.print_verbose(f"[embedding_sanitize] ERROR: {exc!r}")
                except Exception:
                    pass
            return data


    embedding_sanitize = EmbeddingSanitize()

  streaming_bridge.py: |
    """
    LiteLLM streaming bridge — SSE heartbeat + TTFT fix for the
    ``anthropic_messages`` (/v1/messages) passthrough path.

    Three independent problems this module addresses
    ------------------------------------------------

    1.  **524 origin timeouts on Claude Code CLI clients.**

        Claude Code CLI users hit ``https://litellm.carher.net`` → Cloudflare
        Tunnel → in-cluster LiteLLM. Cloudflare free/Pro applies a
        ~100–120 s "Proxy Read Timeout" to the *origin* stream: if the
        tunneled response emits no bytes in that window, Cloudflare
        drops the connection and returns 524.

        When claude-opus-4-7 on the Wangsu cheliantianxia6 gateway enters
        extended ``thinking`` (e.g. large tool loop context), the upstream
        can stay silent well past 100 s before the first visible byte
        arrives. Internal carher bots are unaffected — they talk to
        ``litellm-proxy.carher.svc:4000`` directly and skip Cloudflare
        entirely — but external claude-code CLI traffic keeps 524ing.

    2.  **``LiteLLM_SpendLogs.startTime`` is captured at the wrong moment
        for every ``anthropic_messages`` request (upstream bug).**

        In ``litellm/llms/anthropic/experimental_pass_through/messages/
        streaming_iterator.py``, ``BaseAnthropicMessagesStreamingIterator.
        __init__`` does:

            self.start_time = datetime.now()

        and that timestamp is what gets threaded all the way down to
        ``async_success_handler(start_time=...)`` → ``get_logging_payload`` →
        ``LiteLLM_SpendLogs.startTime``. But this ``__init__`` runs AFTER
        ``await async_httpx_client.post(stream=True)`` has returned, which
        means AFTER the upstream HTTP response status + headers have been
        received. In practice Wangsu buffers the first batch of SSE frames
        server-side and flushes headers together with
        ``message_start + content_block_start + ping +
        content_block_delta`` in a single ~600 B TCP chunk. So the
        iterator's ``self.start_time`` is essentially the same instant as
        the first content byte, and ``completionStartTime - startTime``
        collapses to ≈ 0.

        The ``acompletion`` path (/v1/chat/completions, what carher bots
        use) avoids this entirely because ``function_setup`` initializes
        ``Logging(start_time=<proxy entry time>)`` and ``CustomStreamWrapper``
        stamps ``completion_start_time`` on the first chunk. That is why
        carher's Opus 4.7 SpendLogs have correct TTFT and Duration while
        claude-code's Opus 4.7 SpendLogs do not — the route determines the
        code path, not the model.

    3.  **``completionStartTime`` is never set on the passthrough path, so
        LiteLLM falls back to ``end_time``.**

        ``litellm_core_utils/litellm_logging.py`` has:

            if self.completion_start_time is None:
                self.completion_start_time = end_time

        which makes ``TTFT == Duration`` for half the ``anthropic_messages``
        rows (the ones whose requests ran long enough that our pre-call
        hook wasn't in effect). We need to explicitly stamp
        ``completion_start_time`` when the first user-visible token arrives.

    Fix
    ---

    This module does two things at import time + one thing per request:

    *   **(patch, global)** Replaces
        ``BaseAnthropicMessagesStreamingIterator.__init__`` with a version
        that pulls the start time from
        ``litellm_logging_obj.start_time`` (the real proxy-entry time set
        by ``function_setup`` in
        ``litellm/proxy/common_request_processing.py``) whenever it is
        available. Falls back to ``datetime.now()`` for safety. Applied
        unconditionally to every ``anthropic_messages`` request because
        proxy-entry time is semantically the right value for
        ``LiteLLM_SpendLogs.startTime`` in every case — this removes the
        upstream bug's effect on Duration as well.

    *   **(hook, gated)** Registers an
        ``async_post_call_streaming_iterator_hook`` callback. For requests
        matching the gate (``CANARY_KEY_ALIASES`` + call_type ==
        ``anthropic_messages``) we wrap the upstream byte iterator with a
        pre-fetching async generator that:

        * Scans the upstream bytes for the first ``content_block_delta``
          SSE event and at that moment calls
          ``logging_obj._update_completion_start_time(datetime.now())``.
          This is the first frame that carries user-visible token payload
          (``text_delta``, ``thinking_delta``, ``input_json_delta``). It
          suppresses the ``end_time`` fallback so
          ``LiteLLM_SpendLogs.completionStartTime`` reflects a real TTFT.
        * If ``HEARTBEAT_INTERVAL_SECONDS`` elapse without a chunk, emits an
          SSE comment frame (``b": keepalive\\n\\n"``). Per the EventSource
          spec, any compliant SSE client (incl. all Anthropic SDKs and
          claude-code CLI) silently ignores lines starting with ``:``.
          Cloudflare sees activity on the wire and does not time out.

    Combined effect for canary requests
    -----------------------------------

        startTime            = proxy entry (from logging_obj.start_time)
        completionStartTime  = first content_block_delta from upstream
        endTime              = end of request
        TTFT  = completionStartTime - startTime
              = time from client-perceived request start until upstream's
                first model-output token reached us — a number users can
                actually reason about.
        Duration = endTime - startTime
                 = full request wall time.

    For non-canary requests the hook is inactive, so completionStartTime
    still falls back to endTime and TTFT still == Duration. That's no
    worse than the existing behavior; it just doesn't benefit from the hook.
    startTime is corrected for everyone.

    Gating (canary strategy)
    ------------------------

    Two narrow predicates must match before we wrap the iterator:

        * ``user_api_key_dict.key_alias`` matches either
          ``STREAMING_BRIDGE_KEY_ALIASES`` (exact, comma-separated) or
          ``STREAMING_BRIDGE_KEY_PREFIXES`` (prefix, comma-separated). At
          least one env var should be set in production; if neither is set
          the bundled default matches only ``claude-code-liuguoxian-50gj``.
        * ``logging_obj.call_type == "anthropic_messages"``.

    The __init__ monkey-patch is NOT gated — it's a correctness fix that
    makes LiteLLM_SpendLogs.startTime match what every other call_type
    already stores.

    Heartbeat interval is tunable via ``STREAMING_BRIDGE_HEARTBEAT_SECONDS``
    (default 25 s — 4× safety margin under Cloudflare's ~100 s limit).

    Registered in LiteLLM via ``litellm_settings.callbacks``:

        litellm_settings:
          callbacks: ["streaming_bridge.streaming_bridge"]
    """
    from __future__ import annotations

    import asyncio
    import datetime
    import json
    import logging as _stdlib_logging
    import os
    from typing import Any, AsyncIterator, Dict, List, Optional, Set, Tuple

    from litellm.integrations.custom_logger import CustomLogger
    import litellm


    _log = _stdlib_logging.getLogger("streaming_bridge")


    # Default canary: only liuguoxian's Claude Code key when no env is set.
    # In production we expect ``STREAMING_BRIDGE_KEY_PREFIXES=claude-code-``
    # so every Claude Code CLI user is covered without maintaining a list.
    _DEFAULT_CANARY_KEY_ALIASES: frozenset = frozenset({"claude-code-liuguoxian-50gj"})
    _DEFAULT_CANARY_KEY_PREFIXES: Tuple[str, ...] = ()

    # Well below Cloudflare's ~100 s origin read timeout.
    _DEFAULT_HEARTBEAT_SECONDS: float = 25.0

    # Only the passthrough path has the TTFT bug; acompletion handles its
    # own completion_start_time via CustomStreamWrapper.
    _TARGET_CALL_TYPE: str = "anthropic_messages"

    # SSE comment frame. Lines starting with ':' are ignored by compliant
    # SSE clients, but the bytes on the wire reset Cloudflare's idle timer.
    _HEARTBEAT_CHUNK: bytes = b": keepalive\n\n"

    # First SSE event that carries actual model output (text_delta,
    # thinking_delta, input_json_delta). Seeing this marker in the raw byte
    # stream is what we treat as "first token produced" for TTFT purposes.
    _CONTENT_DELTA_MARKER: bytes = b"content_block_delta"

    # Upper bound on how many bytes we retain while scanning for the marker.
    # In practice message_start + content_block_start + a few pings stay
    # well under 4 KB; 64 KB leaves plenty of headroom while still capping
    # worst-case buffering for a request that never emits a delta.
    _SCAN_BUFFER_LIMIT: int = 64 * 1024


    # --------------------------- collapse mode ----------------------------
    #
    # When ``force_stream`` flipped ``data["stream"]=True`` for a request
    # whose client originally did NOT ask for streaming, we are in collapse
    # mode: upstream sends SSE, but the client expects a single JSON body.
    #
    # In this mode the bridge:
    #   - yields a single space (b" ") every HEARTBEAT_INTERVAL_SECONDS to
    #     keep Cloudflare's idle timer alive. JSON parsers ignore leading
    #     whitespace so the eventual JSON body still parses cleanly.
    #   - buffers all upstream SSE bytes
    #   - on EOF, parses the accumulated SSE events and reassembles them
    #     into the single Anthropic Message JSON object that a non-streaming
    #     call would have returned, then yields that as the final chunk.
    #
    # Output bytes go through ``return_sse_chunk`` and
    # ``_process_chunk_with_cost_injection`` in
    # ``async_streaming_data_generator``; both are no-ops for raw bytes
    # that aren't shaped like SSE frames, so our whitespace and final JSON
    # bytes pass through unmodified.

    # Single-space heartbeat. This is the key trick of collapse mode:
    # (a) JSON's grammar tolerates arbitrary leading whitespace,
    #     so a stream like ``b"   {...}"`` parses identically to ``b"{...}"``
    # (b) Cloudflare sees activity on the wire and resets its idle timer.
    _COLLAPSE_HEARTBEAT_CHUNK: bytes = b" "


    def _request_data_marks_collapse(request_data: Any) -> bool:
        """Was this request flipped to streaming by ``force_stream``?

        The flag travels via ``request_data["litellm_metadata"]
        ["_force_stream_collapse"]``. Returns False on any access error so
        a malformed metadata blob never crashes the iterator hook.
        """
        try:
            if not isinstance(request_data, dict):
                return False
            md = request_data.get("litellm_metadata")
            if not isinstance(md, dict):
                return False
            return bool(md.get("_force_stream_collapse"))
        except Exception:
            return False


    def _parse_anthropic_sse_events(buf: bytes) -> List[Dict[str, Any]]:
        """Parse a raw Anthropic SSE byte buffer into a list of event dicts.

        Each Anthropic SSE event has the shape::

            event: <event_name>
            data: <json>

        separated by a blank line. A single TCP chunk often contains many
        events. The ``data`` JSON's ``"type"`` field also names the event,
        so for our reassembly we ignore the ``event:`` line and key off the
        parsed JSON's ``type``.

        Malformed events are skipped, not raised — partial / truncated
        upstream responses still produce as much output as we can.
        """
        events: List[Dict[str, Any]] = []
        if not buf:
            return events
        # SSE event boundary is a blank line. Normalize CRLF first.
        normalized = buf.replace(b"\r\n", b"\n").replace(b"\r", b"\n")
        for raw_event in normalized.split(b"\n\n"):
            raw_event = raw_event.strip()
            if not raw_event:
                continue
            data_lines: List[bytes] = []
            for line in raw_event.split(b"\n"):
                if line.startswith(b"data:"):
                    data_lines.append(line[len(b"data:") :].lstrip())
                elif line.startswith(b"data: "):  # belt-and-suspenders
                    data_lines.append(line[len(b"data: ") :])
            if not data_lines:
                continue
            try:
                payload = json.loads(b"\n".join(data_lines).decode("utf-8"))
            except (UnicodeDecodeError, json.JSONDecodeError):
                continue
            if isinstance(payload, dict):
                events.append(payload)
        return events


    def _reassemble_anthropic_message(
        events: List[Dict[str, Any]]
    ) -> Optional[Dict[str, Any]]:
        """Walk parsed SSE events to rebuild the single Message JSON that
        a non-streaming Anthropic /v1/messages call would have returned.

        Anthropic's streaming protocol splits a Message into:

            message_start         -> seeds the message envelope (id, model,
                                     role, usage.input_tokens, empty content)
            content_block_start   -> initializes content[index] with a typed
                                     stub ({"type": "text", "text": ""},
                                     {"type": "tool_use", "input": {} from
                                     partial_json}, {"type": "thinking", ...})
            content_block_delta   -> incrementally fills the block
                                     (text_delta, thinking_delta,
                                     input_json_delta, signature_delta)
            content_block_stop    -> finalizes the block (for tool_use we
                                     must JSON-decode the accumulated
                                     partial_json into ``input``)
            message_delta         -> stop_reason, stop_sequence, usage
                                     deltas (output_tokens etc.)
            message_stop          -> end of message
            ping                  -> ignored
            error                 -> upstream error mid-stream; we surface
                                     it as a JSON error response so the
                                     client's non-streaming path can raise

        Returns ``None`` if no ``message_start`` was ever seen — caller
        surfaces that as an explicit error to the client.
        """
        msg: Optional[Dict[str, Any]] = None
        # Per-index accumulator for partial_json (tool_use input)
        partial_inputs: Dict[int, str] = {}

        for ev in events:
            ev_type = ev.get("type")

            if ev_type == "error":
                # Return Anthropic-shaped error envelope. Their non-streaming
                # error format matches this exactly.
                err_body = ev.get("error", ev)
                return {"type": "error", "error": err_body}

            if ev_type == "message_start":
                inner = ev.get("message")
                if isinstance(inner, dict):
                    msg = dict(inner)
                    if not isinstance(msg.get("content"), list):
                        msg["content"] = []
                continue

            if msg is None:
                # Got a non-message_start event before message_start. Skip.
                continue

            if ev_type == "content_block_start":
                idx = ev.get("index", 0)
                block = ev.get("content_block")
                if not isinstance(block, dict):
                    continue
                block = dict(block)
                content_list = msg.setdefault("content", [])
                while len(content_list) <= idx:
                    content_list.append({})
                content_list[idx] = block
                if block.get("type") == "tool_use":
                    # tool_use blocks accumulate partial_json deltas; the
                    # ``input`` field is filled at content_block_stop.
                    partial_inputs[idx] = ""
                    block.setdefault("input", {})
                continue

            if ev_type == "content_block_delta":
                idx = ev.get("index", 0)
                delta = ev.get("delta") or {}
                content_list = msg.get("content") or []
                if not (0 <= idx < len(content_list)):
                    continue
                block = content_list[idx]
                if not isinstance(block, dict):
                    continue
                d_type = delta.get("type")
                if d_type == "text_delta":
                    block["text"] = (block.get("text") or "") + (delta.get("text") or "")
                elif d_type == "thinking_delta":
                    block["thinking"] = (block.get("thinking") or "") + (
                        delta.get("thinking") or ""
                    )
                elif d_type == "signature_delta":
                    # signatures are sent whole, but be defensive about
                    # multiple deltas just in case.
                    sig = delta.get("signature") or ""
                    block["signature"] = (block.get("signature") or "") + sig
                elif d_type == "input_json_delta":
                    partial_inputs[idx] = partial_inputs.get(idx, "") + (
                        delta.get("partial_json") or ""
                    )
                continue

            if ev_type == "content_block_stop":
                idx = ev.get("index", 0)
                if idx in partial_inputs:
                    pj = partial_inputs.pop(idx)
                    content_list = msg.get("content") or []
                    if 0 <= idx < len(content_list) and isinstance(
                        content_list[idx], dict
                    ):
                        try:
                            content_list[idx]["input"] = json.loads(pj) if pj else {}
                        except (json.JSONDecodeError, TypeError):
                            # Leave whatever we had; the client will see a
                            # malformed tool_use input but at least the rest
                            # of the message is intact.
                            content_list[idx].setdefault("input", {})
                continue

            if ev_type == "message_delta":
                delta = ev.get("delta") or {}
                if "stop_reason" in delta:
                    msg["stop_reason"] = delta.get("stop_reason")
                if "stop_sequence" in delta:
                    msg["stop_sequence"] = delta.get("stop_sequence")
                usage = ev.get("usage")
                if isinstance(usage, dict):
                    existing = msg.setdefault("usage", {})
                    if not isinstance(existing, dict):
                        existing = {}
                        msg["usage"] = existing
                    existing.update(usage)
                continue

            # message_stop / ping / unknown -> no-op
        return msg


    def _build_collapsed_error(message: str, code: int = 500) -> Dict[str, Any]:
        """Construct an Anthropic-shaped error response for the collapsed
        path when reassembly fails entirely (no message_start, decode
        error, etc.). Keeps client behavior consistent with a real
        upstream error."""
        return {
            "type": "error",
            "error": {
                "type": "api_error",
                "message": message,
            },
        }


    def _load_canary_aliases() -> Set[str]:
        raw = os.environ.get("STREAMING_BRIDGE_KEY_ALIASES")
        if raw is None:
            # Only fall back to the bundled default when NO env var is
            # configured at all. If the operator explicitly sets
            # STREAMING_BRIDGE_KEY_PREFIXES (even empty), that signals
            # prefix-only gating and we should not silently add the default.
            if os.environ.get("STREAMING_BRIDGE_KEY_PREFIXES") is None:
                return set(_DEFAULT_CANARY_KEY_ALIASES)
            return set()
        return {item.strip() for item in raw.split(",") if item.strip()}


    def _load_canary_prefixes() -> Tuple[str, ...]:
        raw = os.environ.get("STREAMING_BRIDGE_KEY_PREFIXES")
        if raw is None:
            return _DEFAULT_CANARY_KEY_PREFIXES
        return tuple(item.strip() for item in raw.split(",") if item.strip())


    def _load_heartbeat_seconds() -> float:
        raw = os.environ.get("STREAMING_BRIDGE_HEARTBEAT_SECONDS")
        if not raw:
            return _DEFAULT_HEARTBEAT_SECONDS
        try:
            value = float(raw)
        except (TypeError, ValueError):
            return _DEFAULT_HEARTBEAT_SECONDS
        if value < 1.0:
            return 1.0
        if value > 90.0:
            return 90.0
        return value


    def _chunk_bytes_view(chunk: Any) -> Optional[bytes]:
        """Return a bytes view of the chunk iff it can be scanned for the marker.

        The anthropic_messages passthrough always yields bytes. Anything
        else (dict / str / None) we skip — we do not want to stamp TTFT on
        unexpected chunk shapes.
        """
        if isinstance(chunk, (bytes, bytearray)):
            return bytes(chunk) if chunk else None
        return None


    def _patch_base_anthropic_streaming_iterator() -> None:
        """Pin ``BaseAnthropicMessagesStreamingIterator.start_time`` to
        ``litellm_logging_obj.start_time`` (proxy entry time).

        The upstream class captures ``self.start_time = datetime.now()``
        inside ``__init__`` which runs AFTER the upstream HTTP response
        headers have arrived. Wangsu/Anthropic flushes headers together with
        the first SSE events, so this timestamp is essentially identical
        to the moment the first content token reaches us, collapsing TTFT
        to ≈ 0. The correct value is ``logging_obj.start_time``, set by
        ``function_setup`` the instant the request entered the proxy.

        The patch is idempotent and fails open (falls back to
        ``datetime.now()``) if ``litellm_logging_obj`` ever lacks a usable
        start_time.
        """
        try:
            from litellm.llms.anthropic.experimental_pass_through.messages.streaming_iterator import (
                BaseAnthropicMessagesStreamingIterator,
            )
        except Exception as exc:
            _log.warning(
                "streaming_bridge: cannot import BaseAnthropicMessagesStreamingIterator: %r",
                exc,
            )
            return

        original_init = BaseAnthropicMessagesStreamingIterator.__init__
        if getattr(original_init, "_streaming_bridge_patched", False):
            return  # already patched (e.g. module imported twice)

        def patched_init(self, litellm_logging_obj, request_body):  # type: ignore[no-untyped-def]
            self.litellm_logging_obj = litellm_logging_obj
            self.request_body = request_body

            proxy_entry_time = getattr(litellm_logging_obj, "start_time", None)
            if isinstance(proxy_entry_time, datetime.datetime):
                self.start_time = proxy_entry_time
            else:
                self.start_time = datetime.datetime.now()

        patched_init._streaming_bridge_patched = True  # type: ignore[attr-defined]
        BaseAnthropicMessagesStreamingIterator.__init__ = patched_init
        _log.info(
            "streaming_bridge: patched BaseAnthropicMessagesStreamingIterator.__init__"
            " to use logging_obj.start_time"
        )


    # Apply the __init__ patch at import time so every subsequent
    # /v1/messages request uses the corrected start_time.
    _patch_base_anthropic_streaming_iterator()


    class StreamingBridge(CustomLogger):
        """SSE heartbeat + TTFT stamping for anthropic_messages streams."""

        def __init__(self) -> None:
            super().__init__()
            self._canary_aliases: Set[str] = _load_canary_aliases()
            self._canary_prefixes: Tuple[str, ...] = _load_canary_prefixes()
            self._heartbeat_seconds: float = _load_heartbeat_seconds()

        def _alias_matches(self, key_alias: Optional[str]) -> bool:
            if not isinstance(key_alias, str):
                return False
            if key_alias in self._canary_aliases:
                return True
            if self._canary_prefixes and key_alias.startswith(self._canary_prefixes):
                return True
            return False

        def _should_bridge(
            self, user_api_key_dict: Any, request_data: Any
        ) -> Optional[Any]:
            """Return the logging_obj iff this request should be bridged.

            Returning None means "pass the upstream iterator through untouched".
            """
            try:
                key_alias = getattr(user_api_key_dict, "key_alias", None)
                if not self._alias_matches(key_alias):
                    return None

                if not isinstance(request_data, dict):
                    return None

                logging_obj = request_data.get("litellm_logging_obj")
                if logging_obj is None:
                    return None

                if getattr(logging_obj, "call_type", None) != _TARGET_CALL_TYPE:
                    return None

                return logging_obj
            except Exception:
                return None

        @staticmethod
        def _stamp_completion_start(logging_obj: Any) -> None:
            try:
                logging_obj._update_completion_start_time(
                    datetime.datetime.now()
                )
            except Exception as exc:
                try:
                    litellm.print_verbose(
                        f"[streaming_bridge] TTFT stamp failed: {exc!r}"
                    )
                except Exception:
                    pass

        async def async_post_call_streaming_iterator_hook(
            self,
            user_api_key_dict: Any,
            response: AsyncIterator[Any],
            request_data: dict,
        ) -> AsyncIterator[Any]:
            logging_obj = self._should_bridge(user_api_key_dict, request_data)
            if logging_obj is None:
                async for chunk in response:
                    yield chunk
                return

            collapse_mode = _request_data_marks_collapse(request_data)

            # Prefetcher pushes upstream chunks into a queue; the main loop
            # reads with wait_for so we can inject heartbeats on silence.
            queue: asyncio.Queue = asyncio.Queue()
            eof_sentinel = object()
            err_sentinel = object()

            async def _prefetch() -> None:
                try:
                    async for chunk in response:
                        await queue.put(chunk)
                except asyncio.CancelledError:
                    raise
                except Exception as exc:
                    await queue.put((err_sentinel, exc))
                finally:
                    await queue.put(eof_sentinel)

            task = asyncio.create_task(_prefetch())

            # ---------- collapse mode ----------
            # Buffer everything from upstream; never relay SSE bytes to the
            # client. Yield a single space (b" ") on a wall-clock cadence
            # so the client TCP connection always sees activity, even when
            # upstream is busy emitting SSE events that we are silently
            # buffering. JSON parsers ignore leading whitespace so the
            # eventual JSON body still parses cleanly.
            #
            # Critical detail: the heartbeat MUST fire on wall-clock
            # cadence, not on "no upstream chunk in N seconds". If we keyed
            # off upstream silence, a chatty SSE stream (ping every 1 s,
            # content_block_delta every 200 ms) would buffer everything
            # internally for 100+ s without yielding anything to the
            # client, and Cloudflare would 524 the connection. By
            # tracking time-since-last-yield-to-client we guarantee the
            # client wire sees a byte at least every ``_heartbeat_seconds``
            # regardless of how busy upstream is.
            if collapse_mode:
                collapse_buf = bytearray()
                stamped = False
                last_yield_at: float = asyncio.get_event_loop().time()
                upstream_done = False
                upstream_error: Optional[BaseException] = None

                async def _drain_one(timeout: float) -> bool:
                    """Pull one item from the queue with a timeout.

                    Returns True if EOF was reached, False if a chunk was
                    buffered, raises asyncio.TimeoutError on timeout.
                    """
                    nonlocal stamped
                    item = await asyncio.wait_for(queue.get(), timeout=timeout)
                    if item is eof_sentinel:
                        return True
                    if (
                        isinstance(item, tuple)
                        and len(item) == 2
                        and item[0] is err_sentinel
                    ):
                        raise item[1]
                    view = _chunk_bytes_view(item)
                    if view is not None:
                        collapse_buf.extend(view)
                        if (
                            not stamped
                            and _CONTENT_DELTA_MARKER in collapse_buf
                            and not getattr(
                                logging_obj, "completion_start_time", None
                            )
                        ):
                            self._stamp_completion_start(logging_obj)
                            stamped = True
                    return False

                try:
                    while not upstream_done:
                        now = asyncio.get_event_loop().time()
                        remaining = self._heartbeat_seconds - (now - last_yield_at)
                        if remaining <= 0:
                            # Heartbeat is overdue. Yield right now and
                            # reset the wall-clock timer.
                            yield _COLLAPSE_HEARTBEAT_CHUNK
                            last_yield_at = asyncio.get_event_loop().time()
                            continue
                        try:
                            upstream_done = await _drain_one(timeout=remaining)
                        except asyncio.TimeoutError:
                            # Heartbeat interval elapsed with no EOF; yield
                            # whitespace and loop back to wait again.
                            yield _COLLAPSE_HEARTBEAT_CHUNK
                            last_yield_at = asyncio.get_event_loop().time()
                        except Exception as exc:
                            upstream_error = exc
                            break

                    if upstream_error is not None:
                        # Upstream errored before completing. Surface an
                        # Anthropic-shaped error envelope; the client's
                        # non-streaming path will raise a sensible APIError.
                        err_body = _build_collapsed_error(
                            f"upstream stream interrupted: {upstream_error!r}"
                        )
                        yield json.dumps(err_body).encode("utf-8")
                        return

                    # Upstream closed cleanly. Reassemble + emit one JSON.
                    events = _parse_anthropic_sse_events(bytes(collapse_buf))
                    msg = _reassemble_anthropic_message(events)
                    if msg is None:
                        msg = _build_collapsed_error(
                            "upstream stream produced no message_start event"
                        )
                    yield json.dumps(msg, ensure_ascii=False).encode("utf-8")
                    return
                finally:
                    if not task.done():
                        task.cancel()
                        try:
                            await task
                        except (asyncio.CancelledError, Exception):
                            pass

            # ---------- pass-through mode (existing behavior) ----------
            # Scan buffer for first `content_block_delta` marker across chunk
            # boundaries (httpx may split a single SSE frame across TCP reads).
            # We keep up to ``_SCAN_BUFFER_LIMIT`` bytes and slide the window
            # so that a marker split exactly at the edge is still detected.
            scan_buf = bytearray()
            marker_len = len(_CONTENT_DELTA_MARKER)
            first_content_seen = False

            try:
                while True:
                    try:
                        item = await asyncio.wait_for(
                            queue.get(), timeout=self._heartbeat_seconds
                        )
                    except asyncio.TimeoutError:
                        # Upstream has been silent long enough that Cloudflare
                        # would soon 524. Inject an SSE comment — clients
                        # ignore it, Cloudflare sees activity.
                        yield _HEARTBEAT_CHUNK
                        continue

                    if item is eof_sentinel:
                        return
                    if (
                        isinstance(item, tuple)
                        and len(item) == 2
                        and item[0] is err_sentinel
                    ):
                        raise item[1]

                    if not first_content_seen:
                        view = _chunk_bytes_view(item)
                        if view is not None:
                            scan_buf.extend(view)
                            if _CONTENT_DELTA_MARKER in scan_buf:
                                first_content_seen = True
                                self._stamp_completion_start(logging_obj)
                                scan_buf = bytearray()  # free memory
                            elif len(scan_buf) > _SCAN_BUFFER_LIMIT:
                                # Retain only the tail so a marker straddling
                                # the boundary is still findable, but stop
                                # the buffer from growing unboundedly.
                                del scan_buf[: -(marker_len - 1)]
                    yield item
            finally:
                if not task.done():
                    task.cancel()
                    try:
                        await task
                    except (asyncio.CancelledError, Exception):
                        pass


    streaming_bridge = StreamingBridge()

