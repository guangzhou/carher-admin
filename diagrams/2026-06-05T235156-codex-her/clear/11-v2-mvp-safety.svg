  <text x="150" y="724" font-family="Noto Sans SC, Arial" font-size="19" fill="#52606D">审计与策略输入</text>

  <rect x="520" y="185" width="360" height="700" rx="26" fill="#FFF7ED" stroke="#F97316" stroke-width="5"/>
