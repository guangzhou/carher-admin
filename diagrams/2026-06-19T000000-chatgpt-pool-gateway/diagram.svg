<svg xmlns="http://www.w3.org/2000/svg" width="1680" height="980" viewBox="0 0 1680 980">
  <rect x="0" y="0" width="1680" height="980" fill="#f7f4ee"/>
  <rect x="36" y="34" width="1608" height="912" rx="34" fill="#fffaf0" stroke="#24312f" stroke-width="3"/>

  <text x="78" y="96" font-size="34" font-weight="700" fill="#17211f">198 ChatGPT Pro 账号池优化架构</text>
  <text x="80" y="135" font-size="18" fill="#53615e">从“一账号一 Pod”收敛为“少量 shard gateway 管多账号”，保留 LiteLLM 路由、fallback 和审计能力</text>

  <rect x="74" y="174" width="338" height="648" rx="22" fill="#eaf5ef" stroke="#2f6f56" stroke-width="2"/>
  <text x="104" y="220" font-size="25" font-weight="700" fill="#1c4f3d">调用入口</text>
  <rect x="112" y="256" width="260" height="92" rx="18" fill="#ffffff" stroke="#2f6f56" stroke-width="2"/>
  <text x="142" y="293" font-size="20" font-weight="700" fill="#1c4f3d">Cursor / Codex Key</text>
  <text x="142" y="324" font-size="15" fill="#56645f">用户侧仍请求 gpt-5.5 / gpt-5.4</text>
  <rect x="112" y="390" width="260" height="116" rx="18" fill="#ffffff" stroke="#2f6f56" stroke-width="2"/>
  <text x="142" y="430" font-size="20" font-weight="700" fill="#1c4f3d">198 LiteLLM 主代理</text>
  <text x="142" y="462" font-size="15" fill="#56645f">key 管控 / spend logs</text>
  <text x="142" y="488" font-size="15" fill="#56645f">model alias / fallback</text>
  <rect x="112" y="550" width="260" height="104" rx="18" fill="#fff6df" stroke="#b98322" stroke-width="2"/>
  <text x="142" y="590" font-size="20" font-weight="700" fill="#744b05">保留能力</text>
  <text x="142" y="622" font-size="15" fill="#6d604e">不重写 198 主路由和 key 体系</text>

  <rect x="490" y="174" width="566" height="648" rx="22" fill="#eef4ff" stroke="#315d9d" stroke-width="2"/>
  <text x="524" y="220" font-size="25" font-weight="700" fill="#244a7d">账号池运行时</text>
  <text x="524" y="250" font-size="16" fill="#53615e">核心变化：LiteLLM 不再一账号一 Pod，改为少量 shard gateway</text>

  <rect x="542" y="292" width="196" height="142" rx="18" fill="#ffffff" stroke="#315d9d" stroke-width="2"/>
  <text x="570" y="329" font-size="20" font-weight="700" fill="#244a7d">shard-0</text>
  <text x="570" y="360" font-size="15" fill="#58626b">acct-1..acct-8</text>
  <text x="570" y="386" font-size="15" fill="#58626b">单进程路由</text>
  <text x="570" y="412" font-size="15" fill="#58626b">本地状态缓存</text>

  <rect x="780" y="292" width="196" height="142" rx="18" fill="#ffffff" stroke="#315d9d" stroke-width="2"/>
  <text x="808" y="329" font-size="20" font-weight="700" fill="#244a7d">shard-1</text>
  <text x="808" y="360" font-size="15" fill="#58626b">acct-9..acct-16</text>
  <text x="808" y="386" font-size="15" fill="#58626b">健康账号优先</text>
  <text x="808" y="412" font-size="15" fill="#58626b">429 自动摘除</text>

  <rect x="542" y="482" width="196" height="142" rx="18" fill="#ffffff" stroke="#315d9d" stroke-width="2"/>
  <text x="570" y="519" font-size="20" font-weight="700" fill="#244a7d">shard-2</text>
  <text x="570" y="550" font-size="15" fill="#58626b">acct-17..acct-24</text>
  <text x="570" y="576" font-size="15" fill="#58626b">usage 探测</text>
  <text x="570" y="602" font-size="15" fill="#58626b">reset 后召回</text>

  <rect x="780" y="482" width="196" height="142" rx="18" fill="#ffffff" stroke="#315d9d" stroke-width="2"/>
  <text x="808" y="519" font-size="20" font-weight="700" fill="#244a7d">shard-N</text>
  <text x="808" y="550" font-size="15" fill="#58626b">按 8-12 acct 扩容</text>
  <text x="808" y="576" font-size="15" fill="#58626b">横向副本可灰度</text>
  <text x="808" y="602" font-size="15" fill="#58626b">失败自动降级</text>

  <rect x="578" y="680" width="360" height="82" rx="18" fill="#dce9ff" stroke="#315d9d" stroke-width="2"/>
  <text x="608" y="716" font-size="19" font-weight="700" fill="#244a7d">统一 OpenAI-compatible 接口</text>
  <text x="608" y="745" font-size="15" fill="#53615e">/v1/responses 或 /v1/chat/completions</text>

  <rect x="1134" y="174" width="444" height="648" rx="22" fill="#fff0e8" stroke="#b8542a" stroke-width="2"/>
  <text x="1168" y="220" font-size="25" font-weight="700" fill="#813511">状态与外部依赖</text>

  <rect x="1190" y="278" width="326" height="126" rx="18" fill="#ffffff" stroke="#b8542a" stroke-width="2"/>
  <text x="1220" y="316" font-size="20" font-weight="700" fill="#813511">Auth PVC / Secret</text>
  <text x="1220" y="348" font-size="15" fill="#66594f">每账号独立 auth.json</text>
  <text x="1220" y="374" font-size="15" fill="#66594f">集中挂载到对应 shard</text>

  <rect x="1190" y="448" width="326" height="126" rx="18" fill="#ffffff" stroke="#b8542a" stroke-width="2"/>
  <text x="1220" y="486" font-size="18" font-weight="700" fill="#813511">Quota / Health Controller</text>
  <text x="1220" y="518" font-size="15" fill="#66594f">复用 /codex/usage 分类逻辑</text>
  <text x="1220" y="544" font-size="15" fill="#66594f">401 标记、429 冷却、reset 恢复</text>

  <rect x="1190" y="620" width="326" height="126" rx="18" fill="#ffffff" stroke="#b8542a" stroke-width="2"/>
  <text x="1220" y="658" font-size="18" font-weight="700" fill="#813511">ChatGPT / Codex Backend</text>
  <text x="1220" y="690" font-size="15" fill="#66594f">按账号 token 调 backend-api</text>
  <text x="1220" y="716" font-size="15" fill="#66594f">保留风控隔离和独立下线</text>

  <path d="M372 448 H490" stroke="#24312f" stroke-width="4" fill="none"/>
  <polygon points="490,448 474,439 474,457" fill="#24312f"/>
  <path d="M1056 362 H1190" stroke="#24312f" stroke-width="4" fill="none"/>
  <polygon points="1190,362 1174,353 1174,371" fill="#24312f"/>
  <path d="M1056 526 H1190" stroke="#24312f" stroke-width="4" fill="none"/>
  <polygon points="1190,526 1174,517 1174,535" fill="#24312f"/>
  <path d="M1056 690 H1190" stroke="#24312f" stroke-width="4" fill="none"/>
  <polygon points="1190,690 1174,681 1174,699" fill="#24312f"/>

  <path d="M244 506 V704 H578" stroke="#2f6f56" stroke-width="3" fill="none" stroke-dasharray="10 8"/>
  <polygon points="578,704 562,695 562,713" fill="#2f6f56"/>
  <text x="286" y="694" font-size="13" fill="#2f6f56">fallback 仍在 198</text>

  <path d="M1354 574 V620" stroke="#b8542a" stroke-width="4" fill="none"/>
  <polygon points="1354,620 1345,604 1363,604" fill="#b8542a"/>
  <path d="M1354 404 V448" stroke="#b8542a" stroke-width="4" fill="none"/>
  <polygon points="1354,448 1345,432 1363,432" fill="#b8542a"/>

  <rect x="108" y="850" width="412" height="70" rx="16" fill="#1f2a28"/>
  <text x="132" y="880" font-size="16" font-weight="700" fill="#ffffff">Pod 数：几十个 acct Pod</text>
  <text x="132" y="906" font-size="16" font-weight="700" fill="#ffffff">→ 约 acct/8 个 shard Pod</text>
  <rect x="548" y="850" width="430" height="70" rx="16" fill="#315d9d"/>
  <text x="572" y="880" font-size="16" font-weight="700" fill="#ffffff">迁移：canary shard</text>
  <text x="572" y="906" font-size="16" font-weight="700" fill="#ffffff">先接 2-3 个低风险账号</text>
  <rect x="1008" y="850" width="512" height="70" rx="16" fill="#b8542a"/>
  <text x="1032" y="880" font-size="16" font-weight="700" fill="#ffffff">回滚：LiteLLM api_base</text>
  <text x="1032" y="906" font-size="16" font-weight="700" fill="#ffffff">切回原 chatgpt-acct-N Service</text>
</svg>
