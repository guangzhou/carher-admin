apiVersion: v1
kind: ServiceAccount
metadata:
  name: carher-operator
  namespace: carher
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: carher-operator
rules:
  # CRD management
  - apiGroups: [carher.io]
    resources: [herinstances, herinstances/status]
    verbs: [get, list, watch, create, update, patch, delete]
  # Deployments (apps/v1) — Owns() watch + CRUD in ensureDeployment
  - apiGroups: [apps]
    resources: [deployments]
    verbs: [get, list, watch, create, update, patch, delete]
  # Services — Owns() watch + create in ensureService
  - apiGroups: [""]
    resources: [services]
    verbs: [get, list, watch, create, update, patch, delete]
  # Pod lifecycle + status (for ReadinessGate condition patching)
  - apiGroups: [""]
    resources: [pods, pods/log, pods/exec, pods/status]
    verbs: [get, list, watch, create, update, patch, delete]
  # ConfigMaps
  - apiGroups: [""]
    resources: [configmaps]
    verbs: [get, list, watch, create, update, patch, delete]
  # PVCs
  - apiGroups: [""]
    resources: [persistentvolumeclaims]
    verbs: [get, list, watch, create, delete]
  # Secrets (read-only, for app_secret)
  - apiGroups: [""]
    resources: [secrets]
    verbs: [get, list, watch]
  # Events
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
  # Namespaces
  - apiGroups: [""]
    resources: [namespaces]
    verbs: [get, list]
  # Leader election (controller-runtime uses coordination.k8s.io/leases)
  - apiGroups: [coordination.k8s.io]
    resources: [leases]
    verbs: [get, list, watch, create, update, patch, delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: carher-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: carher-operator
subjects:
  - kind: ServiceAccount
    name: carher-operator
    namespace: carher
