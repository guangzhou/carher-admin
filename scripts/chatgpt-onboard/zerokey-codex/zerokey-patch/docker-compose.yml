services:
  zerokey:
    # Cap memory (idle ~40MiB); 128m leaves >2x headroom. No swap.
    mem_limit: 128m
    memswap_limit: 128m
    build:
      context: .
      dockerfile: Dockerfile
    image: zerokey-codex:latest
    container_name: zerokey-codex
    restart: always
    ports:
      - "8123:8123"
    environment:
      - PORT=8123
      - ZK_USER=${ZK_USER:-kristine}
      - ZK_DEFAULT_MODEL=${ZK_DEFAULT_MODEL:-gpt-5-5}
    volumes:
      # Live session, refreshed out-of-band by ops/refresh.sh. rw so the
      # VS Code path can persist its conversation session.
      - ../state/users.json:/app/temp/users.json:rw
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8123/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
