apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatgpt-acct-1
  namespace: litellm-product
  labels: {app: chatgpt-acct-1, pool: chatgpt-acct, account: "1"}
spec:
  replicas: 1
  strategy: {type: Recreate}
  selector:
    matchLabels: {app: chatgpt-acct-1}
  template:
    metadata:
      labels: {app: chatgpt-acct-1, pool: chatgpt-acct, account: "1"}
    spec:
      dnsPolicy: "None"
      dnsConfig:
        nameservers: ["1.1.1.1", "8.8.8.8"]
      containers:
        - name: litellm
          image: 127.0.0.1:5000/litellm-carher:vanilla-v1.85.0
          imagePullPolicy: IfNotPresent
          args: ["--config", "/app/config.yaml", "--port", "4000"]
          ports: [{containerPort: 4000}]
          env:
            - {name: CHATGPT_TOKEN_DIR, value: /chatgpt-auth}
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef: {name: chatgpt-pool-master-key, key: LITELLM_MASTER_KEY}
          resources:
            requests: {cpu: 30m, memory: 128Mi}
            limits: {cpu: "1", memory: 2Gi}
          readinessProbe:
            httpGet: {path: /health/readiness, port: 4000}
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 8
          volumeMounts:
            - {name: config, mountPath: /app/config.yaml, subPath: config.yaml}
            - {name: auth, mountPath: /chatgpt-auth}
      volumes:
        - name: config
          configMap: {name: chatgpt-pool-config}
        - name: auth
          persistentVolumeClaim: {claimName: chatgpt-acct-1-auth}
---
apiVersion: v1
kind: Service
metadata: {name: chatgpt-acct-1, namespace: litellm-product, labels: {app: chatgpt-acct-1, pool: chatgpt-acct, account: "1"}}
spec:
  type: ClusterIP
  selector: {app: chatgpt-acct-1}
  ports: [{port: 4000, targetPort: 4000}]
---
