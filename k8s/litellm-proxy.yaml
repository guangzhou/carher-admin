    """
    LiteLLM spend-log payload sanitizer — strips NUL bytes and lone UTF-16
    surrogates that crash the ``update_spend_logs`` flush job.

    Problem
    -------
    LiteLLM 1.82.6's ``update_spend_logs`` background job flushes accumulated
    ``LiteLLM_SpendLogs`` rows to PostgreSQL in batches of up to 1000 via
    ``prisma_client.db.litellm_spendlogs.create_many(...)``. Each row's dict
    fields (``messages``, ``response``, ``metadata``, ``proxy_server_request``)
    are first serialized via ``PrismaClient.jsonify_object`` (defined in
    ``litellm/proxy/utils.py``):

        def jsonify_object(self, data: dict) -> dict:
            db_data = copy.deepcopy(data)
            for k, v in db_data.items():
                if isinstance(v, dict):
                    try:
                        db_data[k] = json.dumps(v)
                    except Exception:
                        db_data[k] = "failed-to-serialize-json"
            return db_data

    This implementation does **zero validation** of two byte patterns that
    PostgreSQL or its prisma driver reject:

      1. **NUL bytes** (``\\x00`` and the literal escape ``\\u0000``).
         Commonly emitted by binary tool outputs — DOCX/PDF text extraction,
         raw byte slices, client-side ``\\u0000`` escapes in user content.
         ``json.dumps`` encodes ``\\x00`` as the literal six-character
         sequence ``\\u0000``, which PostgreSQL rejects in both ``text`` and
         ``jsonb``:

             ERROR: invalid byte sequence for encoding "UTF8": 0x00
             ERROR: unsupported Unicode escape sequence
             DETAIL: \\u0000 cannot be converted to text.   (SQLSTATE 22P05)

      2. **Lone UTF-16 surrogates** (``\\ud800``..``\\udfff`` codepoints
         not paired with a counterpart). Produced when Node.js clients
         byte-slice an emoji or otherwise truncate a string at a non-codepoint
         boundary. Python's ``str`` happily holds them, and CPython
         ``json.dumps(ensure_ascii=True)`` emits them as a 4-digit hex
         escape — but the prisma client's Rust ``serde_json`` parser
         enforces the JSON spec strictly and rejects any lone surrogate
         with::

             prisma.errors.DataError: ... is not a valid JSON String.
             Underlying error: unexpected end of hex escape at line 1 column N

         The ``embedding_sanitize`` pre-call hook strips lone surrogates
         from ``data["input"]`` before the upstream call, but the spend-log
         payload is built from independent copies — ``proxy_server_request``
         (raw client body), ``metadata`` (logging context), and the
         ``UserAPIKeyAuth`` repr — so lone surrogates can still reach the
         DB even when the embedding call itself succeeded.

    In **either case**, when ``create_many`` (NUL byte → PG side) or its
    prisma JSON encoder (lone surrogate → driver side) hits one bad row,
    **the entire batch of up to 1000 rows is rejected and silently
    discarded** by LiteLLM's flush loop:

        # litellm/proxy/utils.py — update_spend_logs
        for j in range(0, len(logs_to_process), BATCH_SIZE):
            batch = logs_to_process[j : j + BATCH_SIZE]
            batch_with_dates = [
                prisma_client.jsonify_object({**entry}) for entry in batch
            ]
            await prisma_client.db.litellm_spendlogs.create_many(
                data=batch_with_dates, skip_duplicates=True
            )
            # Items already removed from queue at start of function
            # (NO retry, NO single-row split, just drops the whole batch)

    In production this manifests as 23–27 ``update_spend`` failures per
    pod per 30 minutes, each erasing up to 1000 spend rows from the
    billing / audit trail. Upstream issues with no fix merged:

      - https://github.com/BerriAI/litellm/issues/21290  (NUL bytes)
      - https://github.com/BerriAI/litellm/issues/24310  (NUL bytes)
      - https://github.com/BerriAI/litellm/issues/19847  (lone surrogates)

    Fix strategy
    ------------
    We monkey-patch ``PrismaClient.jsonify_object`` (and the module-level
    ``jsonify_object`` for defense-in-depth) at import time so that every
    spend-log batch is recursively scrubbed of:

      * raw NUL byte ``\\x00`` and its JSON escape ``\\u0000``, and
      * any lone UTF-16 surrogate codepoint in U+D800..U+DFFF

    **before** ``json.dumps`` is invoked. Once the bad bytes are gone,
    PostgreSQL accepts the row and the prisma driver successfully encodes
    the batch.

    We also patch ``litellm_core_utils/safe_json_dumps.safe_dumps`` because
    several other paths inside LiteLLM (logging payloads, exception
    serialization) reach the DB through it, even though it is not on the
    spend-log critical path today — cheap insurance against the next
    upstream code reshuffle.

    Why monkey-patch and not a CustomLogger pre-call hook
    -----------------------------------------------------
    The failure happens in a *background job* (``update_spend_logs``),
    hundreds of milliseconds after the originating request has already
    returned to the client. CustomLogger hooks (``async_pre_call_hook``,
    ``async_log_success_event``) run in the request lifecycle and **cannot
    intercept the batch flush**. The only reliable interception point is
    the serializer itself.

    Trade-offs
    ----------
      * **Lossiness**: stripping ``\\x00`` from a string discards what was
        almost certainly garbage anyway (PG cannot store it, the LLM
        cannot tokenize it cleanly, and most tools that generate it are
        binary-mode artifacts). The literal text ``\\u0000`` *that the user
        typed* will also be stripped — extremely rare in practice and
        losing it is preferable to losing the entire 1000-row batch.

        Lone surrogates only exist in strings that are already broken
        UTF-16 fragments (e.g. half of an emoji). They cannot tokenize as
        valid Unicode, so dropping them is identical to what the upstream
        LLM would do anyway; we just do it earlier.

      * **Fail-open**: if ``_strip_nul`` itself raises, the original data is
        passed through unchanged. We never block a spend log on this hook.

      * **Idempotence**: each patch checks a private flag on the function
        object so that re-importing this module (e.g. during dev reloads)
        does not stack patches.

    Removal criteria
    ----------------
    Remove this entire module once an upstream LiteLLM release ships its
    own NUL-byte sanitization in ``jsonify_object`` / ``safe_dumps``. At
    that point the patch becomes a no-op cosmetic and can be deleted.

    Verification (recorded 2026-04-27)
    ----------------------------------
      * pod ``litellm-proxy-554dc489d5-fh86v`` — direct INSERT into
        ``LiteLLM_SpendLogs`` with raw ``\\x00`` and literal ``\\u0000``
        payloads reproduces both PG error variants.
      * Same pod — monkey-patched ``PrismaClient.jsonify_object`` correctly
        scrubbed both byte forms, output JSON contained neither.
      * pod ``litellm-proxy-7758ccb55c-4qfb7`` (after rollout) — observed
        a fresh ``unexpected end of hex escape`` on a ``BAAI/bge-m3`` row
        whose ``proxy_server_request.input[]`` contained the lone surrogate
        ``\\ud83d`` (truncated emoji). Confirms that NUL stripping alone
        is insufficient and motivates the extension to surrogate stripping.
    """
    from __future__ import annotations

    import logging
    import re
    from typing import Any

    from litellm.integrations.custom_logger import CustomLogger


    _log = logging.getLogger(__name__)


    # ── core sanitizer ─────────────────────────────────────────────────────
    # Strip both the raw NUL byte and its JSON-escaped literal form. The
    # literal ``\\u0000`` arrives whenever upstream code already ran
    # ``json.dumps`` on a NUL-containing value (which is exactly what
    # ``jsonify_object`` does for nested dicts, see docstring above).
    _NUL_RAW = "\x00"
    _NUL_ESCAPED = "\\u0000"

    # Lone (unpaired) UTF-16 surrogate code points. CPython auto-collapses
    # correctly-paired surrogates to a single >U+FFFF codepoint, so this
    # regex only matches genuinely broken fragments — typically half of an
    # emoji that was byte-truncated upstream.
    _LONE_SURROGATE_RE = re.compile(r"[\ud800-\udfff]")

    # JSON-escape *literal* form of a lone surrogate (6 ASCII chars: \uDxxx).
    # Reaches the spend-log buffer when upstream code has already run
    # ``json.dumps`` once on a value containing a lone surrogate codepoint,
    # so by the time our patch sees it the codepoint is gone but the
    # 6-character escape sequence remains. Prisma's Rust serde_json driver
    # rejects this literal form just as harshly as the codepoint form
    # ("unexpected end of hex escape").
    #
    # We must NOT strip *paired* surrogate literals like ``\\ud83d\\ude00`` —
    # those are the JSON spec's official way to encode codepoints above
    # U+FFFF (e.g. emoji) and prisma accepts them. Hence the lookahead /
    # lookbehind to require the partner be missing.
    _LITERAL_HIGH_LONE_RE = re.compile(
        # high surrogate `\uD800..\uDBFF` NOT followed by a low surrogate
        r"\\u[dD][89aAbB][0-9a-fA-F]{2}"
        r"(?!\\u[dD][c-fC-F][0-9a-fA-F]{2})"
    )
    _LITERAL_LOW_LONE_RE = re.compile(
        # low surrogate `\uDC00..\uDFFF` NOT preceded by a high surrogate
        r"(?<!\\u[dD][89aAbB][0-9a-fA-F]{2})"
        r"\\u[dD][c-fC-F][0-9a-fA-F]{2}"
    )


    def _scrub_str(s: str) -> str:
        """Strip every byte sequence that crashes our PG/prisma write path.

        Three independent checks; cheap-existence test first so the common
        case (clean string) allocates nothing.
        """
        if _NUL_RAW in s or _NUL_ESCAPED in s:
            s = s.replace(_NUL_RAW, "").replace(_NUL_ESCAPED, "")
        if _LONE_SURROGATE_RE.search(s):
            s = _LONE_SURROGATE_RE.sub("", s)
        # ``\\u`` only appears in strings that have been json-dumped at least
        # once, so this short-circuit avoids two re.sub passes on every
        # input string in the common case.
        if "\\u" in s:
            s = _LITERAL_HIGH_LONE_RE.sub("", s)
            s = _LITERAL_LOW_LONE_RE.sub("", s)
        return s


    def _strip_nul(value: Any) -> Any:
        """Recursively scrub PG/prisma-unsafe bytes from
        ``str`` / ``list`` / ``tuple`` / ``dict`` values.

        Despite the historical name (``_strip_nul``), this also handles
        lone UTF-16 surrogates — kept for backwards-compat with any
        external reference to the symbol.

        Anything other than the above container/string types (int / float /
        bool / None / unknown objects) is returned untouched. The walk is
        O(N) on the encoded payload size with no allocation when the input
        is already clean.
        """
        if isinstance(value, str):
            return _scrub_str(value)
        if isinstance(value, dict):
            return {k: _strip_nul(v) for k, v in value.items()}
        if isinstance(value, list):
            return [_strip_nul(v) for v in value]
        if isinstance(value, tuple):
            return tuple(_strip_nul(v) for v in value)
        return value


    # ── patch points ───────────────────────────────────────────────────────
    def _patch_prisma_jsonify_object() -> None:
        """Wrap ``PrismaClient.jsonify_object`` (the instance method actually
        used by ``update_spend_logs``) so every flushed batch is scrubbed
        before ``json.dumps``.

        Idempotent via ``_null_byte_sanitize_patched`` attribute.
        """
        try:
            from litellm.proxy import utils as _proxy_utils
        except Exception as exc:
            _log.error(
                "null_byte_sanitize: cannot import litellm.proxy.utils: %r",
                exc,
            )
            return

        PrismaClient = getattr(_proxy_utils, "PrismaClient", None)
        if PrismaClient is None:
            _log.error(
                "null_byte_sanitize: litellm.proxy.utils.PrismaClient missing; "
                "skipping jsonify_object patch"
            )
            return

        if getattr(PrismaClient.jsonify_object, "_null_byte_sanitize_patched", False):
            return

        original = PrismaClient.jsonify_object

        def patched_jsonify_object(self, data: dict) -> dict:  # type: ignore[no-untyped-def]
            try:
                cleaned = _strip_nul(data) if isinstance(data, dict) else data
            except Exception as exc:
                try:
                    _log.warning(
                        "null_byte_sanitize: _strip_nul failed (%r); falling back to original data",
                        exc,
                    )
                except Exception:
                    pass
                cleaned = data
            return original(self, cleaned)

        patched_jsonify_object._null_byte_sanitize_patched = True  # type: ignore[attr-defined]
        PrismaClient.jsonify_object = patched_jsonify_object  # type: ignore[method-assign]
        _log.warning(
            "null_byte_sanitize: patched PrismaClient.jsonify_object "
            "(scrubs \\x00 and \\u0000 from spend-log payloads)"
        )


    def _patch_module_level_jsonify_object() -> None:
        """Also patch the module-level ``litellm.proxy.utils.jsonify_object``
        function (defined at line 2264 in 1.82.6 alongside the instance
        method). It is currently used by credential / vector-store / org
        endpoints — not the spend-log critical path — but patching it is
        cheap insurance and mirrors the instance-method behavior.

        Idempotent via ``_null_byte_sanitize_patched`` attribute.
        """
        try:
            from litellm.proxy import utils as _proxy_utils
        except Exception:
            return

        fn = getattr(_proxy_utils, "jsonify_object", None)
        if fn is None or getattr(fn, "_null_byte_sanitize_patched", False):
            return

        def patched_module_jsonify_object(data: dict) -> dict:  # type: ignore[no-untyped-def]
            try:
                cleaned = _strip_nul(data) if isinstance(data, dict) else data
            except Exception:
                cleaned = data
            return fn(cleaned)

        patched_module_jsonify_object._null_byte_sanitize_patched = True  # type: ignore[attr-defined]
        _proxy_utils.jsonify_object = patched_module_jsonify_object  # type: ignore[assignment]


    def _patch_safe_json_dumps() -> None:
        """Wrap ``safe_dumps`` so any future upstream path that routes
        through it on the way to PG also has NUL bytes scrubbed.

        ``safe_dumps`` is used by exception serialization, telemetry
        payloads, and some logging callbacks. Not currently on the
        spend-log critical path in 1.82.6, but upstream has been moving
        serialization in this direction.

        Idempotent via ``_null_byte_sanitize_patched`` attribute.
        """
        try:
            from litellm.litellm_core_utils import safe_json_dumps as _sjd
        except Exception:
            return

        fn = getattr(_sjd, "safe_dumps", None)
        if fn is None or getattr(fn, "_null_byte_sanitize_patched", False):
            return

        def patched_safe_dumps(data: Any, max_depth: int = 10) -> str:  # type: ignore[no-untyped-def]
            try:
                cleaned = _strip_nul(data)
            except Exception:
                cleaned = data
            return fn(cleaned, max_depth)

        patched_safe_dumps._null_byte_sanitize_patched = True  # type: ignore[attr-defined]
        _sjd.safe_dumps = patched_safe_dumps  # type: ignore[assignment]


    # Apply all patches at import time so the very next ``update_spend_logs``
    # tick scrubs whatever NUL-bearing rows are already sitting in the
    # in-memory buffer.
    _patch_prisma_jsonify_object()
    _patch_module_level_jsonify_object()
    _patch_safe_json_dumps()


    class NullByteSanitize(CustomLogger):
        """Inert ``CustomLogger`` placeholder so this module can be referenced
        from ``litellm_settings.callbacks`` like the other callbacks in
        the deployment. All real work is done by the import-time patches
        above; this class is just the registration handle.
        """


    null_byte_sanitize = NullByteSanitize()

  anthropic_passthrough_pingfix.py: |
    """
    LiteLLM Anthropic pass-through streaming logging — JSONDecodeError tolerator.

    Problem
    -------
    LiteLLM 1.82.6's anthropic pass-through endpoint
    (``/app/litellm/proxy/pass_through_endpoints/streaming_handler.py``) collects
    every raw byte chunk that flows from the upstream Anthropic-compatible
    provider through the proxy to the client. After the stream ends, it splits
    the buffer on ``\\n\\n`` boundaries and feeds each piece into
    ``ModelResponseIterator.convert_str_chunk_to_generic_chunk`` (in
    ``/app/litellm/llms/anthropic/chat/handler.py``), which contains::

        def convert_str_chunk_to_generic_chunk(self, chunk: str) -> ModelResponseStream:
            ...
            if str_line.startswith("data:"):
                data_json = json.loads(str_line[5:])      # ← unconditional
                return self.chunk_parser(chunk=data_json)
            else:
                return ModelResponseStream(id=self.response_id)

    The unconditional ``json.loads`` does **zero validation** of the byte
    sequence following the ``data:`` prefix. The SSE spec (RFC 8895) and
    Anthropic's own streaming spec both allow ``data:`` lines that carry no
    JSON payload — for keep-alive heartbeats, comment events, or upstream
    proxy injections. In practice we observed OpenRouter emit at least four
    shapes that explode this code path:

      * ``data:\\n``               — empty payload, no whitespace
      * ``data: \\n``              — payload is a single space
      * ``data:  \\n``             — payload is two spaces
      * ``data: <truncated>\\n``   — partial JSON when upstream cuts mid-event

    When ``json.loads`` raises ``JSONDecodeError`` it propagates straight up
    to ``streaming_handler.py:198``, which catches the exception, logs::

        ERROR streaming_handler.py:198 -
            Error in _route_streaming_logging_to_handler:
            Expecting value: line 1 column 3 (char 2)

    …and then **silently drops the entire success-handler chain**. That chain
    is what writes the SpendLog row — so any anthropic_messages stream whose
    upstream emits even one such heartbeat ends up with HTTP 200 to the
    client (correct) but **zero LiteLLM_SpendLogs entry** (incorrect — invisible
    to billing, audit, the admin UI's Request Logs tab, and every per-key
    spend metric).

    In production this manifests selectively: requests that route to OpenRouter
    (which emits the offending heartbeats during long prefills) lose their
    SpendLog rows, while requests that route to Wangsu (whose CDN gateway
    emits a different heartbeat shape) log normally. For the
    ``claude-code-liuguoxian-50gj`` test on 2026-04-28 we observed exactly
    this split:

      * 3 POST /v1/messages -> 200 OK  (all three reached the proxy fine)
      * 1 SpendLog row written         (the Haiku request that hit Wangsu)
      * 2 SpendLog rows missing        (the Sonnet/Opus requests that hit OR)
      * 2 streaming_handler.py:198 errors in the proxy log (1:1 with the
        missing SpendLog rows)

    Why "tolerate JSONDecodeError" rather than "skip empty data: lines"
    -------------------------------------------------------------------
    Initial hypothesis was the narrow case ``data:\\s*\\n``. Direct
    falsification in the running pod showed the upstream's actual
    JSONDecodeError positional info (``line 1 column 3 (char 2)``) does NOT
    match what the empty-data hypothesis predicts (``line 2 column 1 (char N)``,
    because ``str_line[5:]`` for ``data:  \\n`` is ``"  \\n"`` with a real
    newline). The mismatch means the actual exploding chunk has *some other
    shape* — most likely ``data:`` with leading whitespace then non-JSON text
    (a partial event, a non-standard OR comment, or whitespace alone with the
    trailing newline already stripped by the iterator's chunk-splitting). We
    do not need to enumerate every possible weird shape: every shape produces
    the same root failure mode (``json.loads`` on the byte sequence after
    ``data:``), so catching ``JSONDecodeError`` at exactly that call site
    fixes all of them at once, present and future.

    Fix
    ---
    Wrap ``ModelResponseIterator.convert_str_chunk_to_generic_chunk`` so that
    ``JSONDecodeError`` from the inner ``json.loads`` is converted to the
    same empty ``ModelResponseStream`` the upstream returns when a chunk
    doesn't start with ``data:``. The downstream consumer
    (``stream_chunk_builder``) is already tolerant of empty stream chunks:
    it iterates over chunks and accumulates non-empty deltas, so dropping a
    single un-parseable frame loses one heartbeat at most — heartbeats by
    definition carry no token information, so SpendLog token counts are
    unaffected.

    Side effect summary:
      * Affected ConfigMap entry  — none (this hook contributes only an
        import-time monkey-patch; the class instance below is inert).
      * Affected request types    — only anthropic_messages (/v1/messages)
        pass-through streams. /chat/completions and /messages-without-stream
        paths are untouched.
      * Affected logging paths    — only the post-stream success chain that
        builds the StandardLoggingPayload from buffered raw bytes. The
        real-time iterator that yields chunks to the client (the LiteLLM
        streaming handler used by SDK clients) has its own parsing path and
        never reached the buggy line.
      * Lost telemetry            — for any chunk that *would* have raised
        here we lose its delta. By spec these are heartbeats, so output_tokens
        and content_text are unchanged.

    Idempotent: the patch is guarded by an ``_anthropic_passthrough_pingfix_patched``
    attribute on the patched function, so re-importing the module is a no-op.

    Upstream tracking
    -----------------
    Will be filed at github.com/BerriAI/litellm/issues — the proper upstream
    fix is in ``ModelResponseIterator.convert_str_chunk_to_generic_chunk``
    itself (treat empty payload as a no-op event). Once an upstream release
    ships the fix, remove this entry from
    ``litellm_settings.callbacks`` and delete this file.
    """

    from __future__ import annotations

    import functools
    import json
    import logging as _stdlib_logging
    from typing import Any

    import litellm
    from litellm.integrations.custom_logger import CustomLogger

    _log = _stdlib_logging.getLogger("anthropic_passthrough_pingfix")


    def _patch_convert_str_chunk_to_generic_chunk() -> None:
        """Install the JSONDecodeError tolerator on
        ``ModelResponseIterator.convert_str_chunk_to_generic_chunk``.

        Idempotent via ``_anthropic_passthrough_pingfix_patched`` attribute on
        the patched function. Re-importing this module is a no-op.
        """
        try:
            from litellm.llms.anthropic.chat.handler import ModelResponseIterator
            from litellm.types.utils import ModelResponseStream
        except Exception as exc:  # pragma: no cover - defensive
            _log.warning(
                "anthropic_passthrough_pingfix: cannot import target classes: %r",
                exc,
            )
            return

        original = ModelResponseIterator.convert_str_chunk_to_generic_chunk
        if getattr(original, "_anthropic_passthrough_pingfix_patched", False):
            _log.debug(
                "anthropic_passthrough_pingfix: already patched, skipping"
            )
            return

        @functools.wraps(original)
        def _safe_convert(self: Any, chunk: Any) -> Any:
            try:
                return original(self, chunk)
            except json.JSONDecodeError as exc:
                # Single-line debug log of the exploding chunk so we can
                # post-mortem the actual upstream byte pattern. Truncated
                # to 120 chars to avoid log spam if the chunk happens to
                # be a large truncated JSON event.
                try:
                    preview = (
                        chunk.decode("utf-8", errors="replace")
                        if isinstance(chunk, (bytes, bytearray))
                        else str(chunk)
                    )
                    preview = preview.replace("\n", "\\n").replace("\r", "\\r")
                    if len(preview) > 120:
                        preview = preview[:120] + "...(truncated)"
                except Exception:
                    preview = "<unprintable>"
                _log.debug(
                    "anthropic_passthrough_pingfix: tolerated JSONDecodeError "
                    "on chunk %r (%s)",
                    preview,
                    exc,
                )
                return ModelResponseStream(id=getattr(self, "response_id", None))

        _safe_convert._anthropic_passthrough_pingfix_patched = True  # type: ignore[attr-defined]
        ModelResponseIterator.convert_str_chunk_to_generic_chunk = _safe_convert
        _log.info(
            "anthropic_passthrough_pingfix: patched "
            "ModelResponseIterator.convert_str_chunk_to_generic_chunk"
        )


    _patch_convert_str_chunk_to_generic_chunk()


    class AnthropicPassthroughPingFix(CustomLogger):
        """Inert CustomLogger marker.

        The real work is the import-time monkey-patch above. This class exists
        only because LiteLLM's callback loader requires a class instance to
        register; listing this module in ``litellm_settings.callbacks`` is
        what triggers the import (and therefore the patch). Adds zero runtime
        overhead per request.
        """

        def __init__(self) -> None:
            super().__init__()


    anthropic_passthrough_pingfix = AnthropicPassthroughPingFix()

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm-proxy
  namespace: carher
  labels:
    app: litellm-proxy
spec:
  replicas: 2
  # Zero-disruption rolling updates: always keep all existing replicas
  # Ready while surging up one new pod, so the Service never drops below
  # the desired replica count. Combined with the container's preStop +
  # terminationGracePeriodSeconds, in-flight streaming requests on a pod
  # being rotated get up to 60s to drain while new traffic is steered to
  # the other Ready pod.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: litellm-proxy
  template:
    metadata:
      labels:
        app: litellm-proxy
    spec:
      # Give in-flight streaming requests time to complete when a pod is
      # being rotated out during a rolling update. Default is 30s which
      # can cut off streaming chat completions mid-response.
      #
      # Bumped 60 -> 600 (2026-04-25): Opus 4.6/4.7 thinking-mode requests
      # routinely run 2-10 min wall-time. With 60s + 15s preStop, the
      # effective drain window was only ~45s, so any rolling update
      # initiated while a long stream was in flight would SIGKILL the
      # connection mid-response and surface to the client as
      # "socket connection closed unexpectedly" (a tunnel-side TCP RST).
      # Confirmed regression on tenggeer's claude-code-* request during
      # the force_stream canary expansion rollout.
      #
      # 600s covers >99.5% of observed long requests (worst observed:
      # 570s for Opus 4-6 with in=93k tokens). Even pathological cases
      # eventually hit upstream's own 600s cap, so a longer grace period
      # buys nothing extra.
      terminationGracePeriodSeconds: 600
      imagePullSecrets:
        - name: acr-vpc-secret
      initContainers:
        - name: prisma-migrate
          image: ghcr.io/berriai/litellm@sha256:d90ae7e09aee669c53e4b6b267c123f0e830ed3f067b8c789644a965c30acf4a
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c", "prisma db push --schema /app/litellm/proxy/schema.prisma --skip-generate --accept-data-loss"]
          envFrom:
            - secretRef:
                name: litellm-secrets
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1536Mi
        # ═══════════════════════════════════════════════════════════════
        # YAML-as-source-of-truth enforcement (added 2026-04-27).
        #
        # LiteLLM v1.82.x merges three rows from the LiteLLM_Config table
        # into runtime settings on every proxy startup, with DB winning
        # over YAML on overlapping keys:
        #   * router_settings   — _add_router_settings_from_db_config
        #     (proxy_server.py:4023). Hard merge via _update_dictionary;
        #     stale ``fallbacks`` / ``model_group_alias`` etc. silently
        #     replace YAML.
        #   * litellm_settings  — _init_callback_settings_from_db
        #     (proxy_server.py:4582+). Stale ``callbacks`` lists
        #     deregister hooks that the YAML expects to be active.
        #   * general_settings  — chicken-and-egg flip at
        #     proxy_server.py:6015 reads DB.store_model_in_db and
        #     overrides YAML's ``false``. Once flipped to True, the
        #     proxy persists admin-UI changes back to the same DB rows,
        #     re-creating the drift on the next restart.
        #
        # Symptom we hit on 2026-04-27: ``mock_testing_fallbacks=true``
        # returned HTTP 500 ``No fallback model group found`` because the
        # YAML's 13 fallback entries were lost — DB had only 4 stale
        # entries from a prior admin UI session. Three of four custom
        # callbacks (force_stream, streaming_bridge, embedding_sanitize)
        # were silently absent from the request path for the same reason.
        #
        # Fix: physically DELETE the three rows before the proxy starts.
        # YAML is then the sole source of truth on every cold start.
        # Admin UI changes still work for one pod lifetime — they simply
        # do not survive a restart, which is the intended trade.
        #
        # Idempotent: DELETE WHERE on a missing row is a no-op. Safe to
        # run on every restart, including the very first when the
        # LiteLLM_Config table is empty. Runs AFTER prisma-migrate so
        # the table is guaranteed to exist.
        # ═══════════════════════════════════════════════════════════════
        - name: wipe-db-config-rows
          image: ghcr.io/berriai/litellm@sha256:d90ae7e09aee669c53e4b6b267c123f0e830ed3f067b8c789644a965c30acf4a
          imagePullPolicy: IfNotPresent
          command: ["python3", "-c"]
          args:
            - |
              import asyncio
              import sys
              from prisma import Prisma

              ROWS = ("router_settings", "litellm_settings", "general_settings")

              async def go() -> None:
                  db = Prisma()
                  await db.connect()
                  try:
                      before = await db.query_raw(
                          'SELECT param_name FROM "LiteLLM_Config" '
                          'WHERE param_name IN ($1, $2, $3) '
                          'ORDER BY param_name',
                          *ROWS,
                      )
                      before_names = [r["param_name"] for r in before]
                      print(f"[wipe-db-config-rows] before: {before_names}", flush=True)

                      await db.execute_raw(
                          'DELETE FROM "LiteLLM_Config" '
                          'WHERE param_name IN ($1, $2, $3)',
                          *ROWS,
                      )

                      after = await db.query_raw(
                          'SELECT param_name FROM "LiteLLM_Config" '
                          'WHERE param_name IN ($1, $2, $3) '
                          'ORDER BY param_name',
                          *ROWS,
                      )
                      after_names = [r["param_name"] for r in after]
                      print(f"[wipe-db-config-rows] after : {after_names}", flush=True)

                      if after_names:
                          print(
                              "[wipe-db-config-rows] FATAL: rows still present, "
                              "DELETE did not take effect",
                              file=sys.stderr,
                              flush=True,
                          )
                          raise SystemExit(2)

                      print(
                          f"[wipe-db-config-rows] OK: removed "
                          f"{len(before_names)} row(s); LiteLLM_Config is "
                          f"clean for YAML-only startup",
                          flush=True,
                      )
                  finally:
                      await db.disconnect()

              asyncio.run(go())
          envFrom:
            - secretRef:
                name: litellm-secrets
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
      containers:
        - name: litellm
          image: ghcr.io/berriai/litellm@sha256:d90ae7e09aee669c53e4b6b267c123f0e830ed3f067b8c789644a965c30acf4a
          imagePullPolicy: IfNotPresent
          args: ["--config", "/app/config.yaml", "--port", "4000"]
          ports:
            - containerPort: 4000
              name: http
          env:
            # Gating for streaming_bridge.streaming_bridge.
            # Matching keys get: (1) SSE keepalive injection to prevent
            # Cloudflare Tunnel 524s during long Opus 4.7 thinking, and
            # (2) completion_start_time stamped on the first
            # content_block_delta so SpendLogs TTFT is meaningful rather
            # than defaulting to end_time.
            #
            # The startTime fix (monkey-patch of
            # BaseAnthropicMessagesStreamingIterator.__init__) is
            # applied globally and does NOT depend on this gate.
            #
            # All Claude Code CLI users are matched via key_alias
            # prefix. ALIASES is set empty (and explicitly non-None) so
            # the bundled default canary list does not re-add itself.
            - name: STREAMING_BRIDGE_KEY_ALIASES
              value: ""
            - name: STREAMING_BRIDGE_KEY_PREFIXES
              value: "claude-code-"
            # Gating for force_stream.force_stream (initial canary).
            # Matching keys get their non-streaming /v1/messages calls
            # collapsed via streaming_bridge: upstream is invoked with
            # stream=true, whitespace heartbeats keep CF alive, the SSE
            # is reassembled into one Anthropic Message JSON for the
            # client. This eliminates the residual ~45/day 524s on
            # non-stream long-tail requests.
            #
            # Full Claude Code CLI rollout (2026-04-25): collapse-mode
            # protection for all ``claude-code-*`` keys. Prefix gate
            # mirrors STREAMING_BRIDGE_KEY_PREFIXES and covers every
            # current and future Claude Code user without per-key
            # maintenance.
            #
            # Why this is safe to do at full scale:
            #   - The hook only fires when call_type == anthropic_messages
            #     AND the client did NOT set stream=true. Streaming
            #     clients are unaffected (they go through streaming_bridge
            #     pass-through mode).
            #   - For matching requests, force_stream flips
            #     data["stream"]=True and tags
            #     litellm_metadata["_force_stream_collapse"]=True. The
            #     bridge then buffers the upstream SSE, sends b" "
            #     keepalives every 25 s, and yields one final reassembled
            #     Message JSON. The Anthropic JS SDK and Python SDK
            #     both call response.json() on non-streaming requests
            #     regardless of Content-Type, and JSON tolerates leading
            #     whitespace, so the on-the-wire ``b"   {...}"`` parses
            #     identically to ``b"{...}"``.
            #   - Canary roster prior to this rollout (verified working):
            #       claude-code-liuguoxian-50gj  (long Sonnet 101s success)
            #       claude-code-tenggeer-qvaz    (long Opus 4-6 226s success)
            #
            # KEY_ALIASES kept empty so prefix is the sole gate. To
            # exclude a specific Claude Code key from collapse mode in
            # the future, list it explicitly here AND add an opt-out
            # check inside force_stream.py — there is currently no
            # opt-out path because we have no need for one.
            - name: FORCE_STREAM_KEY_ALIASES
              value: ""
            - name: FORCE_STREAM_KEY_PREFIXES
              value: "claude-code-"
            # Anthropic-provider httpx per-chunk read timeout, in seconds.
            #
            # When set, streaming_bridge.py monkey-patches the cached
            # ``litellm.LlmProviders.ANTHROPIC`` async httpx client at
            # module load and wraps ``get_async_httpx_client`` so any
            # future cache miss receives the same tightened timeout.
            #
            # Background: LiteLLM's ``async_anthropic_messages_handler``
            # builds upstream requests via ``httpx_client.post(stream=True)``
            # without forwarding ``request_timeout`` / ``stream_timeout``.
            # The httpx client therefore falls back to its hardcoded
            # ``Timeout(read=600)`` default, which is what produced the
            # observed "fake-success" rows for ``claude-code-tenggeer-qvaz``
            # and other ``claude-code-*`` users (duration ≈ 600 s,
            # status = success, output_tokens ≈ 0). Setting this to 120 s
            # surfaces upstream Wangsu cheliantianxia mid-stream stalls
            # as ``httpx.ReadTimeout`` after 2 minutes; streaming_bridge's
            # iterator catches the exception and emits a synthetic
            # Anthropic error frame so the client SDK retries.
            #
            # Clamped server-side to ``[30, 600]`` seconds. Unset or
            # blank reverts to LiteLLM's 600 s default on next pod
            # restart (clean rollback path).
            #
            # Mock-validated 2026-04-26: triggers correctly under stall;
            # does NOT false-positive during normal long-thinking with
            # 1 s pings; isolated to anthropic provider only (OpenAI /
            # OpenRouter clients keep their 600 s default); idempotent
            # across multiple module imports.
            # 2026-04-28 incident rollback: bumped 120 -> 600 to stop
            # the synthetic stall frame from being injected on
            # ``httpx.ReadTimeout``. The synthetic frame
            # (_build_passthrough_stall_sse_frame) emits
            # ``event: error`` + ``event: message_stop`` ONLY -- with
            # no preceding ``event: message_start``. When the stall
            # fires before upstream sent ``message_start`` (Wangsu /
            # OR pre-prefill silence), the Claude Code JS SDK has no
            # ``Message`` envelope and crashes with
            # ``Cannot read properties of undefined (reading 'input_tokens')``
            # in its post-stream usage-aggregation path. 600 s matches
            # LiteLLM's default and effectively disables the patch
            # behavior on production paths (real total stalls are
            # bounded by the SDK client's own ~600 s timeout). The
            # patch object is still installed (idempotent) but no
            # longer fires earlier than the SDK default.
            #
            # Re-enable a tighter timeout ONLY after rewriting the
            # synthetic frame to emit a complete Anthropic Message
            # envelope (message_start + content_block_* +
            # message_delta + message_stop) so the SDK never sees an
            # undefined ``message`` in error paths.
            - name: STREAMING_BRIDGE_HTTPX_READ_TIMEOUT_SECONDS
              value: "600"
            # 2026-04-28 incident rollback: progress watchdog disabled
            # via the designed kill-switch values (999999 s = will
            # never fire in any realistic request lifetime). Same
            # root cause as the httpx tweak above -- watchdog also
            # routes to _build_passthrough_stall_sse_frame which is
            # broken pre-message_start. Until the synthetic frame is
            # rewritten, watchdog must stay off so it never triggers
            # the JS-SDK undefined-input_tokens crash on real users.
            #
            # Trade-off: ping-only stalls (Wangsu sends ping but no
            # progress) drag to the SDK client's own ~600 s timeout
            # like they did before commit ac2cd3b. Pre-watchdog
            # baseline was ~27 such stalls/24h cluster-wide. Users
            # see "Claude Code 卡 10 分钟" instead of an error frame.
            # Acceptable trade for eliminating the worse failure
            # mode (visible JS crash that aborts the session).
            - name: STREAMING_BRIDGE_PROGRESS_TIMEOUT_PRE_SECONDS
              value: "999999"
            - name: STREAMING_BRIDGE_PROGRESS_TIMEOUT_POST_SECONDS
              value: "999999"
          envFrom:
            - secretRef:
                name: litellm-secrets
            - secretRef:
                name: carher-env-keys
          resources:
            requests:
              cpu: 200m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
          livenessProbe:
            httpGet:
              path: /health/liveliness
              port: 4000
            initialDelaySeconds: 90
            periodSeconds: 15
            failureThreshold: 5
            timeoutSeconds: 15
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: 4000
            initialDelaySeconds: 90
            periodSeconds: 15
            failureThreshold: 5
            timeoutSeconds: 15
          # preStop sleep gives kube-proxy time to drop this pod's IP from
          # the Service endpoint set before uvicorn starts shutting down,
          # so new requests stop arriving before SIGTERM is delivered.
          # With terminationGracePeriodSeconds=60, the effective shutdown
          # budget is ~15s no-new-traffic + ~45s graceful drain.
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 15"]
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
              readOnly: true
            # Custom pre-call hooks live next to config.yaml so LiteLLM's
            # get_instance_fn() resolves them by relative path.
            - name: callbacks
              mountPath: /app/opus_47_fix.py
              subPath: opus_47_fix.py
              readOnly: true
            - name: callbacks
              mountPath: /app/embedding_sanitize.py
              subPath: embedding_sanitize.py
              readOnly: true
            - name: callbacks
              mountPath: /app/streaming_bridge.py
              subPath: streaming_bridge.py
              readOnly: true
            - name: callbacks
              mountPath: /app/force_stream.py
              subPath: force_stream.py
              readOnly: true
            - name: callbacks
              mountPath: /app/null_byte_sanitize.py
              subPath: null_byte_sanitize.py
              readOnly: true
            - name: callbacks
              mountPath: /app/anthropic_passthrough_pingfix.py
              subPath: anthropic_passthrough_pingfix.py
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: litellm-config
        - name: callbacks
          configMap:
            name: litellm-callbacks
---
apiVersion: v1
kind: Service
metadata:
  name: litellm-proxy
  namespace: carher
  labels:
    app: litellm-proxy
spec:
  type: ClusterIP
  selector:
    app: litellm-proxy
  ports:
    - port: 4000
      targetPort: 4000
      name: http
