apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflared-config
  namespace: carher
  labels:
    app: cloudflared
data:
  config.yml: |
    credentials-file: /etc/cloudflared/credentials.json
    ingress:
    - hostname: admin.carher.net
      service: http://carher-admin.carher.svc.cluster.local:8900
    - hostname: "*.carher.net"
      service: http://auth-proxy.carher.svc.cluster.local:80
    - service: http_status:404
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: carher
  labels:
    app: cloudflared
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudflared
  template:
    metadata:
      labels:
        app: cloudflared
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared@sha256:6b599ca3e974349ead3286d178da61d291961182ec3fe9c505e1dd02c8ac31b0
          imagePullPolicy: IfNotPresent
          args:
            - tunnel
            - --config
            - /etc/cloudflared/config.yml
            - --grace-period
            - "30s"
            # NOTE: 强制使用 HTTP/2 而非 QUIC 作为 cloudflared <-> CF Edge 的传输协议。
            # 背景：cloudflared QUIC 路径下，对 chunked / 缺少 Content-Length 的
            # streaming POST body 存在已知 bug（见 cloudflare/cloudflared#1485）：
            # body 会被静默替换为 Content-Length:0，origin 收到空 body，导致
            # LiteLLM 抛 starlette.requests.ClientDisconnect 并误报 model=None。
            # 切到 http2 后走 TCP，绕开该 bug，社区/官方均推荐此 workaround。
            - --protocol
            - http2
            - run
            - carher-k8s
          lifecycle:
            preStop:
              exec:
                command:
                  - cloudflared
                  - tunnel
                  - cleanup
                  - carher-k8s
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: config
              mountPath: /etc/cloudflared/config.yml
              subPath: config.yml
              readOnly: true
            - name: credentials
              mountPath: /etc/cloudflared/credentials.json
              subPath: credentials.json
              readOnly: true
            - name: credentials
              mountPath: /etc/cloudflared/cert.pem
              subPath: cert.pem
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: cloudflared-config
        - name: credentials
          secret:
            secretName: cloudflared-credentials
