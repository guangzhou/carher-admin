name: Build & Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "docs/**"
  workflow_dispatch:
    inputs:
      deploy_mode:
        description: "Deploy mode after build"
        type: choice
        options:
          - normal
          - fast
          - canary-only
          - build-only
        default: normal
      components:
        description: "What to build"
        type: choice
        options:
          - all
          - admin
          - operator
        default: all

env:
  ACR_REGISTRY: cltx-her-ck-registry.ap-southeast-1.cr.aliyuncs.com
  ADMIN_URL: https://admin.carher.net

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate image tag
        id: tag
        run: echo "tag=v$(date +%Y%m%d)-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build admin
        if: github.event_name == 'push' || inputs.components != 'operator'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.ACR_REGISTRY }}/her/carher-admin:${{ steps.tag.outputs.tag }}
            ${{ env.ACR_REGISTRY }}/her/carher-admin:latest

      - name: Build operator (Go)
        if: github.event_name == 'push' || inputs.components != 'admin'
        uses: docker/build-push-action@v5
        with:
          context: ./operator-go
          push: true
          tags: |
            ${{ env.ACR_REGISTRY }}/her/carher-operator:${{ steps.tag.outputs.tag }}
            ${{ env.ACR_REGISTRY }}/her/carher-operator:latest

      - name: Summary
        run: |
          echo "### Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "- Tag: \`${{ steps.tag.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Components: ${{ inputs.components || 'all' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Deploy mode: ${{ inputs.deploy_mode || 'normal' }}" >> $GITHUB_STEP_SUMMARY

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: |
      github.ref == 'refs/heads/main' &&
      (inputs.deploy_mode || 'normal') != 'build-only'
    steps:
      - name: Trigger deploy
        run: |
          MODE="${{ inputs.deploy_mode || 'normal' }}"
          TAG="${{ needs.build.outputs.image_tag }}"

          HTTP_CODE=$(curl -s -o /tmp/deploy-response.json -w "%{http_code}" \
            -X POST "${{ env.ADMIN_URL }}/api/deploy/webhook" \
            -H "Content-Type: application/json" \
            -d "{\"image_tag\": \"$TAG\", \"secret\": \"${{ secrets.DEPLOY_WEBHOOK_SECRET }}\", \"mode\": \"$MODE\"}")

          echo "HTTP: $HTTP_CODE"
          cat /tmp/deploy-response.json

          if [ "$HTTP_CODE" -ge 400 ]; then
            BODY=$(cat /tmp/deploy-response.json)
            # already_deployed or already_deploying are OK, not failures
            if echo "$BODY" | grep -q "already_deploy"; then
              echo "Deploy skipped (idempotent): $BODY"
            else
              echo "::error::Deploy failed: HTTP $HTTP_CODE"
              exit 1
            fi
          fi

          echo "### Deploy Triggered" >> $GITHUB_STEP_SUMMARY
          echo "- Tag: \`$TAG\`" >> $GITHUB_STEP_SUMMARY
          echo "- Mode: $MODE" >> $GITHUB_STEP_SUMMARY

      - name: Wait and verify (canary)
        if: (inputs.deploy_mode || 'normal') == 'normal'
        run: |
          echo "Polling deploy status..."
          for i in $(seq 1 6); do
            sleep 15
            STATUS=$(curl -sf "${{ env.ADMIN_URL }}/api/deploy/status" || echo '{"error":"unreachable"}')
            echo "[$i/6] Deploy status: $STATUS"

            if echo "$STATUS" | grep -q '"complete"'; then
              echo "Deploy complete!"
              echo "$STATUS" >> $GITHUB_STEP_SUMMARY
              exit 0
            fi
            if echo "$STATUS" | grep -q '"paused"'; then
              echo "::warning::Deploy paused — canary health check may have failed."
              echo "$STATUS" >> $GITHUB_STEP_SUMMARY
              exit 0
            fi
            if echo "$STATUS" | grep -q '"failed"'; then
              echo "::error::Deploy failed"
              echo "$STATUS" >> $GITHUB_STEP_SUMMARY
              exit 1
            fi
          done
          echo "Deploy still in progress after 90s — check dashboard"
          echo "### Deploy In Progress (timeout)" >> $GITHUB_STEP_SUMMARY
