<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="980" viewBox="0 0 1800 980">
  <rect width="1800" height="980" fill="#F8FAFC"/>
  <text x="80" y="86" font-family="Noto Sans SC, Arial" font-size="44" font-weight="800" fill="#102A43">落地路线图</text>
  <text x="82" y="128" font-family="Noto Sans SC, Arial" font-size="23" fill="#52606D">从最小可控链路开始，逐步打开 Her 与 Codex 的双向能力。</text>

  <line x1="160" y1="500" x2="1640" y2="500" stroke="#94A3B8" stroke-width="8"/>
  <polygon points="1640,500 1608,482 1608,518" fill="#94A3B8"/>

  <g font-family="Noto Sans SC, Arial">
    <circle cx="250" cy="500" r="42" fill="#2563EB"/><text x="227" y="514" font-size="29" font-weight="800" fill="#FFFFFF">P0</text>
    <rect x="120" y="230" width="270" height="190" rx="22" fill="#DBEAFE" stroke="#2563EB" stroke-width="4"/>
    <text x="155" y="285" font-size="27" font-weight="800" fill="#1E3A8A">链路验证</text>
    <text x="155" y="325" font-size="20" fill="#334155">Bridge + Worker</text>
    <text x="155" y="355" font-size="20" fill="#334155">app-server stream</text>
    <text x="155" y="385" font-size="20" fill="#334155">不接飞书和 Her</text>

    <circle cx="585" cy="500" r="42" fill="#059669"/><text x="562" y="514" font-size="29" font-weight="800" fill="#FFFFFF">P1</text>
    <rect x="450" y="580" width="290" height="200" rx="22" fill="#D1FAE5" stroke="#059669" stroke-width="4"/>
    <text x="485" y="635" font-size="27" font-weight="800" fill="#065F46">Her 调 Codex</text>
    <text x="485" y="675" font-size="20" fill="#334155">CodexOpsHer</text>
    <text x="485" y="705" font-size="20" fill="#334155">/codex 命令</text>
    <text x="485" y="735" font-size="20" fill="#334155">审批卡片</text>

    <circle cx="920" cy="500" r="42" fill="#7C3AED"/><text x="897" y="514" font-size="29" font-weight="800" fill="#FFFFFF">P2</text>
    <rect x="785" y="230" width="290" height="190" rx="22" fill="#EDE9FE" stroke="#7C3AED" stroke-width="4"/>
    <text x="820" y="285" font-size="27" font-weight="800" fill="#4C1D95">Codex 调 Her</text>
    <text x="820" y="325" font-size="20" fill="#334155">carher-her-mcp</text>
    <text x="820" y="355" font-size="20" fill="#334155">her_send / her_wait</text>
    <text x="820" y="385" font-size="20" fill="#334155">仅白名单 Her</text>

    <circle cx="1255" cy="500" r="42" fill="#EA580C"/><text x="1232" y="514" font-size="29" font-weight="800" fill="#FFFFFF">P3</text>
    <rect x="1120" y="580" width="290" height="200" rx="22" fill="#FFEDD5" stroke="#EA580C" stroke-width="4"/>
    <text x="1155" y="635" font-size="27" font-weight="800" fill="#9A3412">平台治理</text>
    <text x="1155" y="675" font-size="20" fill="#334155">Admin 页面</text>
    <text x="1155" y="705" font-size="20" fill="#334155">审计 / Worker 状态</text>
    <text x="1155" y="735" font-size="20" fill="#334155">多 repo / 多 worker</text>

    <circle cx="1580" cy="500" r="42" fill="#DB2777"/><text x="1557" y="514" font-size="29" font-weight="800" fill="#FFFFFF">P4</text>
    <rect x="1445" y="230" width="290" height="190" rx="22" fill="#FCE7F3" stroke="#DB2777" stroke-width="4"/>
    <text x="1480" y="285" font-size="27" font-weight="800" fill="#9D174D">谨慎开放</text>
    <text x="1480" y="325" font-size="20" fill="#334155">少数运维 Her</text>
    <text x="1480" y="355" font-size="20" fill="#334155">策略模板</text>
    <text x="1480" y="385" font-size="20" fill="#334155">异常回滚</text>
  </g>

  <rect x="100" y="850" width="760" height="74" rx="20" fill="#ECFDF5" stroke="#10B981" stroke-width="3"/>
  <text x="135" y="895" font-family="Noto Sans SC, Arial" font-size="20" font-weight="800" fill="#065F46">第一版：CodexOpsHer + Mac Worker + carher-admin</text>
  <rect x="940" y="850" width="760" height="74" rx="20" fill="#FEF2F2" stroke="#EF4444" stroke-width="3"/>
  <text x="975" y="895" font-family="Noto Sans SC, Arial" font-size="21" font-weight="800" fill="#991B1B">不做：全量 Her 开启、Her Pod 跑 Codex、暴露 app-server</text>
</svg>
