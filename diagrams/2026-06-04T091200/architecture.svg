</style><defs><marker id="g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#16a34a"/></marker><marker id="o" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#f97316"/></marker></defs><rect x="0" y="0" width="1400" height="760" fill="#f8fafc"/><circle cx="1240" cy="92" r="54" fill="#dcfce7"/><circle cx="1295" cy="135" r="18" fill="#e0f2fe"/><text class="title" x="48" y="62">Her 双层 Fallback 稳定性架构</text><text class="subtitle" x="50" y="94">主链路先走 LiteLLM 内部自愈，LiteLLM 整体不可达时再由 OpenClaw 切直连兜底</text><rect x="1010" y="34" width="310" height="86" rx="18" fill="#ffffff" stroke="#dbe3ee"/><line x1="1035" y1="60" x2="1095" y2="60" class="mainStroke" marker-end="url(#g)"/><text class="tiny" x="1110" y="65">绿色：正常主链路</text><line x1="1035" y1="91" x2="1095" y2="91" class="fbStroke" marker-end="url(#o)"/><text class="tiny" x="1110" y="96">橙色：自动 fallback</text>
