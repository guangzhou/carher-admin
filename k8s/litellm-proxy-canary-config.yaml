# LiteLLM Proxy: unified LLM gateway with spend tracking.
# Experiment phase: single replica, no HPA.
#
# Secret is defined by the template in k8s/litellm-secrets.yaml.
# Render that file with real values before applying the Secret.
apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config-canary
  namespace: carher
  labels:
    app: litellm-proxy
data:
  config.yaml: |
    model_list:
      # ═══════════════════════════════════════════
      # Sonnet / Opus: Wangsu Anthropic Direct (v2 gateway) — primary
      # Native Anthropic protocol via cheliantianxia3 gateway.
      #
      # IMPORTANT: Pricing MUST be in litellm_params (not only model_info).
      # LiteLLM bug: register_model() fails to inject model_info pricing
      # when model names collide with built-in entries. Per-deployment
      # cost path (litellm_params) is the only reliable path.
      # ═══════════════════════════════════════════

      # ── Claude Opus 4.6 via Wangsu Direct ──
      - model_name: claude-opus-4-6
        litellm_params:
          model: anthropic/anthropic.claude-opus-4-6
          api_key: os.environ/WANGSU_DIRECT_API_KEY
          api_base: https://aigateway.edgecloudapp.com/v2/gws/yqhhclqf/anthropic
          input_cost_per_token: 0.000005
          output_cost_per_token: 0.000025
          cache_read_input_token_cost: 0.0000005
          cache_creation_input_token_cost: 0.00000625
          extra_headers:
            anthropic-beta: "prompt-caching-2024-07-31,extended-cache-ttl-2025-04-11"
          cache_control_injection_points:
            - location: message
              role: system
              control:
                type: ephemeral
                ttl: "1h"
            - location: message
              role: user
              index: -1
              control:
                type: ephemeral
                ttl: "1h"
        model_info:
          id: wangsu-direct/claude-opus-4-6
          input_cost_per_token: 0.000005
          output_cost_per_token: 0.000025
          cache_read_input_token_cost: 0.0000005
          cache_creation_input_token_cost: 0.00000625

      # ── Claude Sonnet 4.6 via Wangsu Direct ──
      - model_name: claude-sonnet-4-6
        litellm_params:
          model: anthropic/anthropic.claude-sonnet-4-6
          api_key: os.environ/WANGSU_DIRECT_API_KEY
          api_base: https://aigateway.edgecloudapp.com/v2/gws/yqhhclqf/anthropic
          input_cost_per_token: 0.000003
          output_cost_per_token: 0.000015
          cache_read_input_token_cost: 0.0000003
          cache_creation_input_token_cost: 0.00000375
          extra_headers:
            anthropic-beta: "prompt-caching-2024-07-31,extended-cache-ttl-2025-04-11"
          cache_control_injection_points:
            - location: message
              role: system
              control:
                type: ephemeral
                ttl: "1h"
            - location: message
              role: user
              index: -1
              control:
                type: ephemeral
                ttl: "1h"
        model_info:
          id: wangsu-direct/claude-sonnet-4-6
          input_cost_per_token: 0.000003
          output_cost_per_token: 0.000015
          cache_read_input_token_cost: 0.0000003
          cache_creation_input_token_cost: 0.00000375

      # ── Claude Opus 4.7 via Wangsu Direct (cheliantianxia5/sqix2pnh) ──
      # Operator config_gen.go references this model_name (no `anthropic.`
      # prefix) so all per-instance LiteLLM keys must include it in their
      # allowlist. Same upstream as anthropic.claude-opus-4-7 (kept as alias
      # for legacy clients calling the prefixed name directly).
      - model_name: claude-opus-4-7
        litellm_params:
          model: anthropic/anthropic.claude-opus-4-7
          api_key: os.environ/WANGSU_DIRECT5_API_KEY
          api_base: https://aigateway.edgecloudapp.com/v2/gws/sqix2pnh/anthropic
          input_cost_per_token: 0.000005
          output_cost_per_token: 0.000025
          cache_read_input_token_cost: 0.0000005
          cache_creation_input_token_cost: 0.00000625
          extra_headers:
            anthropic-beta: "prompt-caching-2024-07-31,extended-cache-ttl-2025-04-11"
          cache_control_injection_points:
            - location: message
              role: system
              control:
                type: ephemeral
                ttl: "1h"
            - location: message
              role: user
              index: -1
              control:
                type: ephemeral
                ttl: "1h"
        model_info:
          id: wangsu-direct5/claude-opus-4-7
          input_cost_per_token: 0.000005
          output_cost_per_token: 0.000025
          cache_read_input_token_cost: 0.0000005
          cache_creation_input_token_cost: 0.00000625

      # ═══════════════════════════════════════════
      # GPT / Gemini: OpenRouter — primary (unchanged)
      # ═══════════════════════════════════════════

      # ── Gemini 3.1 Pro via OpenRouter ──
      - model_name: gemini-3.1-pro-preview
        litellm_params:
          model: openrouter/google/gemini-3.1-pro-preview
          api_key: os.environ/OPENROUTER_API_KEY
          input_cost_per_token: 0.000002
          output_cost_per_token: 0.000012
        model_info:
          id: openrouter/gemini-3.1-pro-preview
          input_cost_per_token: 0.000002
          output_cost_per_token: 0.000012

      # ═══════════════════════════════════════════
      # OpenRouter OpenAI-compat: Claude via /chat/completions
      # Used by CarHer bot (OpenAI-compat client) for:
      #   - fallback of claude-opus-4-6 / claude-sonnet-4-6 (Wangsu-primary)
      #   - primary of "openrouter-primary" cohort (e.g. even-ID carher users)
      # OpenRouter verified to support Anthropic prompt caching via the
      # standard `cache_control` field + anthropic-beta headers (2026-04-21).
      # ═══════════════════════════════════════════

      # NOTE: we intentionally use the `openrouter/` provider here (not
      # `custom_openai/`) because LiteLLM's cache_control_injection_points
      # only works for Anthropic-aware providers (anthropic, openrouter).
      # The `custom_openai/` path does NOT auto-inject cache_control
      # (verified 2026-04-22), so cache would be effectively disabled.
      #
      # Known tradeoff: LiteLLM v1.82.x has a bug in the openrouter provider's
      # /v1/responses handler where it forwards the `openrouter/` prefix to
      # OpenRouter, causing HTTP 400. For /v1/chat/completions (the common
      # bot path) this works correctly with full cache injection.
      # The 400 on /v1/responses is absorbed by the key-level fallback to
      # anthropic.claude-opus-4-X (Wangsu Direct5/6), which also has cache.
      #
      # `extra_body.provider.order` forces OpenRouter to route to Anthropic
      # first, Google Vertex second, and never Amazon Bedrock — because
      # Bedrock does not support Anthropic prompt cache via OpenRouter
      # (verified 2026-04-22 across opus-4.6, opus-4.7).
      - model_name: openrouter-claude-opus-4-6
        litellm_params:
          model: openrouter/anthropic/claude-opus-4.6
          api_key: os.environ/OPENROUTER_API_KEY
          input_cost_per_token: 0.000005
          output_cost_per_token: 0.000025
          cache_read_input_token_cost: 0.0000005
          cache_creation_input_token_cost: 0.00000625
          extra_body:
            provider:
              order: ["anthropic", "google-vertex"]
              allow_fallbacks: false
          extra_headers:
            anthropic-beta: "prompt-caching-2024-07-31,extended-cache-ttl-2025-04-11"
          cache_control_injection_points:
            - location: message
              role: system
              control:
                type: ephemeral
                ttl: "1h"
            - location: message
              role: user
              index: -1
              control:
                type: ephemeral
                ttl: "1h"
        model_info:
          id: openrouter/claude-opus-4-6
          input_cost_per_token: 0.000005
          output_cost_per_token: 0.000025
          cache_read_input_token_cost: 0.0000005
          cache_creation_input_token_cost: 0.00000625

      # Same openrouter/ + provider.order pattern as opus-4-6. sonnet-4.6
      # defaults to Google Vertex (which supports cache), so pinning is
      # technically optional; we pin for consistency with the opus family.
      - model_name: openrouter-claude-sonnet-4-6
        litellm_params:
          model: openrouter/anthropic/claude-sonnet-4.6
          api_key: os.environ/OPENROUTER_API_KEY
          input_cost_per_token: 0.000003
          output_cost_per_token: 0.000015
          cache_read_input_token_cost: 0.0000003
          cache_creation_input_token_cost: 0.00000375
          extra_body:
            provider:
              order: ["anthropic", "google-vertex"]
              allow_fallbacks: false
          extra_headers:
            anthropic-beta: "prompt-caching-2024-07-31,extended-cache-ttl-2025-04-11"
          cache_control_injection_points:
            - location: message
              role: system
              control:
                type: ephemeral
                ttl: "1h"
            - location: message
              role: user
              index: -1
              control:
                type: ephemeral
                ttl: "1h"
        model_info:
          id: openrouter/claude-sonnet-4-6
          input_cost_per_token: 0.000003
          output_cost_per_token: 0.000015
          cache_read_input_token_cost: 0.0000003
          cache_creation_input_token_cost: 0.00000375

      # Same openrouter/ + provider.order pattern as opus-4-6.
      - model_name: openrouter-claude-opus-4-7
        litellm_params:
          model: openrouter/anthropic/claude-opus-4.7
          api_key: os.environ/OPENROUTER_API_KEY
          input_cost_per_token: 0.000005
          output_cost_per_token: 0.000025
          cache_read_input_token_cost: 0.0000005
          cache_creation_input_token_cost: 0.00000625
          extra_body:
            provider:
              order: ["anthropic", "google-vertex"]
              allow_fallbacks: false
          extra_headers:
            anthropic-beta: "prompt-caching-2024-07-31,extended-cache-ttl-2025-04-11"
          cache_control_injection_points:
            - location: message
              role: system
              control:
                type: ephemeral
                ttl: "1h"
            - location: message
              role: user
              index: -1
              control:
                type: ephemeral
                ttl: "1h"
        model_info:
          id: openrouter/claude-opus-4-7
          input_cost_per_token: 0.000005
          output_cost_per_token: 0.000025
          cache_read_input_token_cost: 0.0000005
          cache_creation_input_token_cost: 0.00000625

      # ═══════════════════════════════════════════
      # Fallback: Wangsu (网宿) OpenAI compat for GPT / Gemini
      # Use custom_openai/* so LiteLLM stays on chat/completions.
      # ═══════════════════════════════════════════

      - model_name: wangsu-gpt-5.4
        litellm_params:
          model: custom_openai/gpt-5.4
          api_key: os.environ/WANGSU_API_KEY
          api_base: https://aigateway.edgecloudapp.com/v1/23dcb2866d219047ae6edd6a2724dbc2/cheliantianxia1
        model_info:
          id: wangsu/gpt-5.4
          input_cost_per_token: 0.0000025
          output_cost_per_token: 0.000015

      - model_name: wangsu-gemini-3.1-pro-preview
        litellm_params:
          model: custom_openai/gemini-3.1-pro-preview
          api_key: os.environ/WANGSU_API_KEY
          api_base: https://aigateway.edgecloudapp.com/v1/23dcb2866d219047ae6edd6a2724dbc2/cheliantianxia1
        model_info:
          id: wangsu/gemini-3.1-pro-preview
          input_cost_per_token: 0.000002
          output_cost_per_token: 0.000012

      # ── New on cheliantianxia1 (added 2026-05-08): GPT-5.5 + DeepSeek V4 ──
      # Pricing rationale:
      #   gpt-5.5     — OpenAI list price ($5/$30 per 1M); Wangsu pass-through.
      #   deepseek-*  — DeepSeek official list price (cache_miss + output);
      #                 the 75%-off promo ends 2026-05-31, so we book at full
      #                 list to keep spend tracking conservative.
      - model_name: wangsu-gpt-5.5
        litellm_params:
          model: custom_openai/gpt-5.5
          api_key: os.environ/WANGSU_API_KEY
          api_base: https://aigateway.edgecloudapp.com/v1/23dcb2866d219047ae6edd6a2724dbc2/cheliantianxia1
          input_cost_per_token: 0.000005
          output_cost_per_token: 0.00003
        model_info:
          id: wangsu/gpt-5.5
          input_cost_per_token: 0.000005
          output_cost_per_token: 0.00003

      - model_name: wangsu-deepseek-v4-pro
        litellm_params:
          model: custom_openai/deepseek-v4-pro
          api_key: os.environ/WANGSU_API_KEY
          api_base: https://aigateway.edgecloudapp.com/v1/23dcb2866d219047ae6edd6a2724dbc2/cheliantianxia1
          input_cost_per_token: 0.00000171
          output_cost_per_token: 0.00000343
        model_info:
          id: wangsu/deepseek-v4-pro
          input_cost_per_token: 0.00000171
          output_cost_per_token: 0.00000343

      - model_name: wangsu-deepseek-v4-flash
        litellm_params:
          model: custom_openai/deepseek-v4-flash
          api_key: os.environ/WANGSU_API_KEY
          api_base: https://aigateway.edgecloudapp.com/v1/23dcb2866d219047ae6edd6a2724dbc2/cheliantianxia1
          input_cost_per_token: 0.000000143
          output_cost_per_token: 0.000000286
        model_info:
          id: wangsu/deepseek-v4-flash
          input_cost_per_token: 0.000000143
          output_cost_per_token: 0.000000286

      # ═══════════════════════════════════════════
      # Provider: Wangsu Anthropic Direct Mode (v2 gateway)
      # Native Anthropic protocol for Cursor / Claude Code users.
      # Gateway: cheliantianxia5, schema: anthropic, strict model match.
      #
      # BUG WORKAROUND (LiteLLM v1.82.6):
      # register_model() fails to inject custom pricing when model_info.id
      # collides with built-in entries (bedrock_converse 'anthropic.claude-sonnet-4-6')
      # or is absent from the bundled model_prices JSON ('anthropic.claude-opus-4-6').
      # Cost calc resolves model_without_prefix = 'anthropic.claude-*' but finds
      # either wrong pricing (bedrock) or nothing -> spend=$0.
      # Fix: duplicate pricing into litellm_params so the per-deployment cost
      # path is used, AND use unique model_info.id to avoid collisions.
      # ═══════════════════════════════════════════

      - model_name: anthropic.claude-sonnet-4-6
        litellm_params:
          model: anthropic/anthropic.claude-sonnet-4-6
          api_key: os.environ/WANGSU_DIRECT5_API_KEY
          api_base: https://aigateway.edgecloudapp.com/v2/gws/sqix2pnh/anthropic
          input_cost_per_token: 0.000003
          output_cost_per_token: 0.000015
          cache_read_input_token_cost: 0.0000003
          cache_creation_input_token_cost: 0.00000375
          extra_headers:
            anthropic-beta: "prompt-caching-2024-07-31,extended-cache-ttl-2025-04-11"
          cache_control_injection_points:
            - location: message
              role: system
              control:
                type: ephemeral
                ttl: "1h"
            - location: message
              role: user
              index: -1
              control:
                type: ephemeral
                ttl: "1h"
        model_info:
          id: wangsu-direct5/claude-sonnet-4-6
          input_cost_per_token: 0.000003
          output_cost_per_token: 0.000015
          cache_read_input_token_cost: 0.0000003
          cache_creation_input_token_cost: 0.00000375

      - model_name: anthropic.claude-opus-4-6
        litellm_params:
          model: anthropic/anthropic.claude-opus-4-6
          api_key: os.environ/WANGSU_DIRECT5_API_KEY
          api_base: https://aigateway.edgecloudapp.com/v2/gws/sqix2pnh/anthropic
          input_cost_per_token: 0.000005
          output_cost_per_token: 0.000025
          cache_read_input_token_cost: 0.0000005
          cache_creation_input_token_cost: 0.00000625
          extra_headers:
            anthropic-beta: "prompt-caching-2024-07-31,extended-cache-ttl-2025-04-11"
          cache_control_injection_points:
            - location: message
              role: system
              control:
                type: ephemeral
                ttl: "1h"
            - location: message
              role: user
              index: -1
              control:
                type: ephemeral
                ttl: "1h"
        model_info:
          id: wangsu-direct5/claude-opus-4-6
          input_cost_per_token: 0.000005
          output_cost_per_token: 0.000025
          cache_read_input_token_cost: 0.0000005
          cache_creation_input_token_cost: 0.00000625

      - model_name: anthropic.claude-haiku-4-5
        litellm_params:
          model: anthropic/anthropic.claude-haiku-4-5
          api_key: os.environ/WANGSU_DIRECT5_API_KEY
          api_base: https://aigateway.edgecloudapp.com/v2/gws/sqix2pnh/anthropic
          input_cost_per_token: 0.000001
          output_cost_per_token: 0.000005
          cache_read_input_token_cost: 0.0000001
          cache_creation_input_token_cost: 0.00000125
          extra_headers:
            anthropic-beta: "prompt-caching-2024-07-31,extended-cache-ttl-2025-04-11"
          cache_control_injection_points:
            - location: message
              role: system
              control:
                type: ephemeral
                ttl: "1h"
            - location: message
              role: user
              index: -1
              control:
                type: ephemeral
                ttl: "1h"
        model_info:
          id: wangsu-direct5/claude-haiku-4-5
          input_cost_per_token: 0.000001
          output_cost_per_token: 0.000005
          cache_read_input_token_cost: 0.0000001
          cache_creation_input_token_cost: 0.00000125

      # ═══════════════════════════════════════════
      # Provider: Wangsu Anthropic Direct Mode (v2 gateway) — cheliantianxia6
      # Gateway id: af1ho8mp. Initially opt-in only: restricted to specific
      # virtual keys via per-key `models` allowlist (e.g. carher-1000 and
      # claude-code-liuguoxian-50gj). Pricing identical to Opus 4.6.
      # ═══════════════════════════════════════════

      - model_name: anthropic.claude-opus-4-7
        litellm_params:
          model: anthropic/anthropic.claude-opus-4-7
          api_key: os.environ/WANGSU_DIRECT5_API_KEY
          api_base: https://aigateway.edgecloudapp.com/v2/gws/sqix2pnh/anthropic
          input_cost_per_token: 0.000005
          output_cost_per_token: 0.000025
          cache_read_input_token_cost: 0.0000005
          cache_creation_input_token_cost: 0.00000625
          extra_headers:
            anthropic-beta: "prompt-caching-2024-07-31,extended-cache-ttl-2025-04-11"
          cache_control_injection_points:
            - location: message
              role: system
