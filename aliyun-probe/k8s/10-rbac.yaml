apiVersion: v1
kind: ServiceAccount
metadata:
  name: chatgpt-acct-probe
  namespace: carher
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: chatgpt-acct-probe
  namespace: carher
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create", "get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: chatgpt-acct-probe
  namespace: carher
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: chatgpt-acct-probe
subjects:
  - kind: ServiceAccount
    name: chatgpt-acct-probe
    namespace: carher
